<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begreppslista - Arbetsmarknad & Arbetsliv</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif; }
        .flip-card { perspective: 1000px; height: 350px; width: 100%; max-width: 400px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped-classes { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .flip-card-front { background-color: #fbbf24; border: 6px solid white; }
        .flip-card-back { background-color: white; border: 6px solid #fbbf24; transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const concepts = [
            { term: "Arbetsmarknad", definition: "Platsen där jobb erbjuds och söks.", sentence: "På _____ möts arbetsgivare som söker personal och arbetssökande som vill ha jobb." },
            { term: "Arbetsgivare", definition: "Den som anställer och betalar lön.", sentence: "Restaurangägaren är _____ och ansvarar för att betala lön och följa arbetsrättsliga regler." },
            { term: "Arbetstagare", definition: "Den som jobbar och får lön.", sentence: "Undersköterskan är _____ som utför arbetet och har rätt till lön och semester." },
            { term: "Lön", definition: "Pengar man får för sitt arbete.", sentence: "En förhandling med chefen ledde till att hennes _____ höjdes med 2 000 kronor i månaden." },
            { term: "Privat sektor", definition: "Företag som ägs privat och vill tjäna pengar.", sentence: "ICA och H&M tillhör den _____ och drivs med målet att gå med vinst." },
            { term: "Offentlig sektor", definition: "Verksamheter som drivs av stat, region eller kommun.", sentence: "Sjukhus, polis och grundskola tillhör den _____ och finansieras med skattemedel." },
            { term: "Digitalisering", definition: "Att arbete görs med hjälp av datorer och teknik.", sentence: "Självscanning i mataffärer är ett exempel på _____ som ersatt manuellt kassaarbete." },
            { term: "Tillsvidareanställning (fast anställning)", definition: "En anställning utan slutdatum.", sentence: "Efter provanställningen erbjöds hon en _____ utan bestämt slutdatum." },
            { term: "Provanställning", definition: "En testperiod innan fast jobb.", sentence: "De första sex månaderna på jobbet var en _____, varefter hon fick fast anställning." },
            { term: "Vikariat", definition: "Att jobba istället för någon som är borta.", sentence: "Under mammaledigheten fick en kollega ett _____ för att täcka upp hennes arbetsuppgifter." },
            { term: "Projektanställning", definition: "Anställning som gäller under ett projekt.", sentence: "Webbutvecklaren hade en _____ och slutade när hemsidan var klar efter åtta månader." },
            { term: "Behovsanställning", definition: "Man jobbar när det behövs.", sentence: "Med en _____ ringer chefen bara in dig när det är sjukfrånvaro bland ordinarie personal." },
            { term: "Säsongsanställning", definition: "Anställning under en viss del av året.", sentence: "Skidorten erbjöd _____ till liftvakter och instruktörer under vintermånaderna." },
            { term: "Bemanningsföretag", definition: "Företag som hyr ut personal till andra företag.", sentence: "Fabriksarbetaren var anställd av ett _____ men jobbade varje dag på Volvos monteringslinje." },
            { term: "A-kasseersättning", definition: "Pengarna man får från a-kassan vid arbetslöshet.", sentence: "Efter att ha blivit varslad fick han _____ som täckte en del av den förlorade lönen." },
            { term: "Fackförening", definition: "Organisation som hjälper arbetstagare.", sentence: "Tack vare _____ lyckades personalen förhandla fram löneökningar och bättre villkor." },
            { term: "Arbetsgivarorganisation", definition: "Organisation som representerar arbetsgivare i förhandlingar.", sentence: "Företaget var med i en _____ som skötte löneförhandlingarna mot facket." },
            { term: "Kollektivavtal", definition: "Avtal om lön och villkor mellan fack och arbetsgivare.", sentence: "Tack vare _____ är alla anställda garanterade OB-tillägg för arbete på helger." },
            { term: "Förhandling", definition: "När parter diskuterar för att komma överens.", sentence: "Facket och arbetsgivaren möttes till en _____ om nästa års löneökning." },
            { term: "Medling", definition: "En neutral person hjälper parter att komma överens.", sentence: "När förhandlingarna kört fast kopplades en statlig _____ in för att lösa konflikten." },
            { term: "Strejk", definition: "När anställda slutar jobba för att påverka arbetsgivaren.", sentence: "Vårdpersonalen gick ut i _____ för att pressa arbetsgivaren på högre löner och bättre schema." },
            { term: "Lockout", definition: "När arbetsgivaren stänger ute personal från jobbet.", sentence: "Arbetsgivaren svarade med _____ och nekade personalen tillträde till arbetsplatsen under konflikten." },
            { term: "Individuell lönesättning", definition: "Lönen bestäms efter hur bra du arbetar.", sentence: "Med _____ kan en anställd som presterar bättre förhandla sig till en högre lön." },
            { term: "OB-tillägg", definition: "Extra lön för obekväm arbetstid.", sentence: "Sjuksköterskan fick _____ för nattskiftet, vilket ökade hennes månadslön avsevärt." },
            { term: "Svartarbete (svartjobb)", definition: "Arbete utan att betala skatt.", sentence: "Att ta betalt kontant utan kvitto kan vara _____ och leder till att skatten undviks." },
            { term: "Arbetsmiljö", definition: "Hur det är på jobbet, både fysiskt och psykiskt.", sentence: "En dålig _____ med hög stress och buller kan leda till att anställda sjukskriver sig." },
            { term: "Fysisk arbetsmiljö", definition: "Den miljö man kan se och känna, som belysning och säkerhetsutrustning.", sentence: "Byggarbetaren bar hjälm och skyddsskor som en del av den _____ på arbetsplatsen." },
            { term: "Psykisk/social arbetsmiljö", definition: "Hur man mår och behandlas på jobbet.", sentence: "Mobbning och orättvis behandling är tecken på en dålig _____ som arbetsgivaren måste åtgärda." },
            { term: "LAS (Lagen om anställningsskydd)", definition: "Lag som skyddar anställda vid uppsägning.", sentence: "Enligt _____ gäller principen 'sist in, först ut' när ett företag måste varsla personal." },
            { term: "Arbetsmiljölagen", definition: "Lag som kräver att arbetsplatsen är säker.", sentence: "Arbetsgivaren bröt mot _____ eftersom maskinerna saknade nödvändiga skyddsanordningar." },
            { term: "Diskrimineringslagen", definition: "Lag som förbjuder orättvis behandling på grund av t.ex. kön eller etnicitet.", sentence: "Att neka någon jobb på grund av deras religion strider mot _____." },
            { term: "Arbetstidslagen", definition: "Lag som reglerar hur många timmar man får jobba.", sentence: "Arbetsgivaren bröt mot _____ när han tvingade personalen att jobba övertid utan ersättning." },
            { term: "Semesterlagen", definition: "Lag som ger rätt till minst 25 dagars semester per år.", sentence: "Tack vare _____ har alla anställda i Sverige rätt till minst 25 betalda semesterdagar om året." }
        ];

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getFeedback(score, total) {
            const p = score / total;
            if (p >= 0.9) return "Redo för provet! Fantastiskt bra!";
            if (p >= 0.7) return "Bra jobbat! Öva lite till på de du missade.";
            if (p >= 0.5) return "Halvvägs! Fortsätt träna.";
            return "Öva lite till – du är på rätt väg!";
        }

        function LucktextView() {
            const [inputs, setInputs] = useState(concepts.map(() => ''));
            const [attempts, setAttempts] = useState(concepts.map(() => 0));
            const [statuses, setStatuses] = useState(concepts.map(() => null));
            const [done, setDone] = useState(false);

            const normalize = s => s.trim().toLowerCase();

            const submit = (i) => {
                if (statuses[i] === 'correct' || statuses[i] === 'wrong-final') return;
                if (normalize(inputs[i]) === normalize(concepts[i].term)) {
                    const s = [...statuses]; s[i] = 'correct'; setStatuses(s);
                } else {
                    const a = [...attempts]; a[i]++; setAttempts(a);
                    const s = [...statuses]; s[i] = a[i] >= 2 ? 'wrong-final' : 'wrong-once'; setStatuses(s);
                }
            };

            const rättaAlla = () => { setStatuses(statuses.map(s => s === 'correct' ? 'correct' : 'wrong-final')); setDone(true); };
            const börjaOm = () => { setInputs(concepts.map(() => '')); setAttempts(concepts.map(() => 0)); setStatuses(concepts.map(() => null)); setDone(false); };

            const correctCount = statuses.filter(s => s === 'correct').length;
            const allDone = done || statuses.every(s => s === 'correct' || s === 'wrong-final');

            return (
                <div>
                    <div className="mb-6 p-4 bg-white rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Begreppsbank</p>
                        <div className="flex flex-wrap gap-2">
                            {concepts.map((c, i) => (
                                <span key={i} className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${statuses[i] === 'correct' ? 'line-through text-slate-400 bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-300 text-yellow-800'}`}>{c.term}</span>
                            ))}
                        </div>
                    </div>
                    <div className="grid gap-4">
                        {concepts.map((c, i) => {
                            const parts = c.sentence.split('_____');
                            const st = statuses[i];
                            return (
                                <div key={i} className={`bg-white p-5 rounded-2xl shadow-sm border-l-8 transition-all ${st === 'correct' ? 'border-green-500' : st === 'wrong-final' ? 'border-red-400' : 'border-yellow-400'}`}>
                                    <p className="text-slate-700 mb-3 leading-relaxed">{parts[0]}<span className="font-bold text-yellow-600">[_____]</span>{parts[1]}</p>
                                    {st === 'correct' ? (
                                        <div className="flex flex-wrap items-center gap-2 text-green-600"><span className="font-bold">✓ {c.term}</span><span className="text-sm font-normal text-slate-500">– {c.definition}</span></div>
                                    ) : st === 'wrong-final' ? (
                                        <div><p className="text-red-500 text-sm">Rätt svar: <span className="font-bold">{c.term}</span></p><p className="text-slate-500 text-sm mt-1">{c.definition}</p></div>
                                    ) : (
                                        <div>
                                            <div className="flex gap-2">
                                                <input type="text" value={inputs[i]} onChange={e => { const v = [...inputs]; v[i] = e.target.value; setInputs(v); }} onKeyDown={e => e.key === 'Enter' && submit(i)} placeholder="Skriv begreppet och tryck Enter..." className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-yellow-400 text-sm" />
                                                <button onClick={() => submit(i)} className="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-xl font-bold hover:bg-yellow-500 transition-colors">→</button>
                                            </div>
                                            {st === 'wrong-once' && <p className="text-orange-500 text-sm mt-2 font-medium">Är du säker att du stavat rätt?</p>}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="mt-8 flex justify-between items-center">
                        <button onClick={börjaOm} className="text-slate-500 hover:text-slate-700 font-medium transition-colors">↺ Börja om</button>
                        {!allDone && <button onClick={rättaAlla} className="bg-slate-800 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-700 transition-colors">Rätta alla</button>}
                    </div>
                    {allDone && (
                        <div className="mt-8 bg-yellow-50 border-2 border-yellow-400 rounded-3xl p-8 text-center">
                            <p className="text-5xl font-bold text-yellow-500 mb-2">{correctCount}/{concepts.length}</p>
                            <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(correctCount, concepts.length)}</p>
                            <button onClick={börjaOm} className="bg-yellow-400 text-yellow-900 px-8 py-3 rounded-2xl font-bold hover:bg-yellow-500 transition-colors">Börja om</button>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('list');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    let n; do { n = Math.floor(Math.random() * concepts.length); } while (n === currentIndex && concepts.length > 1);
                    setCurrentIndex(n);
                }, 150);
            };

            const activeTab = 'bg-yellow-400 font-bold shadow-sm';
            const inactiveTab = 'text-slate-500';

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-2xl mx-auto mb-8 flex items-center justify-between">
                        <a href="index.html" className="text-slate-500 hover:text-yellow-600 transition-colors flex items-center gap-2 font-medium text-sm">← Tillbaka till startsidan</a>
                        <h1 className="text-2xl md:text-3xl font-bold text-center">Arbetsmarknad & Arbetsliv</h1>
                        <div className="w-36"></div>
                    </header>

                    <div className="max-w-sm mx-auto mb-10 flex bg-white p-1 rounded-full shadow-md border border-slate-200">
                        <button onClick={() => setView('list')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'list' ? activeTab : inactiveTab}`}>Lista</button>
                        <button onClick={() => setView('flashcards')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'flashcards' ? activeTab : inactiveTab}`}>Flashcards</button>
                        <button onClick={() => setView('lucktext')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'lucktext' ? activeTab : inactiveTab}`}>Lucktext</button>
                    </div>

                    <main className="max-w-2xl mx-auto">
                        {view === 'list' && (
                            <div className="grid gap-4">
                                {concepts.map((item, index) => (
                                    <div key={index} className="bg-white p-5 rounded-2xl border-l-8 border-yellow-400 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-1 rounded-lg">{index + 1}</span>
                                            <h3 className="text-lg font-bold">{item.term}</h3>
                                        </div>
                                        <p className="text-slate-600 leading-relaxed ml-10">{item.definition}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {view === 'flashcards' && (
                            <div className="flex flex-col items-center">
                                <div className="flip-card mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`flip-card-inner ${isFlipped ? 'flipped-classes' : ''}`}>
                                        <div className="flip-card-front">
                                            <h2 className="text-3xl font-bold text-slate-900 text-center px-4">{concepts[currentIndex].term}</h2>
                                            <div className="absolute bottom-6 animate-pulse"><span className="text-[10px] uppercase tracking-[0.2em] text-yellow-900 font-bold opacity-70">Klicka för svar</span></div>
                                        </div>
                                        <div className="flip-card-back">
                                            <p className="text-xl leading-relaxed text-slate-800 font-medium px-4">{concepts[currentIndex].definition}</p>
                                            <div className="absolute bottom-6"><span className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Klicka för att vända</span></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center gap-4">
                                    <button onClick={nextCard} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-3 text-lg">Nästa begrepp <span>→</span></button>
                                    <p className="text-slate-500 font-medium bg-slate-200 px-4 py-1 rounded-full text-xs">{currentIndex + 1} av {concepts.length}</p>
                                </div>
                            </div>
                        )}
                        {view === 'lucktext' && <LucktextView />}
                    </main>

                    <footer className="mt-12 text-center text-slate-400 text-sm italic pb-8">Källa: Samhällskunskap – Arbetsmarknad begreppslista</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
