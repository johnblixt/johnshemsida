<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NK - Hållbar Utveckling Quiz (Förbättrad)</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
  <a href="index.html" class="fixed top-4 left-4 z-50 text-sm font-medium text-slate-500 hover:text-slate-800 bg-white/90 px-3 py-2 rounded-xl shadow-sm transition-colors">← Tillbaka till startsidan</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- IKONER ---
    const Leaf = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
    );
    const Trophy = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    );
    const Clock = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    );

    // --- FRÅGOR (BALANSERAD TEXTLÄNGD OCH TROVÄRDIGA DISTRAKTORER) ---
    const chainQuestions = [
      { q: "Vad är oftast det första steget i kedjan som förklarar hur människan påverkar miljön?", a: "Människans konsumtion av varor och tjänster.", i: ["Naturliga variationer i jordens atmosfär.", "Förändringar i havets stora strömmar.", "Ökad aktivitet i solens elektromagnetiska strålning."], step: "Steg 1: Konsumtion" },
      { q: "När fabriker tillverkar saker används ofta kol, olja och gas. Vad kallas dessa gemensamt?", a: "Fossila bränslen.", i: ["Förnybara energikällor.", "Naturliga växthusgaser.", "Hållbara råmaterial."], step: "Steg 2: Resurser" },
      { q: "Vad släpps ut i luften vid förbränning av fossila bränslen?", a: "Växthusgaser som koldioxid.", i: ["Enbart ofarlig vattenånga.", "Ozon som kyler atmosfären.", "Rent syre som gynnar växter."], step: "Steg 3: Utsläpp" },
      { q: "Varför är koldioxid i atmosfären ett problem för klimatet?", a: "Det hindrar värmeutstrålning från jorden.", i: ["Det blockerar solens strålar från att nå ytan.", "Det förstör ozonskiktet så att UV-strålar ökar.", "Det gör att det regnar mindre i hela världen."], step: "Steg 4: Växthuseffekten" },
      { q: "Vad händer med jordens temperatur när växthuseffekten förstärks?", a: "Den globala medeltemperaturen stiger gradvis.", i: ["Temperaturen sjunker drastiskt vid polerna.", "Det blir ingen mätbar skillnad i klimatet.", "Det blir bara varmare under sommarhalvåret."], step: "Steg 5: Temperatur" },
      { q: "Hur kan ökad värme leda till en ökning av skogsbränder?", a: "Värmen torkar ut markskiktet och vegetationen.", i: ["Värmen gör att blixtnedslag sker oftare.", "Värmen gör att trädens bark börjar brinna spontant.", "Värmen gör att djuren rör sig mer i torra områden."], step: "Steg 6: Torka" },
      { q: "Varför leder skogsbränder till ännu mer uppvärmning (en ond cirkel)?", a: "Elden frigör koldioxid som lagrats i träden.", i: ["Röken blockerar solljuset så att jorden värms upp.", "Askan gör att marken drar till sig mer kyla.", "Elden förbrukar syret som behövs för att kyla ner luften."], step: "Steg 7: Ond cirkel" },
      { q: "Vad händer med isarna vid polerna när temperaturen stiger?", a: "Isen smälter och övergår till flytande form.", i: ["Isen blir tätare och reflekterar mer ljus.", "Isen driver mot ekvatorn och kyler haven.", "Isen expanderar på grund av ökad nederbörd."], step: "Steg 8: Smältning" },
      { q: "Vad händer när vit is ersätts av mörkt havsvatten?", a: "Mörkt vatten absorberar mer av solens värme.", i: ["Havet börjar reflektera mer ljus ut i rymden.", "Jorden kyls ner på grund av mer öppet vatten.", "Havet blir sötare och påverkar fiskarnas hälsa."], step: "Steg 9: Reflektion" },
      { q: "Vad blir konsekvensen för kuststäder när isarna vid polerna smälter?", a: "Havsnivåerna stiger och orsakar översvämningar.", i: ["Havsnivån sjunker eftersom isen tog mer plats.", "Det bildas nya landområden nära ekvatorn.", "Vattnet blir drickbart för alla vid kusten."], step: "Steg 10: Havsnivå" }
    ];

    const conceptQuestions = [
      { q: "Vad innebär begreppet 'Hållbar utveckling'?", a: "Att leva bra idag utan att förstöra för framtiden.", i: ["Att öka den ekonomiska tillväxten till varje pris.", "Att helt sluta använda alla former av naturresurser.", "Att bevara naturen precis som den var förr i tiden."], step: "Hållbarhet" },
      { q: "Vilken dimension av hållbarhet fokuserar på ekosystemens hälsa?", a: "Ekologisk hållbarhet.", i: ["Social hållbarhet.", "Ekonomisk hållbarhet.", "Kulturell hållbarhet."], step: "Hållbarhet" },
      { q: "Vilken del av hållbar utveckling handlar om mänskliga rättigheter?", a: "Social hållbarhet.", i: ["Miljömässig hållbarhet.", "Teknisk hållbarhet.", "Finansiell hållbarhet."], step: "Hållbarhet" },
      { q: "Vad kännetecknar 'Ekonomisk hållbarhet'?", a: "Långsiktig resurshantering som ej skadar miljön.", i: ["Maximal vinst på kort sikt för alla företag.", "Att helt förbjuda handel och användning av pengar.", "Att endast köpa de billigaste produkterna på marknaden."], step: "Hållbarhet" },
      { q: "Vad mäter man med ett 'Ekologiskt fotavtryck'?", a: "Mängden naturresurser en människa förbrukar.", i: ["Hur snabbt en person kan gå genom en skog.", "Antalet djurarter som finns i ett specifikt område.", "Hur mycket koldioxid en fabrik släpper ut per år."], step: "Begrepp" },
      { q: "Vad kallas resurser som solen och vinden?", a: "Förnybara naturresurser.", i: ["Ändliga naturresurser.", "Fossila kraftkällor.", "Syntetiska resurser."], step: "Resurser" },
      { q: "Vad är ett exempel på en icke-förnybar resurs?", a: "Naturgas och metaller.", i: ["Vindkraft och solljus.", "Trä och biomassa.", "Vattenkraft och vågor."], step: "Resurser" },
      { q: "Vad innebär begreppet 'Biologisk mångfald'?", a: "Variationsrikedom bland arter och ekosystem.", i: ["Att det finns många individer av en enda art.", "Att vi planterar samma sorts träd i hela skogen.", "Att vi begränsar naturen till skyddade områden."], step: "Natur" },
      { q: "Vad är 'Ekosystemtjänster'?", a: "Nyttor naturen ger oss, som vattenrening.", i: ["Arbete som utförs av parkarbetare i städer.", "Produkter vi köper i ekologiska matbutiker.", "Maskiner som renar luft i stora industrier."], step: "Natur" },
      { q: "Vad är ett av de största hoten mot biologisk mångfald?", a: "Förlust av livsmiljöer genom exploatering.", i: ["Att vi planterar för mycket blommor i trädgårdar.", "Att solens strålning ökar under sommartid.", "Att det finns för många pollinerande insekter."], step: "Natur" },
      { q: "Vad undersöker man i en 'Livscykelanalys' (LCA)?", a: "Miljöpåverkan från utvinning till sluthantering.", i: ["Hur länge ett vilt djur lever i sin naturliga miljö.", "Hur många konsumenter som köper en viss vara.", "Vilken färg en produkt bör ha för att sälja bäst."], step: "Analys" },
      { q: "Vad innebär begreppet 'Cirkulär ekonomi'?", a: "Ett system där material återanvänds och sparas.", i: ["Att pengar cirkulerar snabbt mellan olika banker.", "Att alla butiker placeras i en cirkel för enkelhet.", "Att vi köper nya saker och slänger de gamla direkt."], step: "Ekonomi" },
      { q: "Vad fokuserar 'Klimaträttvisa' på?", a: "Ansvarsfördelning mellan rika och fattiga länder.", i: ["Att alla människor ska betala samma mängd skatt.", "Att lagar ska bestämma hur varmt det får vara ute.", "Att alla länder ska sluta handla med varandra helt."], step: "Rättvisa" },
      { q: "Vad är det primära målet med Parisavtalet?", a: "Begränsa den globala uppvärmningen till under 2°C.", i: ["Att göra Paris till världens mest miljövänliga stad.", "Att alla länder ska byta till samma valuta år 2030.", "Att förbjuda alla flygresor inom hela Europa."], step: "Avtal" },
      { q: "Vad är 'Globala målen' (Agenda 2030)?", a: "Mål för social, ekonomisk och miljömässig hälsa.", i: ["En lista på världens mest framgångsrika företag.", "En tävling mellan länder om vem som är bäst.", "Regler för hur man bygger säkra kärnkraftverk."], step: "Avtal" }
    ];

    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

    // Formatering av tid (mm:ss)
    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    };

    function App() {
      const [gameState, setGameState] = useState('start');
      const [allQuestions, setAllQuestions] = useState([]);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [score, setScore] = useState(0);
      const [selected, setSelected] = useState(null);
      const [shuffledOptions, setShuffledOptions] = useState([]);
      const [timer, setTimer] = useState(0);
      
      const timerRef = useRef(null);

      useEffect(() => {
        if (gameState === 'play') {
          timerRef.current = setInterval(() => {
            setTimer(prev => prev + 1);
          }, 1000);
        } else {
          clearInterval(timerRef.current);
        }
        return () => clearInterval(timerRef.current);
      }, [gameState]);

      const start = () => {
        const combined = [...chainQuestions, ...shuffle(conceptQuestions)];
        setAllQuestions(combined);
        setCurrentIdx(0);
        setScore(0);
        setTimer(0);
        setSelected(null);
        setGameState('play');
        const firstQ = combined[0];
        setShuffledOptions(shuffle([firstQ.a, ...firstQ.i]));
      };

      const handleAns = (ans) => {
        if (selected) return;
        setSelected(ans);
        if (ans === allQuestions[currentIdx].a) setScore(score + 1);
      };

      const next = () => {
        const nextIdx = currentIdx + 1;
        if (nextIdx < allQuestions.length) {
          setCurrentIdx(nextIdx);
          setSelected(null);
          const nextQ = allQuestions[nextIdx];
          setShuffledOptions(shuffle([nextQ.a, ...nextQ.i]));
        } else {
          setGameState('end');
        }
      };

      if (gameState === 'start') return (
        <div className="flex items-center justify-center min-h-screen p-4 text-center">
          <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full border-t-8 border-green-500">
            <Leaf className="w-16 h-16 text-green-500 mx-auto mb-4" />
            <h1 className="text-2xl font-black mb-2 uppercase tracking-tight">NK: Miljöquiz</h1>
            <p className="text-slate-500 mb-6 font-medium">Testa dina kunskaper om hållbar utveckling och orsakskedjan.</p>
            <button onClick={start} className="w-full bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-600 transition-all active:scale-95">Starta Spelet</button>
          </div>
        </div>
      );

      if (gameState === 'end') return (
        <div className="flex items-center justify-center min-h-screen p-4 text-center">
          <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full border-t-8 border-green-500">
            <Trophy className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
            <h2 className="text-2xl font-black mb-2 text-slate-800">Bra jobbat!</h2>
            <div className="space-y-1 mb-6">
                <p className="text-4xl font-black text-green-500">{score} / {allQuestions.length}</p>
                <p className="text-slate-400 font-bold flex items-center justify-center gap-2">
                    <Clock className="w-4 h-4" /> Tid: {formatTime(timer)}
                </p>
            </div>
            <button onClick={start} className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl mb-3 shadow-md">Spela igen</button>
          </div>
        </div>
      );

      const q = allQuestions[currentIdx];

      return (
        <div className="flex flex-col items-center min-h-screen p-4 pt-8">
          <div className="w-full max-w-md">
            <div className="flex justify-between items-end text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">
              <div className="flex flex-col">
                <span className="text-green-500">{q.step}</span>
                <span>Fråga {currentIdx + 1} / {allQuestions.length}</span>
              </div>
              <div className="flex items-center gap-1 text-slate-500">
                <Clock className="w-3 h-3" />
                <span>{formatTime(timer)}</span>
              </div>
            </div>
            <div className="h-2 bg-slate-200 rounded-full mb-6 overflow-hidden">
              <div className="h-full bg-green-500 transition-all duration-500" style={{width: `${((currentIdx+1)/allQuestions.length)*100}%`}}></div>
            </div>
            <div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border-b-4 border-slate-100">
              <h2 className="text-lg font-bold text-slate-800 leading-snug">{q.q}</h2>
            </div>
            <div className="space-y-3">
              {shuffledOptions.map((opt, i) => (
                <button key={i} onClick={() => handleAns(opt)} disabled={!!selected} className={`w-full text-left p-4 rounded-xl font-bold border-2 transition-all ${
                  !selected ? "bg-white border-slate-100 hover:border-green-400 hover:shadow-sm" : 
                  opt === q.a ? "bg-green-50 border-green-500 text-green-700" : 
                  opt === selected ? "bg-red-50 border-red-500 text-red-700" : "bg-white border-slate-50 text-slate-300 opacity-60"
                }`}>
                  {opt}
                </button>
              ))}
            </div>
            {selected && (
              <button onClick={next} className="w-full mt-8 bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 animate-bounce-subtle">
                {currentIdx + 1 === allQuestions.length ? "Visa Resultat" : "Gå Vidare"}
              </button>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <style>
    @keyframes bounce-subtle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .animate-bounce-subtle {
      animation: bounce-subtle 2s infinite ease-in-out;
    }
  </style>
</body>
</html>
