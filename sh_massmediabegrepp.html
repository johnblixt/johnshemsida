<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Begreppslista - Samhällskunskap</title>
    <!-- Google Fonts: Fredoka -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
        }

        /* 3D Flip Animation Logic */
        .perspective-1000 {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .flipped {
            transform: rotateY(180deg);
        }
        
        /* Smooth transitions */
        .transition-transform-600 {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const mediaConcepts = [
            { term: "Pressfrihet", definition: "journalisters rätt att skriva och rapportera fritt utan censur, hot eller straff." },
            { term: "Yttrandefrihet", definition: "människors rätt att uttrycka sina åsikter i tal, text och bild." },
            { term: "Fri opinionsbildning", definition: "möjligheten att fritt bilda, uttrycka och sprida åsikter i samhället." },
            { term: "Granskande journalistik", definition: "när medier undersöker och avslöjar maktmissbruk och missförhållanden." },
            { term: "Public service", definition: "medier som ska vara sakliga, opartiska och arbeta i allmänhetens tjänst." },
            { term: "Pressetik", definition: "etiska regler för journalistik, t.ex. korrekthet, allsidighet och skydd av privatliv." },
            { term: "Källkritik", definition: "att granska och värdera källors trovärdighet och syfte." },
            { term: "Meddelarfrihet", definition: "rätten att lämna information till medier utan att bli straffad." },
            { term: "Offentlighetsprincipen", definition: "rätten att ta del av offentliga handlingar och dokument." },
            { term: "Censur", definition: "när staten eller makthavare kontrollerar eller stoppar information." },
            { term: "Propaganda", definition: "vinklad information som sprids för att påverka människors åsikter." },
            { term: "Övervakning", definition: "när staten eller andra aktörer följer människors kommunikation och beteende." },
            { term: "Nyhetsvärdering", definition: "processen där man avgör vilka händelser som blir nyheter." },
            { term: "Algoritm", definition: "datorprogram som styr vilket innehåll du får se, baserat på ditt beteende." },
            { term: "Filterbubbla", definition: "när algoritmer gör att du mest ser sådant som bekräftar dina åsikter." },
            { term: "Ekokammare", definition: "en miljö där liknande åsikter förstärks och motstånd saknas." },
            { term: "Desinformation", definition: "falsk information som sprids medvetet för att vilseleda." },
            { term: "Misinformation", definition: "felaktig information som sprids utan avsikt att lura." },
            { term: "Konfirmationsbias", definition: "tendensen att söka och tro på information som bekräftar det man redan tycker." },
            { term: "Klicklogik", definition: "när medier prioriterar innehåll som ger många klick snarare än samhällsnytta." }
        ];

        function App() {
            const [view, setView] = useState('list'); // 'list' or 'flashcards'
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const handleNextCard = () => {
                setIsFlipped(false);
                // Wait for flip back animation before changing content
                setTimeout(() => {
                    let nextIndex;
                    do {
                        nextIndex = Math.floor(Math.random() * mediaConcepts.length);
                    } while (nextIndex === currentIndex && mediaConcepts.length > 1);
                    setCurrentIndex(nextIndex);
                }, 150);
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-8">
                    {/* Navigation */}
                    <div className="flex items-center justify-between mb-8">
                        <a href="index.html" className="text-slate-500 hover:text-slate-800 transition-colors flex items-center font-medium">
                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            Portal
                        </a>
                        <div className="bg-yellow-100 p-1 rounded-full flex">
                            <button 
                                onClick={() => setView('list')}
                                className={`px-6 py-2 rounded-full text-sm font-bold transition-all ${view === 'list' ? 'bg-yellow-400 text-white shadow-sm' : 'text-yellow-700'}`}
                            >
                                LISTA
                            </button>
                            <button 
                                onClick={() => setView('flashcards')}
                                className={`px-6 py-2 rounded-full text-sm font-bold transition-all ${view === 'flashcards' ? 'bg-yellow-400 text-white shadow-sm' : 'text-yellow-700'}`}
                            >
                                FLASHCARDS
                            </button>
                        </div>
                    </div>

                    <header className="text-center mb-12">
                        <h1 className="text-4xl md:text-5xl font-bold text-slate-900 mb-2">Mediebegrepp</h1>
                        <p className="text-slate-500 italic">Samhällskunskap - Begrepp och Definitioner</p>
                    </header>

                    {view === 'list' ? (
                        /* List View */
                        <div className="space-y-4">
                            {mediaConcepts.map((item, index) => (
                                <div key={index} className="bg-white p-5 rounded-2xl shadow-sm border border-yellow-100 flex items-start gap-4 hover:shadow-md transition-shadow">
                                    <span className="bg-yellow-400 text-white w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-bold text-sm">
                                        {index + 1}
                                    </span>
                                    <div>
                                        <h3 className="font-bold text-lg text-slate-800 mb-1">{item.term}</h3>
                                        <p className="text-slate-600 leading-relaxed">{item.definition}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        /* Flashcards View */
                        <div className="flex flex-col items-center">
                            <div 
                                className="w-full max-w-md h-80 perspective-1000 cursor-pointer group"
                                onClick={() => setIsFlipped(!isFlipped)}
                            >
                                <div className={`relative w-full h-full text-center transition-transform-600 preserve-3d ${isFlipped ? 'flipped' : ''}`}>
                                    
                                    {/* Front Side */}
                                    <div className="absolute w-full h-full bg-white rounded-3xl shadow-xl border-4 border-yellow-400 flex flex-col items-center justify-center p-8 backface-hidden">
                                        <span className="text-yellow-400 font-bold mb-4 uppercase tracking-widest text-xs">Begrepp</span>
                                        <h2 className="text-3xl md:text-4xl font-bold text-slate-800">{mediaConcepts[currentIndex].term}</h2>
                                        <div className="mt-8 text-slate-300">
                                            <p className="text-sm font-medium">Klicka för att se definition</p>
                                        </div>
                                    </div>

                                    {/* Back Side */}
                                    <div className="absolute w-full h-full bg-yellow-50 rounded-3xl shadow-xl border-4 border-yellow-400 flex flex-col items-center justify-center p-8 backface-hidden rotate-y-180">
                                        <span className="text-yellow-500 font-bold mb-4 uppercase tracking-widest text-xs">Definition</span>
                                        <p className="text-xl text-slate-800 leading-relaxed">
                                            {mediaConcepts[currentIndex].definition}
                                        </p>
                                    </div>

                                </div>
                            </div>

                            <div className="mt-12 flex flex-col items-center gap-4">
                                <button 
                                    onClick={handleNextCard}
                                    className="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-4 px-12 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center gap-2"
                                >
                                    NÄSTA KORT
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                    </svg>
                                </button>
                                <p className="text-slate-400 text-sm">Kort {currentIndex + 1} av {mediaConcepts.length}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
