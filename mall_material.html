<!DOCTYPE html>
<!--
  MALL FÖR PLUGGMATERIAL-SIDOR
  =============================
  Kopiera den här filen och ersätt:
    [TITEL]      → Ämnets namn, t.ex. "Demokrati"
    [KURS]       → Kursnamn, t.ex. "Samhällskunskap Sa1a1"
    [PRIMÄRFÄRG] → Hex-färg för ämnet (se CLAUDE.md)
    [PREFIX]     → Filprefixet, t.ex. "sh_demokrati"

  När en mediafil finns:
    - Ändra <div>-taggen till <a href="[PREFIX]_text.html">
    - Ta bort opacity-50 och cursor-not-allowed
    - Byt "Kommer snart" mot "Öppna →" med ämnets färg
-->
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluggmaterial – [TITEL]</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'EB Garamond', serif; font-size: 1.05rem; }
        .card-link { transition: all 0.2s ease; }
        .card-link:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-xl mx-auto px-6 py-10">

        <div class="flex items-center justify-between mb-8">
            <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">← Tillbaka till startsidan</a>
            <div></div>
        </div>

        <div class="border-l-4 pl-4 mb-10" style="border-color: [PRIMÄRFÄRG];">
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">[KURS] · Pluggmaterial</p>
            <h1 class="text-3xl md:text-4xl font-bold italic text-slate-900">[TITEL]</h1>
        </div>

        <div class="space-y-4">

            <!-- TEXT — byt till <a href="[PREFIX]_text.html"> när filen finns -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 flex items-center gap-5 opacity-50 cursor-not-allowed select-none">
                <span class="text-4xl flex-shrink-0">📄</span>
                <div class="flex-1 min-w-0">
                    <h2 class="text-xl font-bold text-slate-800">Text</h2>
                    <p class="text-slate-500 text-sm mt-0.5">Sammanfattning och nyckelbegrepp att läsa</p>
                </div>
                <span class="text-slate-300 text-sm italic flex-shrink-0">Kommer snart</span>
            </div>

            <!-- Exempel: tillgänglig länk
            <a href="[PREFIX]_text.html" class="bg-white rounded-2xl border-2 shadow-sm p-6 flex items-center gap-5 card-link" style="border-color: [PRIMÄRFÄRG];">
                <span class="text-4xl flex-shrink-0">📄</span>
                <div class="flex-1 min-w-0">
                    <h2 class="text-xl font-bold text-slate-800">Text</h2>
                    <p class="text-slate-500 text-sm mt-0.5">Sammanfattning och nyckelbegrepp att läsa</p>
                </div>
                <span class="font-bold flex-shrink-0" style="color: [PRIMÄRFÄRG];">Öppna →</span>
            </a>
            -->

            <!-- VIDEO — byt till <a href="[PREFIX]_video.html"> när filen finns -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 flex items-center gap-5 opacity-50 cursor-not-allowed select-none">
                <span class="text-4xl flex-shrink-0">🎬</span>
                <div class="flex-1 min-w-0">
                    <h2 class="text-xl font-bold text-slate-800">Video</h2>
                    <p class="text-slate-500 text-sm mt-0.5">Genomgångar och förklarande klipp</p>
                </div>
                <span class="text-slate-300 text-sm italic flex-shrink-0">Kommer snart</span>
            </div>

            <!-- LJUD — byt till <a href="[PREFIX]_ljud.html"> när filen finns -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 flex items-center gap-5 opacity-50 cursor-not-allowed select-none">
                <span class="text-4xl flex-shrink-0">🎧</span>
                <div class="flex-1 min-w-0">
                    <h2 class="text-xl font-bold text-slate-800">Ljud</h2>
                    <p class="text-slate-500 text-sm mt-0.5">Lyssna på sammanfattningar</p>
                </div>
                <span class="text-slate-300 text-sm italic flex-shrink-0">Kommer snart</span>
            </div>

        </div>

        <footer class="mt-16 text-center border-t border-slate-200 pt-8">
            <p class="text-slate-400 text-xs uppercase tracking-[0.2em] font-black italic">Designad av John</p>
        </footer>

    </div>
</body>
</html>
