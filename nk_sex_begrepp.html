<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begrepp: Sexualitet och Normer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif; }
        .flip-card { perspective: 1000px; height: 350px; width: 100%; max-width: 400px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped-classes { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .flip-card-front { background-color: #22c55e; border: 6px solid white; }
        .flip-card-back { background-color: white; border: 6px solid #22c55e; transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const concepts = [
            { term: "Sexualitet", definition: "Ett brett begrepp som rör sexuell läggning, identitet, självkänsla samt värderingar och normer kring hur vi uttrycker oss.", sentence: "_____ är ett brett begrepp – det handlar inte bara om sex, utan också om identitet, känslor och samhällets normer." },
            { term: "Normer", definition: "Oskrivna regler i samhället om vad som anses 'normalt' eller accepterat.", sentence: "_____ om hur man 'bör' bete sig baserat på sitt kön kan skapa press och begränsa individers frihet." },
            { term: "Sexuell läggning", definition: "Beskriver vem man blir kär i eller attraheras av, till exempel heterosexuell eller homosexuell.", sentence: "_____ handlar om vem man attraheras av romantiskt och/eller sexuellt – det är inte ett val." },
            { term: "Könsidentitet", definition: "En persons självupplevda kön, det kön man känner sig som oberoende av biologiskt kön.", sentence: "_____ är det kön en person känner sig som inombords, vilket kan skilja sig från det kön de tillskrevs vid födseln." },
            { term: "HBTQ", definition: "Paraplybegrepp för homosexuella, bisexuella, transpersoner och queera personer.", sentence: "_____ är ett paraplybegrepp som samlar olika sexuella läggningar och könsidentiteter som bryter mot heteronormen." },
            { term: "Samtycke", definition: "Ömsesidighet, frivillighet och samspel – att aktivt säkerställa att alla inblandade vill delta.", sentence: "_____ kräver att alla inblandade aktivt och frivilligt vill delta – tveksamhet är inte ett ja." },
            { term: "Heteronorm", definition: "Föreställningen att heterosexualitet är det 'naturliga' och att det finns bara två tydliga kön.", sentence: "_____ gör att det ofta tas för givet att alla är heterosexuella och passar in i traditionella könsroller." },
            { term: "Sexuell hälsa", definition: "Ett tillstånd av fysiskt, känslomässigt och socialt välbefinnande i förhållande till sexualitet.", sentence: "_____ handlar om att ha en positiv och trygg relation till sin sexualitet, fri från tvång, skam och sjukdomar." },
            { term: "Hormoner", definition: "Signalämnen i kroppen som styr funktioner som sexlust, pubertet, tillväxt och humör.", sentence: "_____ som testosteron och östrogen reglerar många kroppsliga funktioner, inklusive puberteten." },
            { term: "Testosteron", definition: "Ett könshormon som reglerar sexuell lust, muskelmassa och spermaproduktion.", sentence: "_____ finns hos alla kön men i olika mängder och påverkar bland annat muskelmassa och sexlust." },
            { term: "Östrogen", definition: "Ett könshormon som reglerar menscykeln, bentäthet och förbereder kroppen för graviditet.", sentence: "_____ reglerar menscykeln och spelar en viktig roll för benhälsa och det reproduktiva systemet." },
            { term: "Menscykeln", definition: "Den återkommande biologiska processen (ca 28 dagar) där kroppen förbereder sig för en eventuell graviditet.", sentence: "_____ varar ungefär 28 dagar och inkluderar bland annat ägglossning och eventuell mensblödning." },
            { term: "Ägglossning", definition: "När ett moget ägg släpps från äggstocken – den mest fertila perioden i menscykeln.", sentence: "Under _____ frigörs ett ägg från äggstocken och kan befruktas om det möter en spermie." },
            { term: "STI", definition: "Sexually Transmitted Infections – infektioner som sprids vid sexuella kontakter.", sentence: "Klamydia är en vanlig _____ som kan behandlas med antibiotika men kräver att man testar sig." },
            { term: "Våldspyramiden", definition: "En modell som visar hur lindrigt våld normaliserar och banar väg för grövre våld.", sentence: "_____ illustrerar hur sexistiska skämt och kränkande kommentarer kan normalisera och bana väg för grövre övergrepp." },
            { term: "Avhumanisering", definition: "En process där man ser andra som mindre mänskliga för att rättfärdiga våld eller diskriminering.", sentence: "_____ av en grupp – att kalla dem djur eller monster – är ett steg mot att rättfärdiga hat och våld." },
            { term: "Homofobi", definition: "En negativ syn på eller rädsla för homosexuella och bisexuella personer.", sentence: "_____ kan yttra sig som verbala kränkningar, diskriminering eller fysiskt våld mot hbtq-personer." },
            { term: "Porrskador", definition: "Negativa effekter av överdriven porrkonsumtion, som skeva förväntningar på sex.", sentence: "_____ kan inkludera orealistiska förväntningar på sex och relationer, särskilt hos unga som konsumerar mycket pornografi." },
            { term: "Cisperson", definition: "En person vars könsidentitet stämmer överens med det kön de tillskrevs vid födseln.", sentence: "En _____ är någon vars upplevda kön stämmer överens med det kön de fick vid födseln – motsatsen till transperson." },
            { term: "Slidkrans", definition: "Slemhinneveck vid slidmynningen. Att det skulle vara en 'mödomshinna' som spricker är en myt.", sentence: "_____ är ett slemhinneveck – inte en hinna som spricker – och myten om mödomshinna är medicinsk felaktig." }
        ];

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getFeedback(score, total) {
            const p = score / total;
            if (p >= 0.9) return "Redo för provet! Fantastiskt bra!";
            if (p >= 0.7) return "Bra jobbat! Öva lite till på de du missade.";
            if (p >= 0.5) return "Halvvägs! Fortsätt träna.";
            return "Öva lite till – du är på rätt väg!";
        }

        function LucktextView() {
            const [inputs, setInputs] = useState(concepts.map(() => ''));
            const [attempts, setAttempts] = useState(concepts.map(() => 0));
            const [statuses, setStatuses] = useState(concepts.map(() => null));
            const [done, setDone] = useState(false);

            const normalize = s => s.trim().toLowerCase();

            const submit = (i) => {
                if (statuses[i] === 'correct' || statuses[i] === 'wrong-final') return;
                if (normalize(inputs[i]) === normalize(concepts[i].term)) {
                    const s = [...statuses]; s[i] = 'correct'; setStatuses(s);
                } else {
                    const a = [...attempts]; a[i]++; setAttempts(a);
                    const s = [...statuses]; s[i] = a[i] >= 2 ? 'wrong-final' : 'wrong-once'; setStatuses(s);
                }
            };

            const rättaAlla = () => { setStatuses(statuses.map(s => s === 'correct' ? 'correct' : 'wrong-final')); setDone(true); };
            const börjaOm = () => { setInputs(concepts.map(() => '')); setAttempts(concepts.map(() => 0)); setStatuses(concepts.map(() => null)); setDone(false); };

            const correctCount = statuses.filter(s => s === 'correct').length;
            const allDone = done || statuses.every(s => s === 'correct' || s === 'wrong-final');

            return (
                <div>
                    <div className="mb-6 p-4 bg-white rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Begreppsbank</p>
                        <div className="flex flex-wrap gap-2">
                            {concepts.map((c, i) => (
                                <span key={i} className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${statuses[i] === 'correct' ? 'line-through text-slate-400 bg-green-50 border-green-200' : 'bg-green-50 border-green-300 text-green-800'}`}>{c.term}</span>
                            ))}
                        </div>
                    </div>
                    <div className="grid gap-4">
                        {concepts.map((c, i) => {
                            const parts = c.sentence.split('_____');
                            const st = statuses[i];
                            return (
                                <div key={i} className={`bg-white p-5 rounded-2xl shadow-sm border-l-8 transition-all ${st === 'correct' ? 'border-green-500' : st === 'wrong-final' ? 'border-red-400' : 'border-green-500'}`}>
                                    <p className="text-slate-700 mb-3 leading-relaxed">{parts[0]}<span className="font-bold text-green-600">[_____]</span>{parts[1]}</p>
                                    {st === 'correct' ? (
                                        <div className="flex flex-wrap items-center gap-2 text-green-600"><span className="font-bold">✓ {c.term}</span><span className="text-sm font-normal text-slate-500">– {c.definition}</span></div>
                                    ) : st === 'wrong-final' ? (
                                        <div><p className="text-red-500 text-sm">Rätt svar: <span className="font-bold">{c.term}</span></p><p className="text-slate-500 text-sm mt-1">{c.definition}</p></div>
                                    ) : (
                                        <div>
                                            <div className="flex gap-2">
                                                <input type="text" value={inputs[i]} onChange={e => { const v = [...inputs]; v[i] = e.target.value; setInputs(v); }} onKeyDown={e => e.key === 'Enter' && submit(i)} placeholder="Skriv begreppet och tryck Enter..." className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-400 text-sm" />
                                                <button onClick={() => submit(i)} className="bg-green-500 text-white px-4 py-2 rounded-xl font-bold hover:bg-green-600 transition-colors">→</button>
                                            </div>
                                            {st === 'wrong-once' && <p className="text-orange-500 text-sm mt-2 font-medium">Är du säker att du stavat rätt?</p>}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="mt-8 flex justify-between items-center">
                        <button onClick={börjaOm} className="text-slate-500 hover:text-slate-700 font-medium transition-colors">↺ Börja om</button>
                        {!allDone && <button onClick={rättaAlla} className="bg-slate-800 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-700 transition-colors">Rätta alla</button>}
                    </div>
                    {allDone && (
                        <div className="mt-8 bg-green-50 border-2 border-green-500 rounded-3xl p-8 text-center">
                            <p className="text-5xl font-bold text-green-500 mb-2">{correctCount}/{concepts.length}</p>
                            <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(correctCount, concepts.length)}</p>
                            <button onClick={börjaOm} className="bg-green-500 text-white px-8 py-3 rounded-2xl font-bold hover:bg-green-600 transition-colors">Börja om</button>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('list');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    let n; do { n = Math.floor(Math.random() * concepts.length); } while (n === currentIndex && concepts.length > 1);
                    setCurrentIndex(n);
                }, 150);
            };

            const activeTab = 'bg-green-500 text-white font-bold shadow-sm';
            const inactiveTab = 'text-slate-500';

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-2xl mx-auto mb-8 flex items-center justify-between">
                        <a href="index.html" className="text-slate-500 hover:text-green-600 transition-colors flex items-center gap-2 font-medium text-sm">← Tillbaka till startsidan</a>
                        <h1 className="text-2xl md:text-3xl font-bold text-center">Sexualitet & Normer</h1>
                        <div className="w-36"></div>
                    </header>

                    <div className="max-w-sm mx-auto mb-10 flex bg-white p-1 rounded-full shadow-md border border-slate-200">
                        <button onClick={() => setView('list')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'list' ? activeTab : inactiveTab}`}>Lista</button>
                        <button onClick={() => setView('flashcards')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'flashcards' ? activeTab : inactiveTab}`}>Flashcards</button>
                        <button onClick={() => setView('lucktext')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'lucktext' ? activeTab : inactiveTab}`}>Lucktext</button>
                    </div>

                    <main className="max-w-2xl mx-auto">
                        {view === 'list' && (
                            <div className="grid gap-4">
                                {concepts.map((item, index) => (
                                    <div key={index} className="bg-white p-5 rounded-2xl border-l-8 border-green-500 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-lg">{index + 1}</span>
                                            <h3 className="text-lg font-bold">{item.term}</h3>
                                        </div>
                                        <p className="text-slate-600 leading-relaxed ml-10">{item.definition}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {view === 'flashcards' && (
                            <div className="flex flex-col items-center">
                                <div className="flip-card mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`flip-card-inner ${isFlipped ? 'flipped-classes' : ''}`}>
                                        <div className="flip-card-front">
                                            <h2 className="text-3xl font-bold text-white text-center px-4">{concepts[currentIndex].term}</h2>
                                            <div className="absolute bottom-6 animate-pulse"><span className="text-[10px] uppercase tracking-[0.2em] text-green-100 font-bold opacity-80">Klicka för svar</span></div>
                                        </div>
                                        <div className="flip-card-back">
                                            <p className="text-xl leading-relaxed text-slate-800 font-medium px-4">{concepts[currentIndex].definition}</p>
                                            <div className="absolute bottom-6"><span className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Klicka för att vända</span></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center gap-4">
                                    <button onClick={nextCard} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-3 text-lg">Nästa begrepp <span>→</span></button>
                                    <p className="text-slate-500 font-medium bg-slate-200 px-4 py-1 rounded-full text-xs">{currentIndex + 1} av {concepts.length}</p>
                                </div>
                            </div>
                        )}
                        {view === 'lucktext' && <LucktextView />}
                    </main>

                    <footer className="mt-12 text-center text-slate-400 text-sm italic pb-8">Källa: Naturkunskap – Sexualitet och Normer begreppslista</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
