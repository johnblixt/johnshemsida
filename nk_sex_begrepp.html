<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 20 Begrepp: Sexualitet och Normer</title>
    <!-- React och ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel för JSX-stöd -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .is-flipped { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const begreppData = [
            { term: "Sexualitet", def: "Ett brett begrepp som rör sexuell läggning, identitet, självkänsla samt de värderingar och normer som påverkar hur vi uttrycker oss." },
            { term: "Normer", def: "Oskrivna regler i samhället om vad som anses 'normalt' eller accepterat, till exempel hur man förväntas bete sig baserat på kön." },
            { term: "Sexuell läggning", def: "Beskriver vem man blir kär i eller attraheras av, till exempel heterosexuell, homosexuell eller bisexuell." },
            { term: "Könsidentitet", def: "En persons självupplevda kön, det vill säga det kön man känner sig som (oberoende av biologiskt kön)." },
            { term: "HBTQ", def: "Ett paraplybegrepp för homosexuella, bisexuella, transpersoner och queera personer." },
            { term: "Samtycke", def: "Ömsesidighet, frivillighet och samspel. Att aktivt säkerställa att alla inblandade vill delta i en sexuell handling." },
            { term: "Heteronorm", def: "Föreställningen att heterosexualitet är det 'naturliga' och att människor bara delas in i två tydliga kön som åtrår varandra." },
            { term: "Sexuell hälsa", def: "Ett tillstånd av fysiskt, känslomässigt och socialt välbefinnande i förhållande till sexualitet, inklusive trygghet och skydd mot sjukdomar." },
            { term: "Hormoner", def: "Signalämnen i kroppen som styr funktioner som sexlust, pubertet, tillväxt och humör." },
            { term: "Testosteron", def: "Ett könshormon (finns hos alla) som reglerar sexuell lust, muskelmassa och spermaproduktion." },
            { term: "Östrogen", def: "Ett könshormon (finns hos alla) som reglerar menscykeln, bentäthet och förbereder kroppen för graviditet." },
            { term: "Menscykeln", def: "Den återkommande biologiska processen (ca 28 dagar) där kroppen förbereder sig för en eventuell graviditet." },
            { term: "Ägglossning", def: "När ett moget ägg släpps från äggstocken. Det är den mest fertila perioden i menscykeln." },
            { term: "STI", def: "Sexually Transmitted Infections. Infektioner som sprids vid sexuella kontakter, till exempel klamydia eller herpes." },
            { term: "Våldspyramiden", def: "En modell som visar hur lindrigt våld (skämt, kommentarer) normaliserar och banar väg för grövre våld (misshandel, mord)." },
            { term: "Avhumanisering", def: "En process där man ser andra som mindre mänskliga för att rättfärdiga våld eller diskriminering." },
            { term: "Homofobi", def: "En negativ syn på eller rädsla för homosexuella och bisexuella personer." },
            { term: "Porrskador", def: "Negativa effekter på hjärnan av överdriven porrkonsumtion, som minskad känslighet för dopamin eller skeva förväntningar på sex." },
            { term: "Cisperson", def: "En person vars könsidentitet stämmer överens med det kön de tillskrevs vid födseln (motsats till transperson)." },
            { term: "Slidkrans", def: "Slemhinneveck vid slidmynningen. Att det skulle vara en 'mödomshinna' som spricker är en myt." }
        ];

        function App() {
            const [view, setView] = useState('lista');
            const [currentCardIdx, setCurrentCardIdx] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            
            const shuffledBegrepp = useMemo(() => {
                return [...begreppData].sort(() => Math.random() - 0.5);
            }, []);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentCardIdx((prev) => (prev + 1) % shuffledBegrepp.length);
                }, 150);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-white border-b border-emerald-200 sticky top-0 z-30 shadow-sm">
                        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                            <a href="index.html" className="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2 transition-colors">
                                <span>←</span> Portal
                            </a>
                            <h1 className="text-xl font-bold text-slate-800 hidden sm:block">20 Centrala Begrepp</h1>
                            <div className="flex bg-emerald-50 p-1 rounded-lg">
                                <button onClick={() => setView('lista')} className={`px-4 py-1 rounded-md text-sm font-semibold transition-all ${view === 'lista' ? 'bg-emerald-500 text-white shadow-sm' : 'text-emerald-700 hover:bg-emerald-100'}`}>Lista</button>
                                <button onClick={() => setView('cards')} className={`px-4 py-1 rounded-md text-sm font-semibold transition-all ${view === 'cards' ? 'bg-emerald-500 text-white shadow-sm' : 'text-emerald-700 hover:bg-emerald-100'}`}>Flashcards</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 mt-8">
                        {view === 'lista' ? (
                            <div className="space-y-4 animate-in fade-in duration-500">
                                <div className="bg-emerald-500 text-white p-6 rounded-2xl mb-8 shadow-md">
                                    <h2 className="text-2xl font-bold mb-2">Centrala Begrepp</h2>
                                    <p className="opacity-90">De 20 viktigaste begreppen från presentationen om sexualitet, biologi och normer.</p>
                                </div>
                                <div className="grid gap-3">
                                    {begreppData.map((item, idx) => (
                                        <div key={idx} className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:border-emerald-300 transition-colors flex gap-4">
                                            <div className="bg-emerald-100 text-emerald-600 font-bold h-8 w-8 rounded-full flex items-center justify-center shrink-0 text-sm">{idx + 1}</div>
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800 mb-1">{item.term}</h3>
                                                <p className="text-slate-600 leading-relaxed text-sm sm:text-base">{item.def}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center justify-center mt-8 sm:mt-12 animate-in fade-in zoom-in-95 duration-500">
                                <p className="text-slate-400 text-sm font-medium uppercase tracking-wider mb-4">Kort {currentCardIdx + 1} av {shuffledBegrepp.length}</p>
                                <div className="relative w-full max-w-md h-80 perspective-1000 cursor-pointer" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`relative w-full h-full preserve-3d flip-card-inner ${isFlipped ? 'is-flipped' : ''}`}>
                                        <div className="absolute inset-0 w-full h-full backface-hidden bg-white border-2 border-emerald-500 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center">
                                            <span className="text-emerald-500 mb-4 bg-emerald-50 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Begrepp</span>
                                            <h3 className="text-3xl font-bold text-slate-800">{shuffledBegrepp[currentCardIdx].term}</h3>
                                            <p className="mt-8 text-slate-400 text-sm italic">Klicka för att vända</p>
                                        </div>
                                        <div className="absolute inset-0 w-full h-full backface-hidden rotate-y-180 bg-emerald-500 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center text-white">
                                            <span className="text-emerald-100 mb-4 bg-emerald-600/30 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Definition</span>
                                            <p className="text-lg sm:text-xl font-medium leading-relaxed">{shuffledBegrepp[currentCardIdx].def}</p>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={nextCard} className="mt-12 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-12 rounded-full shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all">Nästa kort</button>
                            </div>
                        )}
                    </main>
                    <div className="fixed bottom-0 left-0 w-full h-2 bg-emerald-500 opacity-20"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
