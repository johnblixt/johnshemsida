<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begreppslista - Genteknik (NK2)</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'EB Garamond', serif; }
        .flip-card { perspective: 1000px; height: 350px; width: 100%; max-width: 400px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped-classes { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .flip-card-front { background-color: #4ade80; border: 6px solid white; }
        .flip-card-back { background-color: white; border: 6px solid #4ade80; transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const concepts = [
            {
                term: "Genteknik",
                definition: "Teknik för att ändra, lägga till eller ta bort specifika delar av en organisms DNA med hjälp av laboratorieverktyg.",
                sentence: "Tack vare _____ kan vi idag producera humaninsulin i bakterier och behandla allvarliga genetiska sjukdomar.",
                scenario: "Forskare i ett laboratorium klipper ut en felaktig sekvens i en organisms arvsmassa och sätter in en korrekt kopia för att bota en ärftlig sjukdom.",
                ickeExempel: {
                    korrekt: "Att använda laboratorieverktyg för att klippa bort en muterad gen och ersätta den med en frisk version är genteknik.",
                    icke: "Att korsa två hundraser för att selektivt föra vidare önskade egenskaper är genteknik.",
                    forklaring: "Traditionell avel bygger på naturlig parning – genteknik kräver direkta laboratoriebaserade ingrepp i DNA-sekvensen."
                }
            },
            {
                term: "DNA",
                definition: "Det genetiska materialet i alla levande organismer, bestående av två spiralformade strängar bundna med baspar (A-T och G-C).",
                sentence: "Alla levande celler bär på _____ som innehåller alla instruktioner för hur organismen ska byggas och fungera.",
                scenario: "I kärnan hos varje cell finns en dubbelspiralformad molekyl som innehåller all information om organismen – från ögonfärg till enzymproduktion.",
                ickeExempel: {
                    korrekt: "DNA i cellkärnan innehåller all genetisk information som behövs för att bygga organismen.",
                    icke: "RNA är samma sak som DNA fast i enkelsträngad form och med samma funktion.",
                    forklaring: "RNA är en annan typ av nukleinsyra med delvis annan funktion – DNA och RNA är inte samma molekyl."
                }
            },
            {
                term: "Gen",
                definition: "En specifik sekvens av DNA som kodar för tillverkning av ett protein med en viss funktion i kroppen.",
                sentence: "Mutationen i en enda _____ kan orsaka allvarliga sjukdomar som cystisk fibros och sickelcellanemi.",
                scenario: "En liten, avgränsad bit av arvsmassan innehåller instruktioner för ett specifikt protein som ger ögat dess blåa färg.",
                ickeExempel: {
                    korrekt: "En mutation i genen för hemoglobin kan orsaka sickelcellanemi.",
                    icke: "Hela DNA-molekylen i en cell utgör en enda gen.",
                    forklaring: "En gen är bara en specifik sekvens i DNA – hela genomet innehåller tiotusentals olika gener."
                }
            },
            {
                term: "CRISPR/Cas9",
                definition: "En precisionsmekanism för att klippa och redigera DNA på en exakt bestämd plats – guide-RNA styr enzymet Cas9 till rätt sekvens.",
                sentence: "Med hjälp av _____ kan forskare idag rikta in sig på en enda av de tre miljarder baspar som finns i en cell.",
                scenario: "En forskargrupp programmerar ett system som navigerar till ett exakt ställe bland tre miljarder baspar i genomet och klipper DNA:t där.",
                ickeExempel: {
                    korrekt: "Att använda CRISPR/Cas9 för att stänga av en gen som orsakar cancer är ett exempel på tekniken.",
                    icke: "CRISPR/Cas9 används för att skapa proteiner direkt utan att röra DNA.",
                    forklaring: "CRISPR/Cas9 verkar direkt på DNA-nivå – det är en redigeringsteknik för arvsmassan, inte ett sätt att syntetisera proteiner."
                }
            },
            {
                term: "Guide-RNA",
                definition: "En kort RNA-sekvens (ca 20 baser) som styr CRISPR-enzymet till rätt plats i genomet genom komplementär basparning.",
                sentence: "Forskaren designade ett _____ som exakt matchade den DNA-sekvens de ville redigera bort.",
                scenario: "En liten RNA-molekyl fungerar som ett GPS-system och leder ett enzym exakt till den DNA-sekvens som ska klippas.",
                ickeExempel: {
                    korrekt: "Forskaren designade ett guide-RNA som matchade den defekta sekvens de ville redigera.",
                    icke: "Guide-RNA klipper själv det DNA-avsnitt som ska redigeras.",
                    forklaring: "Det är enzymet Cas9 som klipper – guide-RNA navigerar bara till rätt plats, det klipper inte."
                }
            },
            {
                term: "Mutation",
                definition: "En förändring i DNA-sekvensen som kan uppstå spontant, som följd av strålning eller kemikalier, eller avsiktligt via CRISPR.",
                sentence: "En _____ i BCL11A-genen används terapeutiskt för att reaktivera fosterformen av hemoglobin hos sickelcellanemi-patienter.",
                scenario: "Under ett experiment klipper man bort en specifik nukleotid ur DNA-strängen, vilket förändrar hela proteinets struktur och funktion.",
                ickeExempel: {
                    korrekt: "En mutation i BCL11A-genen kan reaktivera fosterformen av hemoglobin.",
                    icke: "En mutation leder alltid till allvarlig sjukdom.",
                    forklaring: "De flesta mutationer är neutrala eller utan effekt – det är bara en liten del som orsakar sjukdom."
                }
            },
            {
                term: "Genterapi",
                definition: "Behandling av sjukdom genom att föra in, stänga av, reparera eller ersätta genetiskt material i patientens celler.",
                sentence: "_____ har gett hopp åt barn med svår kombinerad immunbrist som tidigare saknade ett fungerande immunsystem.",
                scenario: "Läkare tar prover från en patients celler, lägger in ett fungerande gen och återför cellerna – patienten botas från en livslång immunsjukdom.",
                ickeExempel: {
                    korrekt: "Att föra in en fungerande kopia av en defekt gen i patientens celler för att bota sjukdomen är genterapi.",
                    icke: "Att ge en patient ett läkemedel som förbättrar ett defekt proteins funktion är genterapi.",
                    forklaring: "Att påverka proteiner med läkemedel är farmakologisk behandling – genterapi riktar sig till det genetiska materialet."
                }
            },
            {
                term: "GMO",
                definition: "En organism vars arvsmassa ändrats med hjälp av genteknik på ett sätt som inte sker naturligt via parning eller naturlig rekombination.",
                sentence: "_____ är idag vanligt i jordbruket, t.ex. Bt-bomull och herbicidtolerant sojaböna som odlas på hundratals miljoner hektar.",
                scenario: "En majssort har fått ett gen från en bakterie inbyggt i sitt DNA, vilket gör att plantan själv producerar ett insekticidprotein.",
                ickeExempel: {
                    korrekt: "En majssort som fått ett bakteriegen inbyggt för att bli insektsresistent är en GMO.",
                    icke: "En växt som odlas med konstgödsel och bekämpningsmedel är en GMO.",
                    forklaring: "GMO kräver direkt genetisk modifiering av arvsmassan – användning av kemikalier i odlingen ändrar inte DNA."
                }
            },
            {
                term: "Virusvektor",
                definition: "Ett genetiskt avväpnat virus som används för att transportera in nytt DNA i patientens celler utan att orsaka infektion.",
                sentence: "En _____ bär det terapeutiska DNA:t och levererar det till rätt celler i patientens kropp.",
                scenario: "Ett förändrat virus som inte längre kan föröka sig bär ett terapeutiskt DNA-paket och levererar det till leverceller.",
                ickeExempel: {
                    korrekt: "Ett avväpnat adenovirus används som virusvektor för att föra in en terapeutisk gen i patientens lungor.",
                    icke: "Ett naturligt influensavirus som smittar patienten fungerar som en virusvektor i genterapeutisk mening.",
                    forklaring: "Virusvektorer är genetiskt modifierade och avväpnade – de kan inte orsaka sjukdom och är inte naturliga virus."
                }
            },
            {
                term: "CAR-T-cellterapi",
                definition: "Genterapi där patientens T-celler modifieras med en chimerisk antigenreceptor (CAR) och återförs för att döda cancerceller.",
                sentence: "_____ har visat remarkabla resultat mot blodcancerformer som tidigare inte svarat på kemoterapi.",
                scenario: "Patientens egna immunförsvarsceller tas ut, reprogrammeras i laboratoriet med en ny receptor och återförs för att söka upp och döda cancerceller.",
                ickeExempel: {
                    korrekt: "CAR-T-cellterapi reprogrammerar patientens egna T-celler att angripa cancerceller.",
                    icke: "Kemoterapi som riktar sig mot snabbväxande celler är en form av CAR-T-cellterapi.",
                    forklaring: "Kemoterapi är kemisk behandling – CAR-T-cellterapi bygger på genetisk modifiering av patientens egna immunförsvarsceller."
                }
            },
            {
                term: "Monogen sjukdom",
                definition: "En sjukdom orsakad av en mutation i en enda gen, ofta sällsynt och allvarlig, t.ex. sickelcellanemi, hemofili och cystisk fibros.",
                sentence: "En _____ är lättare att behandla med genterapi än multifaktoriella sjukdomar, eftersom den orsakas av ett enda defekt gen.",
                scenario: "En sjukdom orsakas alltid av en defekt i ett enda bestämt gen – om just den genen repareras kan patienten botas fullständigt.",
                ickeExempel: {
                    korrekt: "Sickelcellanemi orsakas av en mutation i ett enda gen och är ett exempel på en monogen sjukdom.",
                    icke: "Typ 2-diabetes, som påverkas av hundratals gener och livsstil, är en monogen sjukdom.",
                    forklaring: "Typ 2-diabetes är multifaktoriell – monogena sjukdomar orsakas av ett enda defekt gen."
                }
            },
            {
                term: "Basredigering",
                definition: "En vidareutveckling av CRISPR som byter ut enstaka baspar utan att klippa upp DNA-spiralen – ger färre oavsiktliga mutationer.",
                sentence: "_____ minskar risken för biverkningar eftersom DNA-strängen aldrig klipps helt av under redigeringen.",
                scenario: "En forskargrupp byter ut exakt en felaktig nukleotid i ett genom utan att klippa upp DNA-spiralen, vilket minskar risken för oavsiktliga skador.",
                ickeExempel: {
                    korrekt: "Basredigering av en punktmutation utan att klippa DNA-strängen är tekniken i sin renaste form.",
                    icke: "CRISPR/Cas9 är samma sak som basredigering, fast med ett annat enzym.",
                    forklaring: "CRISPR/Cas9 klipper upp DNA-strängen – basredigering byter enstaka baser utan att klippa, vilket är mer precist."
                }
            },
            {
                term: "Ex vivo",
                definition: "Genterapimetod där celler tas ut ur patientens kropp, modifieras utanför och sedan återförs efter att modifieringen kontrollerats.",
                sentence: "Vid _____ genterapi kan läkare verifiera att redigeringen lyckades innan cellerna sätts tillbaka i patienten.",
                scenario: "Läkaren tar ut benmärgsceller, modifierar dem i laboratoriet, kontrollerar att redigeringen lyckades och sätter sedan tillbaka dem i patienten.",
                ickeExempel: {
                    korrekt: "CAR-T-cellterapi är ett ex vivo-förfarande – cellerna modifieras utanför kroppen.",
                    icke: "Att injicera en virusvektor direkt i ett organ utan att ta ut celler är ett ex vivo-förfarande.",
                    forklaring: "Direktinjektion i kroppen är in vivo – ex vivo kräver att cellerna behandlas utanför kroppen."
                }
            },
            {
                term: "In vivo",
                definition: "Genterapimetod där modifieringen sker direkt inne i kroppen via t.ex. injektion i ett organ, utan att celler behöver tas ut.",
                sentence: "_____ genterapi för näthinnesjukdomar levereras via direktinjektion i ögat på den drabbade patienten.",
                scenario: "Läkare injicerar en virusvektor direkt i patientens öga – inga celler behöver tas ut ur kroppen.",
                ickeExempel: {
                    korrekt: "Direktinjektion av ett terapeutiskt virus i levern för att behandla en genetisk sjukdom är in vivo-genterapi.",
                    icke: "Att ta ut celler, redigera dem och sätta tillbaka dem i kroppen är in vivo-genterapi.",
                    forklaring: "Att ta ut och bearbeta celler utanför kroppen är ex vivo – in vivo innebär att modifieringen sker direkt inuti kroppen."
                }
            },
            {
                term: "Kimbaningsgenterapi",
                definition: "Genterapi som görs på könsceller eller befruktade ägg och därför ärvas av alla framtida generationer – är förbjuden i de flesta länder.",
                sentence: "_____ är förbjuden i de flesta länder på grund av de etiska och säkerhetsmässiga riskerna med arvsbar manipulation.",
                scenario: "Ändringar görs på ett befruktat ägg, vilket innebär att varje cell i den vuxna organismen – och dess avkommor – bär förändringen.",
                ickeExempel: {
                    korrekt: "En modifiering av ett befruktat ägg där alla celler i den vuxna individen bär förändringen är kimbaningsgenterapi.",
                    icke: "Genterapi som ges till en vuxen patients blodceller och inte kan ärvas är kimbaningsgenterapi.",
                    forklaring: "Kimbaningsgenterapi definieras just av att förändringen är ärftlig – om barnen inte kan ärva den är det somatisk genterapi."
                }
            },
            {
                term: "Oligonukleotider",
                definition: "Korta syntetiska RNA-sekvenser som reglerar genuttryck genom att tysta eller modifiera hur specifika sjukdomsgener läses av.",
                sentence: "_____ används för att behandla Skelleftesjukan genom att hindra bildning av det skadliga transtyretinproteinet.",
                scenario: "En syntetisk RNA-sträng binder till mRNA från en sjukdomsorsakande gen och förhindrar att proteinet byggs, utan att DNA:t ändras.",
                ickeExempel: {
                    korrekt: "Oligonukleotider kan tysta genen som orsakar Skelleftesjukan.",
                    icke: "Oligonukleotider klipper och reparerar defekta DNA-sekvenser direkt.",
                    forklaring: "Oligonukleotider påverkar genuttrycket (mRNA-nivå) utan att klippa DNA – det är CRISPR som klipper DNA."
                }
            },
            {
                term: "Genflöde",
                definition: "Spridning av genetisk information mellan populationer, t.ex. när pollen från GMO-grödor befruktar vilda växtpopulationer.",
                sentence: "Risken för _____ från GMO-grödor kräver buffertzoner mellan odlingarna och vilda växtpopulationer.",
                scenario: "Pollen från en GMO-gröda bärs av vinden till intilliggande vilda växter och för in en modifierad gen i den vilda populationen.",
                ickeExempel: {
                    korrekt: "Risken för genflöde kräver buffertzoner kring GMO-odlingar för att skydda vilda växtpopulationer.",
                    icke: "När en GMO-växt behandlas med herbicid och dör utan att spridas är det ett exempel på genflöde.",
                    forklaring: "Genflöde handlar om spridning av genetisk information via korsning – att en planta dör innebär inget genflöde."
                }
            },
            {
                term: "NHEJ",
                definition: "Icke-homolog sammanfogning – den vanligaste och snabbaste DNA-reparationsmekanismen efter dubbelsträngbrott, men felbenägen.",
                sentence: "_____ reparerar snabbt ett CRISPR-klipp men introducerar ofta deletioner som permanent stänger av genen.",
                scenario: "Efter att CRISPR klippt ett DNA-streck syr cellen ihop ändarna utan en mall – snabbt men med risk för små fel som stänger av genen.",
                ickeExempel: {
                    korrekt: "NHEJ reparerar ett dubbelsträngbrott snabbt men kan introducera deletioner som stänger av en gen.",
                    icke: "NHEJ använder en mall-DNA-sekvens för att exakt reparera det klippta stället.",
                    forklaring: "Det är HDR som kräver mall-DNA för exakt reparation – NHEJ syr ihop ändarna utan mall och är felbenägen."
                }
            },
            {
                term: "HDR",
                definition: "Homologistyrd reparation – en noggrann DNA-reparationsmekanism som kräver mall-DNA och möjliggör kontrollerad inläggning av ny sekvens.",
                sentence: "Forskaren använde _____ för att sätta in den korrekta nukleotiden exakt på klippstället i genomet.",
                scenario: "Forskaren lägger till en mallsekvens i cellen när CRISPR klipper, vilket tvingar cellen att kopiera in en korrekt sekvens exakt.",
                ickeExempel: {
                    korrekt: "HDR möjliggör exakt inläggning av ett nytt baspar vid klippstället med hjälp av en mallsekvens.",
                    icke: "HDR är snabbast av de två DNA-reparationsmekanismerna och används mest av cellen.",
                    forklaring: "NHEJ är snabbare och vanligare – HDR är noggrannare men långsammare och kräver en mall."
                }
            },
            {
                term: "PGD",
                definition: "Preimplantatorisk genetisk diagnostik – screening av embryon vid provrörsbefruktning för att välja bort sjukdomsbärare innan implantation.",
                sentence: "Familjer med ärftliga sjukdomar kan via _____ välja att enbart implantera embryon som inte bär sjukdomsmutationen.",
                scenario: "En familj med ärftlig sjukdom väljer vid IVF-behandling att genetiskt testa embryona och implantera enbart de som saknar sjukdomsanlaget.",
                ickeExempel: {
                    korrekt: "Familjer med sickelcellanemi kan via PGD välja embryon som inte bär sjukdomsmutationen.",
                    icke: "PGD innebär att man genetiskt modifierar embryot för att ta bort sjukdomsgenen.",
                    forklaring: "PGD är diagnostik – man väljer friska embryon, man modifierar dem inte. Modifiering vore kimbaningsgenterapi."
                }
            }
        ];

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getFeedback(score, total) {
            const p = score / total;
            if (p >= 0.9) return "Redo för provet! Fantastiskt bra!";
            if (p >= 0.7) return "Bra jobbat! Öva lite till på de du missade.";
            if (p >= 0.5) return "Halvvägs! Fortsätt träna.";
            return "Öva lite till – du är på rätt väg!";
        }

        function LucktextView() {
            const [inputs, setInputs] = useState(concepts.map(() => ''));
            const [attempts, setAttempts] = useState(concepts.map(() => 0));
            const [statuses, setStatuses] = useState(concepts.map(() => null));
            const [done, setDone] = useState(false);

            const normalize = s => s.trim().toLowerCase();

            const submit = (i) => {
                if (statuses[i] === 'correct' || statuses[i] === 'wrong-final') return;
                if (normalize(inputs[i]) === normalize(concepts[i].term)) {
                    const s = [...statuses]; s[i] = 'correct'; setStatuses(s);
                } else {
                    const a = [...attempts]; a[i]++; setAttempts(a);
                    const s = [...statuses]; s[i] = a[i] >= 2 ? 'wrong-final' : 'wrong-once'; setStatuses(s);
                }
            };

            const rättaAlla = () => { setStatuses(statuses.map(s => s === 'correct' ? 'correct' : 'wrong-final')); setDone(true); };
            const börjaOm = () => { setInputs(concepts.map(() => '')); setAttempts(concepts.map(() => 0)); setStatuses(concepts.map(() => null)); setDone(false); };

            const correctCount = statuses.filter(s => s === 'correct').length;
            const allDone = done || statuses.every(s => s === 'correct' || s === 'wrong-final');

            return (
                <div>
                    <div className="mb-6 p-4 bg-white rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Begreppsbank</p>
                        <div className="flex flex-wrap gap-2">
                            {concepts.map((c, i) => (
                                <span key={i} className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${statuses[i] === 'correct' ? 'line-through text-slate-400 bg-green-50 border-green-200' : 'bg-green-50 border-green-300 text-green-800'}`}>{c.term}</span>
                            ))}
                        </div>
                    </div>
                    <div className="grid gap-4">
                        {concepts.map((c, i) => {
                            const parts = c.sentence.split('_____');
                            const st = statuses[i];
                            return (
                                <div key={i} className={`bg-white p-5 rounded-2xl shadow-sm border-l-8 transition-all ${st === 'correct' ? 'border-green-500' : st === 'wrong-final' ? 'border-red-400' : 'border-green-400'}`}>
                                    <p className="text-slate-700 mb-3 leading-relaxed">{parts[0]}<span className="font-bold text-green-600">[_____]</span>{parts[1]}</p>
                                    {st === 'correct' ? (
                                        <div className="flex flex-wrap items-center gap-2 text-green-600"><span className="font-bold">✓ {c.term}</span><span className="text-sm font-normal text-slate-500">– {c.definition}</span></div>
                                    ) : st === 'wrong-final' ? (
                                        <div><p className="text-red-500 text-sm">Rätt svar: <span className="font-bold">{c.term}</span></p><p className="text-slate-500 text-sm mt-1">{c.definition}</p></div>
                                    ) : (
                                        <div>
                                            <div className="flex gap-2">
                                                <input type="text" value={inputs[i]} onChange={e => { const v = [...inputs]; v[i] = e.target.value; setInputs(v); }} onKeyDown={e => e.key === 'Enter' && submit(i)} placeholder="Skriv begreppet och tryck Enter..." className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-400 text-sm" />
                                                <button onClick={() => submit(i)} className="bg-green-400 text-green-900 px-4 py-2 rounded-xl font-bold hover:bg-green-500 transition-colors">→</button>
                                            </div>
                                            {st === 'wrong-once' && <p className="text-orange-500 text-sm mt-2 font-medium">Är du säker att du stavat rätt?</p>}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="mt-8 flex justify-between items-center">
                        <button onClick={börjaOm} className="text-slate-500 hover:text-slate-700 font-medium transition-colors">↺ Börja om</button>
                        {!allDone && <button onClick={rättaAlla} className="bg-slate-800 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-700 transition-colors">Rätta alla</button>}
                    </div>
                    {allDone && (
                        <div className="mt-8 bg-green-50 border-2 border-green-400 rounded-3xl p-8 text-center">
                            <p className="text-5xl font-bold text-green-500 mb-2">{correctCount}/{concepts.length}</p>
                            <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(correctCount, concepts.length)}</p>
                            <button onClick={börjaOm} className="bg-green-400 text-green-900 px-8 py-3 rounded-2xl font-bold hover:bg-green-500 transition-colors">Börja om</button>
                        </div>
                    )}
                </div>
            );
        }

        function ScenarioView() {
            const [shuffledIdxs] = useState(() => shuffleArray(concepts.map((_, i) => i)));
            const [current, setCurrent] = useState(0);
            const [answered, setAnswered] = useState(null);
            const [selected, setSelected] = useState(null);
            const [score, setScore] = useState(0);
            const [done, setDone] = useState(false);
            const [termOptions, setTermOptions] = useState(() => shuffleArray(concepts.map(c => c.term)));

            const conceptIdx = shuffledIdxs[current];
            const concept = concepts[conceptIdx];

            const handleSelect = (term) => {
                if (answered !== null) return;
                setSelected(term);
                const isCorrect = term === concept.term;
                setAnswered(isCorrect ? 'correct' : 'wrong');
                if (isCorrect) setScore(s => s + 1);
            };

            const next = () => {
                if (current + 1 >= concepts.length) { setDone(true); return; }
                setCurrent(c => c + 1);
                setAnswered(null);
                setSelected(null);
                setTermOptions(shuffleArray(concepts.map(c => c.term)));
            };

            const reset = () => {
                setCurrent(0);
                setAnswered(null);
                setSelected(null);
                setScore(0);
                setDone(false);
                setTermOptions(shuffleArray(concepts.map(c => c.term)));
            };

            if (done) return (
                <div className="text-center">
                    <div className="bg-green-50 border-2 border-green-400 rounded-3xl p-8 mb-6">
                        <p className="text-5xl font-bold text-green-500 mb-2">{score}/{concepts.length}</p>
                        <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(score, concepts.length)}</p>
                        <button onClick={reset} className="bg-green-400 text-green-900 px-8 py-3 rounded-2xl font-bold hover:bg-green-500 transition-colors">Börja om</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-2xl mx-auto">
                    <div className="flex justify-between items-center mb-3">
                        <span className="font-bold text-green-700">Poäng: {score}</span>
                        <span className="text-slate-400 text-sm">{current + 1} / {concepts.length}</span>
                    </div>
                    <div className="w-full bg-slate-200 rounded-full h-2 mb-6">
                        <div className="bg-green-400 h-2 rounded-full transition-all" style={{width: `${((current + 1) / concepts.length) * 100}%`}}></div>
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-lg mb-6">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Vilket begrepp beskrivs?</p>
                        <p className="text-lg text-slate-800 leading-relaxed italic">"{concept.scenario}"</p>
                    </div>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        {termOptions.map((term, i) => (
                            <button key={i} onClick={() => handleSelect(term)} disabled={answered !== null}
                                className={`p-4 rounded-2xl font-bold border-2 text-left transition-all ${
                                    answered === null ? 'bg-white border-slate-200 hover:border-green-400 hover:bg-green-50' :
                                    term === concept.term ? 'bg-green-50 border-green-500 text-green-700' :
                                    term === selected ? 'bg-red-50 border-red-500 text-red-700' :
                                    'bg-white border-slate-100 text-slate-300'
                                }`}>
                                {term}
                            </button>
                        ))}
                    </div>
                    {answered !== null && (
                        <div>
                            <div className={`p-4 rounded-2xl text-sm font-medium mb-4 ${answered === 'correct' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`}>
                                {answered === 'correct' ? `✓ Rätt! ${concept.definition}` : `✗ Fel. Rätt svar: ${concept.term} – ${concept.definition}`}
                            </div>
                            <button onClick={next} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all">
                                {current + 1 >= concepts.length ? 'Se resultat' : 'Nästa scenario →'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function IckeExempelView() {
            const [revealed, setRevealed] = useState(concepts.map(() => false));

            const toggle = (i) => { const r = [...revealed]; r[i] = !r[i]; setRevealed(r); };

            return (
                <div className="grid gap-5">
                    {concepts.map((c, i) => (
                        <div key={i} className="bg-white rounded-2xl shadow-sm border-l-8 border-green-400 overflow-hidden">
                            <div className="p-5">
                                <div className="flex items-center gap-3 mb-3">
                                    <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-lg">{i + 1}</span>
                                    <h3 className="text-lg font-bold">{c.term}</h3>
                                </div>
                                <div className="mb-3 p-3 bg-green-50 rounded-xl">
                                    <p className="text-xs font-bold text-green-700 uppercase tracking-wider mb-1">✓ Korrekt tillämpning</p>
                                    <p className="text-slate-700 text-sm">{c.ickeExempel.korrekt}</p>
                                </div>
                                <button onClick={() => toggle(i)} className={`w-full py-2 rounded-xl font-bold text-sm transition-all ${revealed[i] ? 'bg-red-100 text-red-700' : 'bg-slate-800 text-white hover:bg-slate-700'}`}>
                                    {revealed[i] ? 'Dölj icke-exempel' : 'Visa icke-exempel 🪤'}
                                </button>
                            </div>
                            {revealed[i] && (
                                <div className="px-5 pb-5">
                                    <div className="mb-3 p-3 bg-red-50 rounded-xl">
                                        <p className="text-xs font-bold text-red-700 uppercase tracking-wider mb-1">✗ Trovärdigt icke-exempel (fälla)</p>
                                        <p className="text-slate-700 text-sm">{c.ickeExempel.icke}</p>
                                    </div>
                                    <div className="p-3 bg-amber-50 rounded-xl">
                                        <p className="text-xs font-bold text-amber-700 uppercase tracking-wider mb-1">Förklaring av fällan</p>
                                        <p className="text-slate-700 text-sm">{c.ickeExempel.forklaring}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('list');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    let n; do { n = Math.floor(Math.random() * concepts.length); } while (n === currentIndex && concepts.length > 1);
                    setCurrentIndex(n);
                }, 150);
            };

            const activeTab = 'bg-green-400 text-green-900 font-bold shadow-sm';
            const inactiveTab = 'text-slate-500';

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-2xl mx-auto mb-8 flex items-center justify-between">
                        <a href="index.html" className="text-slate-500 hover:text-green-600 transition-colors flex items-center gap-2 font-medium text-sm">← Tillbaka till startsidan</a>
                        <h1 className="text-2xl md:text-3xl font-bold text-center">Genteknik – Naturkunskap 2</h1>
                        <div className="w-36"></div>
                    </header>

                    <div className="max-w-2xl mx-auto mb-10 flex bg-white p-1 rounded-full shadow-md border border-slate-200">
                        <button onClick={() => setView('list')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'list' ? activeTab : inactiveTab}`}>Lista</button>
                        <button onClick={() => setView('flashcards')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'flashcards' ? activeTab : inactiveTab}`}>Flashcards</button>
                        <button onClick={() => setView('lucktext')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'lucktext' ? activeTab : inactiveTab}`}>Lucktext</button>
                        <button onClick={() => setView('scenario')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'scenario' ? activeTab : inactiveTab}`}>Scenario</button>
                        <button onClick={() => setView('icke')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'icke' ? activeTab : inactiveTab}`}>Icke-ex.</button>
                    </div>

                    <main className="max-w-2xl mx-auto">
                        {view === 'list' && (
                            <div className="grid gap-4">
                                {concepts.map((item, index) => (
                                    <div key={index} className="bg-white p-5 rounded-2xl border-l-8 border-green-400 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-lg">{index + 1}</span>
                                            <h3 className="text-lg font-bold">{item.term}</h3>
                                        </div>
                                        <p className="text-slate-600 leading-relaxed ml-10">{item.definition}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {view === 'flashcards' && (
                            <div className="flex flex-col items-center">
                                <div className="flip-card mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`flip-card-inner ${isFlipped ? 'flipped-classes' : ''}`}>
                                        <div className="flip-card-front">
                                            <h2 className="text-3xl font-bold text-slate-900 text-center px-4">{concepts[currentIndex].term}</h2>
                                            <div className="absolute bottom-6 animate-pulse"><span className="text-[10px] uppercase tracking-[0.2em] text-green-900 font-bold opacity-70">Klicka för svar</span></div>
                                        </div>
                                        <div className="flip-card-back">
                                            <p className="text-xl leading-relaxed text-slate-800 font-medium px-4">{concepts[currentIndex].definition}</p>
                                            <div className="absolute bottom-6"><span className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Klicka för att vända</span></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center gap-4">
                                    <button onClick={nextCard} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-3 text-lg">Nästa begrepp <span>→</span></button>
                                    <p className="text-slate-500 font-medium bg-slate-200 px-4 py-1 rounded-full text-xs">{currentIndex + 1} av {concepts.length}</p>
                                </div>
                            </div>
                        )}
                        {view === 'lucktext' && <LucktextView />}
                        {view === 'scenario' && <ScenarioView />}
                        {view === 'icke' && <IckeExempelView />}
                    </main>

                    <footer className="mt-12 text-center text-slate-400 text-sm italic pb-8">Källa: Naturkunskap 2 – Genteknik begreppslista</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
