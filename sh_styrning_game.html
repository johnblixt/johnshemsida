<!doctype html>
<html lang="sv" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sveriges Styre - Utmaningen</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Fredoka', sans-serif; }
    body { box-sizing: border-box; }
    
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(34, 197, 94, 0.5); }
      50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.8), 0 0 30px rgba(34, 197, 94, 0.4); }
    }
    
    .bounce-in { animation: bounce-in 0.5s ease-out; }
    .shake { animation: shake 0.5s ease-in-out; }
    .pulse-glow { animation: pulse-glow 1s ease-in-out infinite; }
    
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confetti 1s ease-out forwards;
    }
    
    .track-node { transition: all 0.3s ease; }
    .track-node.active { transform: scale(1.2); }
    .track-node.completed { animation: pulse-glow 2s ease-in-out infinite; }
    
    .answer-btn { transition: all 0.2s ease; }
    .answer-btn:hover { transform: translateY(-3px); }
    .answer-btn:active { transform: translateY(1px); }
    
    .slide-up {
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body class="h-full overflow-auto bg-slate-900">
  <a href="index.html" class="fixed top-4 left-4 z-50 text-sm font-medium text-white/70 hover:text-white bg-white/10 px-3 py-2 rounded-xl shadow-sm transition-colors">← Tillbaka till startsidan</a>
  <div id="app" class="min-h-full bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 p-4">
    
    <!-- START SCREEN -->
    <div id="start-screen" class="max-w-md mx-auto pt-8">
      <div class="text-center mb-8 bounce-in">
        <div class="text-6xl mb-4">🏛️</div>
        <h1 class="text-3xl font-bold text-white mb-2">Sveriges Styre: Utmaningen</h1>
        <p class="text-purple-200">Klara banorna och bli en expert!</p>
      </div>
      
      <div class="bg-white/10 backdrop-blur rounded-2xl p-4 mb-6 text-white border border-white/20">
        <div class="grid grid-cols-2 gap-4">
          <div class="text-center">
            <div id="player-rank" class="text-lg font-bold mb-1 text-yellow-400">NOOB</div>
            <div class="text-[10px] uppercase tracking-widest opacity-60">Din Rank</div>
          </div>
          <div class="text-center">
            <div id="player-score" class="text-lg font-bold mb-1">0 poäng</div>
            <div class="text-[10px] uppercase tracking-widest opacity-60">Totalpoäng</div>
          </div>
        </div>
        <div class="mt-4 space-y-2">
          <div class="flex items-center gap-2">
            <span class="text-[10px] opacity-75 w-20 uppercase font-bold">📜 Grundlagar</span>
            <div class="flex-1 bg-white/10 rounded-full h-1.5 overflow-hidden">
              <div id="track-0-progress" class="h-full bg-amber-400" style="width: 0%"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] opacity-75 w-20 uppercase font-bold">⚖️ Lagar</span>
            <div class="flex-1 bg-white/10 rounded-full h-1.5 overflow-hidden">
              <div id="track-1-progress" class="h-full bg-emerald-400" style="width: 0%"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-[10px] opacity-75 w-20 uppercase font-bold">🇪🇺 EU</span>
            <div class="flex-1 bg-white/10 rounded-full h-1.5 overflow-hidden">
              <div id="track-2-progress" class="h-full bg-blue-400" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="space-y-3">
        <button onclick="selectTrack(0)" class="w-full bg-white/10 hover:bg-white/20 text-white p-5 rounded-2xl border border-white/10 flex items-center gap-4 transition-all">
          <span class="text-3xl bg-amber-500/20 p-2 rounded-xl">📜</span>
          <div class="text-left">
            <div class="font-bold text-lg">Sveriges grundlagar</div>
            <div class="text-xs text-purple-200">Lär dig de fyra viktigaste lagarna</div>
          </div>
        </button>
        <button onclick="selectTrack(1)" class="w-full bg-white/10 hover:bg-white/20 text-white p-5 rounded-2xl border border-white/10 flex items-center gap-4 transition-all">
          <span class="text-3xl bg-emerald-500/20 p-2 rounded-xl">⚖️</span>
          <div class="text-left">
            <div class="font-bold text-lg">Från idé till lag</div>
            <div class="text-xs text-purple-200">Följ vägen genom riksdagen</div>
          </div>
        </button>
        <button onclick="selectTrack(2)" class="w-full bg-white/10 hover:bg-white/20 text-white p-5 rounded-2xl border border-white/10 flex items-center gap-4 transition-all">
          <span class="text-3xl bg-blue-500/20 p-2 rounded-xl">🇪🇺</span>
          <div class="text-left">
            <div class="font-bold text-lg">Sverige och EU</div>
            <div class="text-xs text-purple-200">Hur funkar samarbetet i Europa?</div>
          </div>
        </button>
      </div>

      <div class="mt-8 text-center">
        <a href="index.html" class="text-white/40 hover:text-white text-sm font-medium transition-colors">← Tillbaka till portalen</a>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="max-w-md mx-auto hidden">
      <div class="flex justify-between items-center mb-6">
        <button onclick="goToStart()" class="text-white/60 hover:text-white text-sm">⇠ Avbryt</button>
        <div class="flex gap-2">
          <div class="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-sm font-bold border border-red-500/30">❤️ <span id="lives">3</span></div>
          <div class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full text-sm font-bold border border-yellow-500/30">⭐ <span id="session-score">0</span></div>
        </div>
      </div>

      <div class="relative mb-8 px-4">
        <div class="flex justify-between items-center relative">
          <div class="absolute top-1/2 left-0 right-0 h-1 bg-white/10 -translate-y-1/2 rounded-full"></div>
          <div id="progress-fill" class="absolute top-1/2 left-0 h-1 bg-green-400 -translate-y-1/2 transition-all duration-500 rounded-full" style="width: 0%"></div>
          <div id="track-nodes" class="flex justify-between w-full relative z-10"></div>
        </div>
      </div>

      <div id="question-card" class="bg-white rounded-3xl p-8 shadow-2xl slide-up">
        <div id="question-emoji" class="text-5xl text-center mb-4">❓</div>
        <h2 id="question-text" class="text-xl font-bold text-slate-800 text-center mb-8 leading-tight"></h2>
        <div id="answers" class="space-y-3"></div>
        <div id="feedback" class="mt-6 hidden"></div>
      </div>
    </div>

    <!-- RESULT SCREENS -->
    <div id="completion-screen" class="max-w-md mx-auto hidden pt-12">
      <div class="bg-white rounded-3xl p-10 text-center shadow-2xl bounce-in">
        <div class="text-7xl mb-4">🏆</div>
        <h2 class="text-3xl font-bold text-slate-900 mb-2">Banan klar!</h2>
        <p class="text-slate-500 mb-8">Snyggt jobbat, du har tagit dig igenom nivåerna.</p>
        <button onclick="goToStart()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all">Gå tillbaka till banval</button>
      </div>
    </div>

    <div id="wasted-screen" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-50 p-6">
      <div class="text-center">
        <div class="text-7xl font-black text-red-600 mb-4 italic tracking-tighter" style="text-shadow: 0 0 20px red;">WASTED</div>
        <p class="text-white mb-8 text-lg font-medium">Livet tog slut. Försök igen!</p>
        <button onclick="goToStart()" class="bg-white text-black font-bold py-4 px-10 rounded-2xl hover:bg-slate-200">Starta om</button>
      </div>
    </div>

    <div id="confetti-container" class="fixed inset-0 pointer-events-none overflow-hidden"></div>
  </div>

  <script>
    const tracks = [
      {
        name: "Sveriges grundlagar", emoji: "📜",
        levels: [
          { question: "Vad är en grundlag?", answers: ["En vanlig lag", "En lokal lag", "Den viktigaste typen av lag som andra lagar måste följa", "En lag som bara gäller skolor"], correct: 2, emoji: "📚" },
          { question: "Hur många grundlagar har Sverige?", answers: ["1 st", "4 st", "10 st", "Inga"], correct: 1, emoji: "🔢" },
          { question: "Vilken grundlag handlar om vem som blir kung eller drottning?", answers: ["Regeringsformen", "Successionsordningen", "Skollagen", "Yttrandefrihetsgrundlagen"], correct: 1, emoji: "👑" },
          { question: "Vad krävs för att ändra en grundlag?", answers: ["Ett beslut av kungen", "Två riksdagsbeslut med ett val emellan", "Att polisen säger ja", "Ingenting, det går inte"], correct: 1, emoji: "🔒" },
          { question: "Vilken grundlag skyddar vår rätt att skriva vad vi vill i tidningar?", answers: ["Tryckfrihetsförordningen", "Regeringsformen", "Skollagen", "Väglagen"], correct: 0, emoji: "📰" }
        ]
      },
      {
        name: "Från idé till lag", emoji: "⚖️",
        levels: [
          { question: "Vad kallas ett lagförslag som kommer från regeringen?", answers: ["Motion", "Proposition", "Betänkande", "Veto"], correct: 1, emoji: "📋" },
          { question: "Vad kallas ett lagförslag som kommer från en riksdagsledamot?", answers: ["Proposition", "Motion", "Utredning", "Lagarbete"], correct: 1, emoji: "✍️" },
          { question: "Vad kallas experternas arbete med att kolla upp fakta innan en lag skrivs?", answers: ["Votering", "Utredning", "Remiss", "Debatt"], correct: 1, emoji: "🔍" },
          { question: "Vem fattar det slutgiltiga beslutet om en lag ska godkännas?", answers: ["Regeringen", "Kungen", "Riksdagen", "EU"], correct: 2, emoji: "🗳️" },
          { question: "När riksdagen röstar om ett förslag i kammaren kallas det för...?", answers: ["Motionering", "Proposition", "Votering", "Remiss"], correct: 2, emoji: "🔘" }
        ]
      },
      {
        name: "Sverige och EU", emoji: "🇪🇺",
        levels: [
          { question: "Vilket år gick Sverige med i EU?", answers: ["1985", "1995", "2005", "2015"], correct: 1, emoji: "🇸🇪" },
          { question: "Vad kallas det att vi får resa och jobba fritt i EU-länder?", answers: ["Fri rörlighet", "EU-resa", "Gränslöst jobb", "Flyttlov"], correct: 0, emoji: "✈️" },
          { question: "Vilken är en stor fördel med EU för svenska företag?", answers: ["Inga tullar", "Gratis bensin", "Inga anställda", "Ingen skatt"], correct: 0, emoji: "📦" },
          { question: "Vad röstar vi om i EU-valet vart femte år?", answers: ["EU-regeringen", "EU-parlamentet", "EU-kungen", "Svenska riksdagen"], correct: 1, emoji: "🗳️" },
          { question: "Hur många länder är med i EU ungefär?", answers: ["15 st", "27 st", "50 st", "Hela världen"], correct: 1, emoji: "🌍" }
        ]
      }
    ];

    let currentTrack = 0;
    let currentLevel = 0;
    let sessionScore = 0;
    let lives = 3;
    let totalScore = 0;
    let tracksCompleted = [false, false, false];

    function selectTrack(idx) {
      currentTrack = idx;
      currentLevel = 0;
      sessionScore = 0;
      lives = 3;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      updateUI();
      renderQuestion();
    }

    function updateUI() {
      document.getElementById('lives').textContent = lives;
      document.getElementById('session-score').textContent = sessionScore;
      document.getElementById('player-score').textContent = totalScore + " poäng";
      
      const progress = (currentLevel / tracks[currentTrack].levels.length) * 100;
      document.getElementById('progress-fill').style.width = progress + "%";
      
      const nodes = document.getElementById('track-nodes');
      nodes.innerHTML = '';
      for(let i=0; i < tracks[currentTrack].levels.length; i++) {
        const div = document.createElement('div');
        div.className = `track-node w-8 h-8 rounded-full border-2 flex items-center justify-center font-bold text-xs ${i < currentLevel ? 'bg-green-500 border-green-500 text-white' : i === currentLevel ? 'bg-white border-indigo-500 text-indigo-600 active' : 'bg-slate-800 border-white/20 text-white/40'}`;
        div.textContent = i + 1;
        nodes.appendChild(div);
      }

      // Update progress bars in start screen
      tracksCompleted.forEach((done, i) => {
        document.getElementById(`track-${i}-progress`).style.width = done ? '100%' : '0%';
      });
      
      // Update rank
      let rank = "NOOB";
      if(totalScore > 500) rank = "MEDBORGARE";
      if(totalScore > 1000) rank = "LEDAMOT";
      if(totalScore > 1400) rank = "TALMAN";
      document.getElementById('player-rank').textContent = rank;
    }

    function renderQuestion() {
      const q = tracks[currentTrack].levels[currentLevel];
      document.getElementById('question-emoji').textContent = q.emoji;
      document.getElementById('question-text').textContent = q.question;
      document.getElementById('feedback').classList.add('hidden');
      
      const container = document.getElementById('answers');
      container.innerHTML = '';
      
      q.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = "answer-btn w-full text-left p-4 rounded-2xl border-2 border-slate-100 font-bold text-slate-700 hover:border-indigo-500 hover:bg-indigo-50 transition-all";
        btn.textContent = ans;
        btn.onclick = () => checkAnswer(i);
        container.appendChild(btn);
      });
    }

    function checkAnswer(idx) {
      const q = tracks[currentTrack].levels[currentLevel];
      const btns = document.querySelectorAll('.answer-btn');
      
      if(idx === q.correct) {
        sessionScore += 100;
        totalScore += 100;
        btns[idx].classList.add('bg-green-500', 'text-white', 'border-green-500');
        createConfetti();
        setTimeout(() => {
          currentLevel++;
          if(currentLevel >= tracks[currentTrack].levels.length) {
            finishTrack();
          } else {
            updateUI();
            renderQuestion();
          }
        }, 1500);
      } else {
        lives--;
        btns[idx].classList.add('bg-red-500', 'text-white', 'border-red-500', 'shake');
        updateUI();
        if(lives <= 0) {
          document.getElementById('wasted-screen').classList.remove('hidden');
        }
      }
    }

    function finishTrack() {
      tracksCompleted[currentTrack] = true;
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('completion-screen').classList.remove('hidden');
    }

    function goToStart() {
      document.getElementById('start-screen').classList.remove('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('completion-screen').classList.add('hidden');
      document.getElementById('wasted-screen').classList.add('hidden');
      updateUI();
    }

    function createConfetti() {
      const container = document.getElementById('confetti-container');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = '50vh';
        p.style.backgroundColor = ['#f43f5e', '#3b82f6', '#10b981', '#fbbf24'][Math.floor(Math.random()*4)];
        container.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }
  </script>
</body>
</html>
