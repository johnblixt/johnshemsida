<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begreppslista - Folkhälsa (NK2)</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'EB Garamond', serif; }
        .flip-card { perspective: 1000px; height: 350px; width: 100%; max-width: 400px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped-classes { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .flip-card-front { background-color: #4ade80; border: 6px solid white; }
        .flip-card-back { background-color: white; border: 6px solid #4ade80; transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const concepts = [
            {
                term: "Hälsa",
                definition: "Ett tillstånd av fullständigt fysiskt, psykiskt och socialt välbefinnande – inte bara frånvaro av sjukdom.",
                sentence: "Att ha god _____ innebär inte bara att man är fri från sjukdom, utan också att man mår bra psykiskt och socialt.",
                scenario: "En person är pigg, trivs på jobbet och har nära vänner – trots att läkaren aldrig hittar något fel. Hon beskriver sig själv som att hon 'mår bra på alla plan'.",
                ickeExempel: {
                    korrekt: "En tonåring som sover gott, har nära vänner och trivs i skolan sägs ha god hälsa även om han aldrig tränar på gym.",
                    icke: "En person som inte har besökt doktorn på tio år och aldrig fått en diagnos har per definition god hälsa.",
                    forklaring: "Frånvaro av diagnos är inte detsamma som god hälsa – begreppet kräver också psykiskt och socialt välbefinnande."
                }
            },
            {
                term: "Folkhälsa",
                definition: "Hela befolkningens samlade hälsotillstånd, påverkat av levnadsvanor, livsvillkor och samhällsfaktorer.",
                sentence: "Rökning är ett av de största hoten mot _____ i Sverige och leder till stora samhällskostnader.",
                scenario: "En myndighet publicerar statistik om medellivslängd, andel överviktiga och förekomst av depression i hela landet för att visa hur medborgarna mår som grupp.",
                ickeExempel: {
                    korrekt: "Att medellivslängden i Sverige ökat de senaste 50 åren är ett tecken på förbättrad folkhälsa.",
                    icke: "En enskild persons hälsotillstånd avgör om landet har god folkhälsa.",
                    forklaring: "Folkhälsa avser befolkningens *samlade* hälsa – inte enskilda individers tillstånd."
                }
            },
            {
                term: "Folkhälsoarbete",
                definition: "Systematiska insatser från samhället för att förbättra hälsan och minska ojämlikheter i befolkningen.",
                sentence: "_____ handlar om att arbeta på samhällsnivå för att skapa bättre förutsättningar för alla att leva hälsosamt.",
                scenario: "En kommun inför gratis simskola för barn, bygger cykelbanor och låter distriktssköterskor besöka nyföräldrar – allt för att på bred front förbättra invånarnas hälsa.",
                ickeExempel: {
                    korrekt: "En kommuns beslut att erbjuda kostnadsfria gymkort till långtidsarbetslösa är ett exempel på folkhälsoarbete.",
                    icke: "En läkare som behandlar en enskild patient med diabetes bedriver folkhälsoarbete.",
                    forklaring: "Folkhälsoarbete riktar sig till grupper och samhällsnivå – inte till enskilda patienters behandling."
                }
            },
            {
                term: "Folksjukdom",
                definition: "En sjukdom som är vanlig och drabbar en stor del av befolkningen, t.ex. diabetes, hjärt-kärlsjukdom eller cancer.",
                sentence: "Hjärt-kärlsjukdom är en _____ som är en av de vanligaste dödsorsakerna i Sverige.",
                scenario: "Nästan en miljon svenskar lever med ett tillstånd som skadar hjärta och njurar, och beror på att kroppen inte reglerar blodsockret rätt. Tillståndet fyller halvt av sjukhussängarna.",
                ickeExempel: {
                    korrekt: "Cancer räknas som en folksjukdom eftersom det är en av de vanligaste dödsorsakerna i Sverige.",
                    icke: "En sällsynt genetisk sjukdom som drabbar 1 av 100 000 är en folksjukdom om den är allvarlig.",
                    forklaring: "Allvarlighet räcker inte – begreppet kräver att sjukdomen är vanlig i befolkningen."
                }
            },
            {
                term: "Folkhälsoproblem",
                definition: "En hälsorelaterad företeelse som negativt påverkar en stor del av befolkningens hälsa och välbefinnande.",
                sentence: "Övervikt hos barn har blivit ett allt större _____ i det moderna samhället.",
                scenario: "Allt fler unga rapporterar utmattning, sömnsvårigheter och ångest – ett mönster som berör hundratusentals invånare och som bekymrar folkhälsomyndigheten.",
                ickeExempel: {
                    korrekt: "Den ökande förekomsten av övervikt hos barn i Sverige är ett folkhälsoproblem som kräver samhällsinsatser.",
                    icke: "En individ som mår dåligt efter en personlig kris utgör ett folkhälsoproblem för samhället.",
                    forklaring: "Begreppet kräver att fenomenet påverkar en *stor del* av befolkningen – inte enstaka individer."
                }
            },
            {
                term: "Social position",
                definition: "En persons plats i den sociala hierarkin, baserad på faktorer som utbildning, yrke och inkomst.",
                sentence: "Forskning visar att _____ har en stark koppling till hälsa – ju högre position, desto bättre hälsa i genomsnitt.",
                scenario: "En studie jämför hälsan hos universitetslektorer med hälsan hos lågutbildade fabriksarbetare och finner stora skillnader i medellivslängd och sjukdomsförekomst.",
                ickeExempel: {
                    korrekt: "Skillnaden i hälsa mellan en direktör och en städare kan förklaras av deras olika sociala position.",
                    icke: "En persons sociala position avgörs av hur populär hen är bland sina vänner.",
                    forklaring: "Social position handlar om formell samhällsstruktur – utbildning, yrke, inkomst – inte om popularitet."
                }
            },
            {
                term: "Hälsofrämjande arbete",
                definition: "Insatser som stärker individers och gruppers resurser och förutsättningar för god hälsa, utan att direkt fokusera på sjukdom.",
                sentence: "Att anlägga cykelbanor och parker i en stad är ett exempel på _____ som uppmuntrar rörelse.",
                scenario: "En arbetsgivare inrättar ett meditationsrum, erbjuder friskvårdsbidrag och ordnar gemensamma promenader på lunchen – utan att nämna sjukdomar.",
                ickeExempel: {
                    korrekt: "En kampanj som uppmuntrar positiva kostvanor utan att lyfta fram specifika sjukdomar är hälsofrämjande arbete.",
                    icke: "Rökstoppsrådgivning som hjälper rökare att sluta röka är hälsofrämjande arbete.",
                    forklaring: "Rökstoppsrådgivning riktar sig mot en specifik riskfaktor och räknas som förebyggande arbete, inte hälsofrämjande i strikt mening."
                }
            },
            {
                term: "Förebyggande arbete",
                definition: "Åtgärder som syftar till att minska riskerna för att sjukdom ska uppstå, t.ex. vaccinationer och rökstoppsrådgivning.",
                sentence: "_____ mot rökning inkluderar information om hälsorisker, stöd för avvänjning och höga tobaksskatter.",
                scenario: "Apoteket erbjuder gratis influensavaccin till äldre, och skolsköterskan mäter blodtrycket hos alla elever för att tidigt identifiera riskfaktorer innan sjukdom uppstår.",
                ickeExempel: {
                    korrekt: "Att erbjuda gravida information om alkoholens skadeverkningar är förebyggande arbete mot fetala alkoholskador.",
                    icke: "Att bygga en ny lekplats så att barn ska trivas och ha kul är förebyggande arbete mot sjukdom.",
                    forklaring: "En lekplats ökar välmående och rörelse (hälsofrämjande) men riktar inte in sig på att minska risken för en specifik sjukdom."
                }
            },
            {
                term: "Riskfaktorer",
                definition: "Faktorer som ökar sannolikheten för att en person ska drabbas av sjukdom, t.ex. rökning, ohälsosam kost och stress.",
                sentence: "Rökning, fysisk inaktivitet och stress är viktiga _____ för hjärt-kärlsjukdom.",
                scenario: "Forskarna listar fyra faktorer som gör det mer sannolikt att en person får hjärtinfarkt: högt blodtryck, rökning, låg rörelseaktivitet och ärftlighet.",
                ickeExempel: {
                    korrekt: "Rökning och stillasittande är riskfaktorer för diabetes typ 2.",
                    icke: "Att bo i en storstad är alltid en riskfaktor för ohälsa.",
                    forklaring: "Boende i stad är inte i sig en riskfaktor – riskfaktorer kräver dokumenterad koppling till ökad sjukdomsrisk."
                }
            },
            {
                term: "Hälsoklyftor",
                definition: "Systematiska skillnader i hälsa mellan olika grupper i samhället, ofta kopplade till socioekonomiska faktorer.",
                sentence: "_____ i Sverige innebär att lågutbildade i genomsnitt lever kortare och är sjukare än högutbildade.",
                scenario: "Statistik visar att invånare i rika kommuner lever åtta år längre än i fattiga kommuner, och att lågutbildade oftare lider av kroniska sjukdomar.",
                ickeExempel: {
                    korrekt: "Att lågutbildade i genomsnitt lever kortare än högutbildade är ett uttryck för hälsoklyftor i Sverige.",
                    icke: "Att en enskild person råkar bli sjuk visar att det finns hälsoklyftor i samhället.",
                    forklaring: "Hälsoklyftor handlar om *systematiska* skillnader mellan grupper – inte enskilda individers ohälsa."
                }
            },
            {
                term: "Livsvillkor",
                definition: "De ekonomiska, sociala och miljömässiga förhållanden som påverkar en persons möjligheter till god hälsa.",
                sentence: "Dåliga _____ som trångboddhet, osäker anställning och ekonomisk stress kan leda till sämre hälsa.",
                scenario: "En ensamstående förälder bor i en fuktig lägenhet, har osäker anställning och råd inte till hälsosam mat – yttre omständigheter som påverkar familjens välmående.",
                ickeExempel: {
                    korrekt: "Tryggt boende, stabil ekonomi och ett socialt nätverk räknas till goda livsvillkor.",
                    icke: "En persons personliga val av livsstil – vad hen äter och hur mycket hen tränar – är hens livsvillkor.",
                    forklaring: "Livsvillkor är de yttre strukturella förhållandena – inte de individuella val personen gör (det kallas livsstilsfaktorer)."
                }
            },
            {
                term: "Epidemiologi",
                definition: "Vetenskapen som studerar sjukdomars fördelning, orsaker och riskfaktorer i befolkningar.",
                sentence: "Tack vare _____ kunde forskare snabbt kartlägga hur covid-19 spreds i samhället och identifiera riskgrupper.",
                scenario: "En forskargrupp kartlägger hur en ny infektion spreds i landet, vilka åldersgrupper som drabbades hårdast och vad som skyddade mot smitta.",
                ickeExempel: {
                    korrekt: "Forskning om varför cancer är vanligare i vissa regioner är ett exempel på epidemiologi.",
                    icke: "En läkare som undersöker en enskild patient med feber ägnar sig åt epidemiologi.",
                    forklaring: "Epidemiologi handlar om mönster och fördelning på befolkningsnivå – inte om enskild patientundersökning."
                }
            },
            {
                term: "Mortalitet",
                definition: "Dödligheten i en befolkning – hur stor andel som dör av en viss orsak under en viss tidsperiod.",
                sentence: "_____ i lungcancer är betydligt högre bland rökare jämfört med icke-rökare.",
                scenario: "En rapport redovisar hur stor andel av alla som insjuknade i en viss sjukdom som avled inom ett år, uppdelat på åldersgrupper.",
                ickeExempel: {
                    korrekt: "Minskat antal dödsfall i hjärtinfarkt de senaste 20 åren tyder på lägre mortalitet i hjärt-kärlsjukdomar.",
                    icke: "Antalet personer som just nu lever med diabetes är ett mått på mortalitet.",
                    forklaring: "Antalet som lever med en sjukdom mäter morbiditet – mortalitet mäter dödlighet."
                }
            },
            {
                term: "Morbiditet",
                definition: "Sjukligheten i en befolkning – hur vanligt det är att man drabbas av sjukdom eller lever med en sjukdom.",
                sentence: "Hög _____ i fetma leder till ökade kostnader för sjukvården och sämre livskvalitet för individen.",
                scenario: "En studie mäter hur stor andel av befolkningen som för tillfället lever med eller tidigare drabbats av diabetes, astma och depression.",
                ickeExempel: {
                    korrekt: "Ökad förekomst av psykisk ohälsa bland unga mäts som morbiditet i statistiken.",
                    icke: "Antalet personer som dog i covid-19 är ett mått på morbiditet.",
                    forklaring: "Antalet dödsfall mäter mortalitet – morbiditet mäter sjuklighet och förekomst av sjukdom."
                }
            },
            {
                term: "Incidens",
                definition: "Antalet nya sjukdomsfall som uppkommer i en befolkning under en bestämd tidsperiod.",
                sentence: "_____ av typ 2-diabetes ökar varje år, vilket tyder på ett växande folkhälsoproblem i Sverige.",
                scenario: "Under 2023 fick exakt 4 200 personer i Sverige en ny diagnos av lungcancer – ett tal som forskarna följer för att se om sjukdomen ökar eller minskar.",
                ickeExempel: {
                    korrekt: "Antalet nydiagnostiserade fall av typ 2-diabetes per år mäter incidensen av sjukdomen.",
                    icke: "Totalt antal personer som just nu har diabetes i Sverige är ett mått på incidens.",
                    forklaring: "Totalt antal fall vid ett givet tillfälle mäter prevalens – incidens mäter enbart de *nya* fallen under en period."
                }
            },
            {
                term: "Prevalens",
                definition: "Det totala antalet individer med en viss sjukdom i en befolkning vid ett givet tillfälle.",
                sentence: "Hög _____ av astma bland barn i städer är kopplat till luftföroreningar och inomhusmiljö.",
                scenario: "En enkät skickas ut och resultaten visar att just nu, idag, lever 900 000 svenskar med diagnosen typ 2-diabetes.",
                ickeExempel: {
                    korrekt: "Andelen av befolkningen som har astma just nu är ett mått på prevalensen av astma.",
                    icke: "Antalet nya astmafall som uppstod förra året är ett mått på prevalens.",
                    forklaring: "Nya fall per period mäts med incidens – prevalens mäter det totala antalet befintliga fall vid ett tillfälle."
                }
            },
            {
                term: "Hälsojämlikhet",
                definition: "Principen att alla människor och grupper ska ha lika möjligheter till god hälsa, oavsett bakgrund och sociala villkor.",
                sentence: "_____ är ett centralt mål i svensk folkhälsopolitik – ingen ska ha sämre hälsa på grund av var de bor eller hur mycket de tjänar.",
                scenario: "En politisk rapport slår fast att samhället ska ge varje invånare samma förutsättningar att leva hälsosamt – oavsett inkomst, bakgrund eller bostadsort.",
                ickeExempel: {
                    korrekt: "Att erbjuda gratis tandvård till alla barn oavsett familjens inkomst är ett steg mot hälsojämlikhet.",
                    icke: "Att alla medborgare faktiskt har exakt lika god hälsa innebär att samhället uppnått hälsojämlikhet.",
                    forklaring: "Hälsojämlikhet handlar om lika *möjligheter* – inte om att alla automatiskt har identisk hälsa."
                }
            },
            {
                term: "Vaccinationsprogram",
                definition: "Organiserade insatser för att erbjuda vaccin till hela eller delar av befolkningen i syfte att förebygga smittsamma sjukdomar.",
                sentence: "Det svenska _____ har nästan utrotat sjukdomar som polio och mässling under de senaste decennierna.",
                scenario: "Alla skolbarn i landet erbjuds kostnadsfritt skydd mot mässling, påssjuka och röda hund via ett strukturerat, nationellt finansierat program.",
                ickeExempel: {
                    korrekt: "Det nationella vaccinationsprogrammet mot HPV erbjuds alla flickor i skolålder.",
                    icke: "En person som frivilligt bokar ett resevaccin på en privat klinik deltar i ett vaccinationsprogram.",
                    forklaring: "Vaccinationsprogram är organiserade, samhällsfinansierade insatser riktade till befolkningsgrupper – inte individuella privata inköp."
                }
            },
            {
                term: "Fysisk aktivitet",
                definition: "Rörelse som ökar kroppens energiförbrukning och bidrar till bättre hälsa, t.ex. promenader, träning och vardagsmotion.",
                sentence: "Regelbunden _____ minskar risken för folksjukdomar som hjärt-kärlsjukdom, diabetes och depression.",
                scenario: "En person går till jobbet varje dag, leker med sina barn på kvällen och tar alltid trapporna istället för hissen – utan att sätta sin fot på ett gym.",
                ickeExempel: {
                    korrekt: "Promenader och cykling till jobbet räknas som fysisk aktivitet och förbättrar hälsan.",
                    icke: "Att äta mer proteiner och vitaminer är en form av fysisk aktivitet som stärker kroppen.",
                    forklaring: "Kost och näring är inte fysisk aktivitet – begreppet avser rörelse och ökad energiförbrukning."
                }
            },
            {
                term: "Livsstilsfaktorer",
                definition: "De val och beteenden i vardagen som påverkar hälsan, t.ex. kost, rökning, alkohol och motion.",
                sentence: "_____ som kost och motion är viktiga att påverka inom folkhälsoarbetet för att minska folksjukdomar.",
                scenario: "En hälsoenkät frågar om du röker, hur ofta du dricker alkohol, vad du äter och hur mycket du rör på dig – för att bedöma dina levnadsvanor.",
                ickeExempel: {
                    korrekt: "Rökning, kost och sömnvanor räknas alla som livsstilsfaktorer som påverkar hälsan.",
                    icke: "Att ha ett fysiskt tungt och farligt jobb räknas som en livsstilsfaktor eftersom du valt yrket själv.",
                    forklaring: "Arbetsförhållanden är livsvillkor som styrs av strukturella faktorer – inte enbart av personliga val."
                }
            }
        ];

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getFeedback(score, total) {
            const p = score / total;
            if (p >= 0.9) return "Redo för provet! Fantastiskt bra!";
            if (p >= 0.7) return "Bra jobbat! Öva lite till på de du missade.";
            if (p >= 0.5) return "Halvvägs! Fortsätt träna.";
            return "Öva lite till – du är på rätt väg!";
        }

        function LucktextView() {
            const [inputs, setInputs] = useState(concepts.map(() => ''));
            const [attempts, setAttempts] = useState(concepts.map(() => 0));
            const [statuses, setStatuses] = useState(concepts.map(() => null));
            const [done, setDone] = useState(false);

            const normalize = s => s.trim().toLowerCase();

            const submit = (i) => {
                if (statuses[i] === 'correct' || statuses[i] === 'wrong-final') return;
                if (normalize(inputs[i]) === normalize(concepts[i].term)) {
                    const s = [...statuses]; s[i] = 'correct'; setStatuses(s);
                } else {
                    const a = [...attempts]; a[i]++; setAttempts(a);
                    const s = [...statuses]; s[i] = a[i] >= 2 ? 'wrong-final' : 'wrong-once'; setStatuses(s);
                }
            };

            const rättaAlla = () => { setStatuses(statuses.map(s => s === 'correct' ? 'correct' : 'wrong-final')); setDone(true); };
            const börjaOm = () => { setInputs(concepts.map(() => '')); setAttempts(concepts.map(() => 0)); setStatuses(concepts.map(() => null)); setDone(false); };

            const correctCount = statuses.filter(s => s === 'correct').length;
            const allDone = done || statuses.every(s => s === 'correct' || s === 'wrong-final');

            return (
                <div>
                    <div className="mb-6 p-4 bg-white rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Begreppsbank</p>
                        <div className="flex flex-wrap gap-2">
                            {concepts.map((c, i) => (
                                <span key={i} className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${statuses[i] === 'correct' ? 'line-through text-slate-400 bg-green-50 border-green-200' : 'bg-green-50 border-green-300 text-green-800'}`}>{c.term}</span>
                            ))}
                        </div>
                    </div>
                    <div className="grid gap-4">
                        {concepts.map((c, i) => {
                            const parts = c.sentence.split('_____');
                            const st = statuses[i];
                            return (
                                <div key={i} className={`bg-white p-5 rounded-2xl shadow-sm border-l-8 transition-all ${st === 'correct' ? 'border-green-500' : st === 'wrong-final' ? 'border-red-400' : 'border-green-400'}`}>
                                    <p className="text-slate-700 mb-3 leading-relaxed">{parts[0]}<span className="font-bold text-green-600">[_____]</span>{parts[1]}</p>
                                    {st === 'correct' ? (
                                        <div className="flex flex-wrap items-center gap-2 text-green-600"><span className="font-bold">✓ {c.term}</span><span className="text-sm font-normal text-slate-500">– {c.definition}</span></div>
                                    ) : st === 'wrong-final' ? (
                                        <div><p className="text-red-500 text-sm">Rätt svar: <span className="font-bold">{c.term}</span></p><p className="text-slate-500 text-sm mt-1">{c.definition}</p></div>
                                    ) : (
                                        <div>
                                            <div className="flex gap-2">
                                                <input type="text" value={inputs[i]} onChange={e => { const v = [...inputs]; v[i] = e.target.value; setInputs(v); }} onKeyDown={e => e.key === 'Enter' && submit(i)} placeholder="Skriv begreppet och tryck Enter..." className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-green-400 text-sm" />
                                                <button onClick={() => submit(i)} className="bg-green-400 text-green-900 px-4 py-2 rounded-xl font-bold hover:bg-green-500 transition-colors">→</button>
                                            </div>
                                            {st === 'wrong-once' && <p className="text-orange-500 text-sm mt-2 font-medium">Är du säker att du stavat rätt?</p>}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="mt-8 flex justify-between items-center">
                        <button onClick={börjaOm} className="text-slate-500 hover:text-slate-700 font-medium transition-colors">↺ Börja om</button>
                        {!allDone && <button onClick={rättaAlla} className="bg-slate-800 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-700 transition-colors">Rätta alla</button>}
                    </div>
                    {allDone && (
                        <div className="mt-8 bg-green-50 border-2 border-green-400 rounded-3xl p-8 text-center">
                            <p className="text-5xl font-bold text-green-500 mb-2">{correctCount}/{concepts.length}</p>
                            <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(correctCount, concepts.length)}</p>
                            <button onClick={börjaOm} className="bg-green-400 text-green-900 px-8 py-3 rounded-2xl font-bold hover:bg-green-500 transition-colors">Börja om</button>
                        </div>
                    )}
                </div>
            );
        }

        function ScenarioView() {
            const [shuffledIdxs] = useState(() => shuffleArray(concepts.map((_, i) => i)));
            const [current, setCurrent] = useState(0);
            const [answered, setAnswered] = useState(null);
            const [selected, setSelected] = useState(null);
            const [score, setScore] = useState(0);
            const [done, setDone] = useState(false);
            const [termOptions, setTermOptions] = useState(() => shuffleArray(concepts.map(c => c.term)));

            const conceptIdx = shuffledIdxs[current];
            const concept = concepts[conceptIdx];

            const handleSelect = (term) => {
                if (answered !== null) return;
                setSelected(term);
                const isCorrect = term === concept.term;
                setAnswered(isCorrect ? 'correct' : 'wrong');
                if (isCorrect) setScore(s => s + 1);
            };

            const next = () => {
                if (current + 1 >= concepts.length) { setDone(true); return; }
                setCurrent(c => c + 1);
                setAnswered(null);
                setSelected(null);
                setTermOptions(shuffleArray(concepts.map(c => c.term)));
            };

            const reset = () => {
                setCurrent(0);
                setAnswered(null);
                setSelected(null);
                setScore(0);
                setDone(false);
                setTermOptions(shuffleArray(concepts.map(c => c.term)));
            };

            if (done) return (
                <div className="text-center">
                    <div className="bg-green-50 border-2 border-green-400 rounded-3xl p-8 mb-6">
                        <p className="text-5xl font-bold text-green-500 mb-2">{score}/{concepts.length}</p>
                        <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(score, concepts.length)}</p>
                        <button onClick={reset} className="bg-green-400 text-green-900 px-8 py-3 rounded-2xl font-bold hover:bg-green-500 transition-colors">Börja om</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-2xl mx-auto">
                    <div className="flex justify-between items-center mb-3">
                        <span className="font-bold text-green-700">Poäng: {score}</span>
                        <span className="text-slate-400 text-sm">{current + 1} / {concepts.length}</span>
                    </div>
                    <div className="w-full bg-slate-200 rounded-full h-2 mb-6">
                        <div className="bg-green-400 h-2 rounded-full transition-all" style={{width: `${((current + 1) / concepts.length) * 100}%`}}></div>
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-lg mb-6">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Vilket begrepp beskrivs?</p>
                        <p className="text-lg text-slate-800 leading-relaxed italic">"{concept.scenario}"</p>
                    </div>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        {termOptions.map((term, i) => (
                            <button key={i} onClick={() => handleSelect(term)} disabled={answered !== null}
                                className={`p-4 rounded-2xl font-bold border-2 text-left transition-all ${
                                    answered === null ? 'bg-white border-slate-200 hover:border-green-400 hover:bg-green-50' :
                                    term === concept.term ? 'bg-green-50 border-green-500 text-green-700' :
                                    term === selected ? 'bg-red-50 border-red-500 text-red-700' :
                                    'bg-white border-slate-100 text-slate-300'
                                }`}>
                                {term}
                            </button>
                        ))}
                    </div>
                    {answered !== null && (
                        <div>
                            <div className={`p-4 rounded-2xl text-sm font-medium mb-4 ${answered === 'correct' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`}>
                                {answered === 'correct' ? `✓ Rätt! ${concept.definition}` : `✗ Fel. Rätt svar: ${concept.term} – ${concept.definition}`}
                            </div>
                            <button onClick={next} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all">
                                {current + 1 >= concepts.length ? 'Se resultat' : 'Nästa scenario →'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function IckeExempelView() {
            const [revealed, setRevealed] = useState(concepts.map(() => false));

            const toggle = (i) => { const r = [...revealed]; r[i] = !r[i]; setRevealed(r); };

            return (
                <div className="grid gap-5">
                    {concepts.map((c, i) => (
                        <div key={i} className="bg-white rounded-2xl shadow-sm border-l-8 border-green-400 overflow-hidden">
                            <div className="p-5">
                                <div className="flex items-center gap-3 mb-3">
                                    <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-lg">{i + 1}</span>
                                    <h3 className="text-lg font-bold">{c.term}</h3>
                                </div>
                                <div className="mb-3 p-3 bg-green-50 rounded-xl">
                                    <p className="text-xs font-bold text-green-700 uppercase tracking-wider mb-1">✓ Korrekt tillämpning</p>
                                    <p className="text-slate-700 text-sm">{c.ickeExempel.korrekt}</p>
                                </div>
                                <button onClick={() => toggle(i)} className={`w-full py-2 rounded-xl font-bold text-sm transition-all ${revealed[i] ? 'bg-red-100 text-red-700' : 'bg-slate-800 text-white hover:bg-slate-700'}`}>
                                    {revealed[i] ? 'Dölj icke-exempel' : 'Visa icke-exempel 🪤'}
                                </button>
                            </div>
                            {revealed[i] && (
                                <div className="px-5 pb-5">
                                    <div className="mb-3 p-3 bg-red-50 rounded-xl">
                                        <p className="text-xs font-bold text-red-700 uppercase tracking-wider mb-1">✗ Trovärdigt icke-exempel (fälla)</p>
                                        <p className="text-slate-700 text-sm">{c.ickeExempel.icke}</p>
                                    </div>
                                    <div className="p-3 bg-amber-50 rounded-xl">
                                        <p className="text-xs font-bold text-amber-700 uppercase tracking-wider mb-1">Förklaring av fällan</p>
                                        <p className="text-slate-700 text-sm">{c.ickeExempel.forklaring}</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('list');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    let n; do { n = Math.floor(Math.random() * concepts.length); } while (n === currentIndex && concepts.length > 1);
                    setCurrentIndex(n);
                }, 150);
            };

            const activeTab = 'bg-green-400 text-green-900 font-bold shadow-sm';
            const inactiveTab = 'text-slate-500';

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-2xl mx-auto mb-8 flex items-center justify-between">
                        <a href="index.html" className="text-slate-500 hover:text-green-600 transition-colors flex items-center gap-2 font-medium text-sm">← Tillbaka till startsidan</a>
                        <h1 className="text-2xl md:text-3xl font-bold text-center">Folkhälsa – Naturkunskap 2</h1>
                        <div className="w-36"></div>
                    </header>

                    <div className="max-w-2xl mx-auto mb-10 flex bg-white p-1 rounded-full shadow-md border border-slate-200">
                        <button onClick={() => setView('list')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'list' ? activeTab : inactiveTab}`}>Lista</button>
                        <button onClick={() => setView('flashcards')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'flashcards' ? activeTab : inactiveTab}`}>Flashcards</button>
                        <button onClick={() => setView('lucktext')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'lucktext' ? activeTab : inactiveTab}`}>Lucktext</button>
                        <button onClick={() => setView('scenario')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'scenario' ? activeTab : inactiveTab}`}>Scenario</button>
                        <button onClick={() => setView('icke')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'icke' ? activeTab : inactiveTab}`}>Icke-ex.</button>
                    </div>

                    <main className="max-w-2xl mx-auto">
                        {view === 'list' && (
                            <div className="grid gap-4">
                                {concepts.map((item, index) => (
                                    <div key={index} className="bg-white p-5 rounded-2xl border-l-8 border-green-400 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded-lg">{index + 1}</span>
                                            <h3 className="text-lg font-bold">{item.term}</h3>
                                        </div>
                                        <p className="text-slate-600 leading-relaxed ml-10">{item.definition}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {view === 'flashcards' && (
                            <div className="flex flex-col items-center">
                                <div className="flip-card mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`flip-card-inner ${isFlipped ? 'flipped-classes' : ''}`}>
                                        <div className="flip-card-front">
                                            <h2 className="text-3xl font-bold text-slate-900 text-center px-4">{concepts[currentIndex].term}</h2>
                                            <div className="absolute bottom-6 animate-pulse"><span className="text-[10px] uppercase tracking-[0.2em] text-green-900 font-bold opacity-70">Klicka för svar</span></div>
                                        </div>
                                        <div className="flip-card-back">
                                            <p className="text-xl leading-relaxed text-slate-800 font-medium px-4">{concepts[currentIndex].definition}</p>
                                            <div className="absolute bottom-6"><span className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Klicka för att vända</span></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center gap-4">
                                    <button onClick={nextCard} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-3 text-lg">Nästa begrepp <span>→</span></button>
                                    <p className="text-slate-500 font-medium bg-slate-200 px-4 py-1 rounded-full text-xs">{currentIndex + 1} av {concepts.length}</p>
                                </div>
                            </div>
                        )}
                        {view === 'lucktext' && <LucktextView />}
                        {view === 'scenario' && <ScenarioView />}
                        {view === 'icke' && <IckeExempelView />}
                    </main>

                    <footer className="mt-12 text-center text-slate-400 text-sm italic pb-8">Källa: Naturkunskap 2 – Folkhälsa begreppslista</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
