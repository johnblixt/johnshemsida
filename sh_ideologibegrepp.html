<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begreppslista Ideologier</title>
    <!-- Google Fonts: Fredoka -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f8fafc;
        }
        /* Flashcard Animationer */
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Ikon-komponenter för att ersätta Lucide-importer i CDN-miljö
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const terms = [
            { id: 1, term: "Ideologi", definition: "Idéer om hur samhället ska styras och hur det borde se ut." },
            { id: 2, term: "Blockpolitik", definition: "När partier samarbetar i grupper, t.ex. höger (borgerliga) eller vänster (rödgröna)." },
            { id: 3, term: "Stödparti", definition: "Ett parti som stödjer regeringen men ingår inte i den." },
            { id: 4, term: "Höger-vänsterskalan", definition: "En skala som visar partiers syn på ekonomi, skatt och fördelning." },
            { id: 5, term: "GAL-TAN-skalan", definition: "En skala som visar värderingar från grönt/liberalt till traditionellt/nationalistiskt." },
            { id: 6, term: "Socialism", definition: "En ideologi som vill minska skillnader mellan rika och fattiga, staten ska äga viktiga delar av samhället." },
            { id: 7, term: "Liberalism", definition: "En ideologi som betonar individens frihet, privat ägande och marknadsekonomi." },
            { id: 8, term: "Konservatism", definition: "En ideologi som vill bevara traditioner, religion och kultur, och förändra samhället långsamt." },
            { id: 9, term: "Ekologism", definition: "En ideologi som sätter miljö och hållbar utveckling i centrum." },
            { id: 10, term: "Feminism", definition: "En ideologi som vill ha jämställdhet mellan kvinnor och män." },
            { id: 11, term: "Nationalism", definition: "En ideologi som betonar nationell gemenskap, språk och kultur." },
            { id: 12, term: "Kommunism", definition: "En ideologi som vill skapa ett klasslöst samhälle genom att staten äger allt." },
            { id: 13, term: "Fascism", definition: "En ideologi som är emot demokrati och vill ha en stark ledare som styr." },
            { id: 14, term: "Nazism", definition: "En ideologi som liknar fascism men bygger på rasistiska idéer om en 'överlägsen ras'." },
            { id: 15, term: "Populism", definition: "En politisk stil som säger sig tala för 'folket' mot 'eliten', ofta med enkla lösningar." },
            { id: 16, term: "Solidaritet", definition: "Tanken att människor ska hjälpa och stötta varandra i samhället." },
            { id: 17, term: "Välfärdsstat", definition: "Ett samhälle där staten ansvarar för vård, skola och omsorg." },
            { id: 18, term: "Partiprogram", definition: "Ett dokument där ett parti skriver sina idéer, mål och förslag." },
            { id: 19, term: "Folkrörelser", definition: "Stora grupper av människor som driver förändring, t.ex. arbetarrörelsen, palestinarörelsen." },
            { id: 20, term: "Tidöavtalet", definition: "Ett avtal mellan M, KD, L och SD om gemensam politik." }
        ];

        const App = () => {
            const [view, setView] = useState('lista');
            const [shuffledTerms, setShuffledTerms] = useState([...terms]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const shuffleCards = () => {
                const shuffled = [...terms].sort(() => Math.random() - 0.5);
                setShuffledTerms(shuffled);
                setCurrentIndex(0);
                setIsFlipped(false);
            };

            const handleNextCard = (e) => {
                e.stopPropagation();
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex((prev) => (prev + 1) % shuffledTerms.length);
                }, 150);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <nav className="bg-white border-b border-yellow-200 p-4 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                            <a href="index.html" className="flex items-center text-slate-600 hover:text-yellow-600 transition-colors">
                                <Icon name="arrow-left" size={20} className="mr-1" />
                                <span className="font-medium">Portal</span>
                            </a>
                            <h1 className="text-xl font-bold text-slate-800 hidden md:block">Samhällskunskap: Ideologier</h1>
                            <div className="flex bg-slate-100 p-1 rounded-xl">
                                <button 
                                    onClick={() => setView('lista')}
                                    className={`flex items-center px-4 py-2 rounded-lg transition-all ${view === 'lista' ? 'bg-yellow-400 text-white shadow-md' : 'text-slate-500'}`}
                                >
                                    <Icon name="list" size={16} className="mr-2" />
                                    Lista
                                </button>
                                <button 
                                    onClick={() => { setView('flashcards'); shuffleCards(); }}
                                    className={`flex items-center px-4 py-2 rounded-lg transition-all ${view === 'flashcards' ? 'bg-yellow-400 text-white shadow-md' : 'text-slate-500'}`}
                                >
                                    <Icon name="graduation-cap" size={16} className="mr-2" />
                                    Träna
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 mt-6">
                        {view === 'lista' ? (
                            <div className="animate-in fade-in">
                                <div className="bg-yellow-100 border-l-4 border-yellow-400 p-4 mb-6 rounded-r-xl">
                                    <h2 className="text-yellow-800 font-bold text-lg">Begreppslista</h2>
                                    <p className="text-yellow-700 text-sm">Alla 20 begrepp från materialet.</p>
                                </div>
                                
                                <div className="grid gap-3">
                                    {terms.map((item) => (
                                        <div key={item.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-start hover:border-yellow-200 transition-all">
                                            <span className="bg-yellow-100 text-yellow-700 font-bold min-w-[2rem] h-8 flex items-center justify-center rounded-full mr-4 text-sm">
                                                {item.id}
                                            </span>
                                            <div>
                                                <h3 className="font-bold text-slate-800 text-lg mb-1">{item.term}</h3>
                                                <p className="text-slate-600 leading-relaxed">{item.definition}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center">
                                <div className="text-center mb-8">
                                    <p className="text-slate-500 font-medium mb-1">Kort {currentIndex + 1} av {shuffledTerms.length}</p>
                                    <h2 className="text-2xl font-bold text-slate-800">Flashcards</h2>
                                </div>

                                <div 
                                    className="w-full max-w-md h-80 perspective-1000 cursor-pointer group"
                                    onClick={() => setIsFlipped(!isFlipped)}
                                >
                                    <div className={`relative w-full h-full card-inner preserve-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                                        {/* Fram */}
                                        <div className="absolute w-full h-full backface-hidden bg-white border-2 border-yellow-400 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center">
                                            <span className="text-yellow-500 font-bold mb-4 uppercase tracking-widest text-xs">Begrepp</span>
                                            <h3 className="text-3xl font-bold text-slate-800">
                                                {shuffledTerms[currentIndex].term}
                                            </h3>
                                            <p className="mt-8 text-slate-300 text-sm italic">Klicka för att vända</p>
                                        </div>

                                        {/* Bak */}
                                        <div className="absolute w-full h-full backface-hidden bg-yellow-400 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 text-center rotate-y-180">
                                            <span className="text-yellow-800 font-bold mb-4 uppercase tracking-widest text-xs opacity-70">Definition</span>
                                            <p className="text-xl text-yellow-950 font-medium leading-relaxed">
                                                {shuffledTerms[currentIndex].definition}
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-12 flex gap-4">
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); shuffleCards(); }}
                                        className="bg-slate-200 text-slate-600 p-4 rounded-2xl hover:bg-slate-300 transition-all active:scale-95"
                                        title="Blanda om"
                                    >
                                        <Icon name="refresh-cw" />
                                    </button>
                                    <button 
                                        onClick={handleNextCard}
                                        className="bg-yellow-400 text-yellow-950 px-10 py-4 rounded-2xl font-bold flex items-center shadow-lg hover:bg-yellow-500 transition-all active:scale-95 text-lg"
                                    >
                                        Nästa kort
                                        <Icon name="chevron-right" className="ml-2" />
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
