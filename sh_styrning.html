<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statsskicket Master 40</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- INBYGGDA IKONER (SVG) ---
        const Icon = ({ name, className = "" }) => {
            const paths = {
                clock: <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />,
                graduation: <path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />,
                lightbulb: <path d="M9.663 17h4.674M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />,
                arrowRight: <path d="M13 7l5 5m0 0l-5 5m5-5H6" />,
                refresh: <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />,
                check: <path d="M5 13l4 4L19 7" />,
                x: <path d="M6 18L18 6M6 6l12 12" />
            };
            return (
                <svg className={`w-5 h-5 fill-none stroke-current stroke-2 ${className}`} viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    {paths[name]}
                </svg>
            );
        };

        const QUESTION_BANK = [
            // Grundlagarnas syfte
            { q: "Vilket är det främsta målet med att ha grundlagar i Sverige?", a: ["Att skydda demokratin och sätta ramarna för hur landet styrs.", "Att bestämma vilka straff som gäller för vanliga småbrott.", "Att ge kungen absolut makt i krislägen.", "Att kontrollera vad kommunerna gör med sina skattepengar."], correct: "Att skydda demokratin och sätta ramarna för hur landet styrs.", hint: "Grundlagarna är demokratins fundament." },
            { q: "Varför har Sverige lagar som är svårare att ändra än andra?", a: ["För att skydda de demokratiska spelreglerna från snabba beslut.", "För att kungen ska kunna styra mer effektivt.", "För att EU kräver att lagar ändras långsamt.", "För att det sparar pengar åt statskassan."], correct: "För att skydda de demokratiska spelreglerna från snabba beslut.", hint: "Stabilitet är nyckeln till en trygg demokrati." },
            // Ändring av grundlag
            { q: "Vad krävs för att riksdagen ska kunna ändra en grundlag?", a: ["Två likadana beslut med ett riksdagsval emellan.", "Att kungen ger sitt personliga godkännande.", "Att minst 90% av folket röstar ja i en folkomröstning.", "Ett beslut som sedan skickas till EU för kontroll."], correct: "Två likadana beslut med ett riksdagsval emellan.", hint: "Folket ska få säga sitt i ett val mellan besluten." },
            { q: "Varför räcker det inte med ett enkelt beslut för att ändra en grundlag?", a: ["Man vill hindra en tillfällig majoritet från att avskaffa demokratiska rättigheter.", "Det tar för lång tid att trycka de nya lagböckerna.", "Regeringen vill ha mer tid på sig att förhandla.", "Det är en gammal tradition från 1800-talet."], correct: "Man vill hindra en tillfällig majoritet från att avskaffa demokratiska rättigheter.", hint: "Det är en säkerhetsspärr mot maktmissbruk." },
            // Regeringsformen
            { q: "Vilken grundlag slår fast att 'all offentlig makt utgår från folket'?", a: ["Regeringsformen", "Successionsordningen", "Yttrandefrihetsgrundlagen", "Tryckfrihetsförordningen"], correct: "Regeringsformen", hint: "Det är Sveriges viktigaste grundlag." },
            { q: "Vilken lag beskriver hur val till riksdagen ska gå till?", a: ["Regeringsformen", "Successionsordningen", "Kommunallagen", "Skollagen"], correct: "Regeringsformen", hint: "Den styr hela statsskicket." },
            // Tryck/Yttrandefrihet
            { q: "Vilken grundlag ger dig rätt att skriva i tidningar utan att staten granskar det först?", a: ["Tryckfrihetsförordningen", "Successionsordningen", "Regeringsformen", "Yttrandefrihetsgrundlagen"], correct: "Tryckfrihetsförordningen", hint: "Fokus på tryckta texter." },
            { q: "Vad innebär ordet 'censur' som är förbjudet i Sverige?", a: ["Att myndigheter stoppar eller ändrar information innan den publiceras.", "Att man måste betala för att få läsa tidningen.", "Att alla journalister måste vara anställda av staten.", "Att man inte får kritisera kungen."], correct: "Att myndigheter inte får granska eller stoppa material innan det publiceras.", hint: "Frihet utan förhandskontroll." },
            { q: "Vilken grundlag skyddar rätten att uttrycka sig i radio, TV och på internet?", a: ["Yttrandefrihetsgrundlagen", "Tryckfrihetsförordningen", "Regeringsformen", "Successionsordningen"], correct: "Yttrandefrihetsgrundlagen", hint: "Gäller tekniska överföringar." },
            { q: "Varför är yttrandefriheten viktig för demokratin?", a: ["Det låter medborgare kritisera makthavare och sprida olika åsikter.", "Det gör att tidningarna säljer fler exemplar.", "Det tvingar alla att rösta på samma parti.", "Det ger kungen rätt att prata i radio varje dag."], correct: "Det låter medborgare kritisera makthavare och sprida olika åsikter.", hint: "Öppen debatt är demokratins hjärta." },
            // Successionsordningen
            { q: "Vilken grundlag bestämmer vem som ärver tronen?", a: ["Successionsordningen", "Regeringsformen", "Kyrkolagen", "Brottsbalken"], correct: "Successionsordningen", hint: "Succession betyder efterträdare." },
            { q: "Vad innebär Successionsordningen för kungen?", a: ["Den sätter reglerna för hur han efterträds av sitt äldsta barn.", "Den ger honom makt att avskeda statsministern.", "Den tvingar honom att bo i riksdagshuset.", "Den bestämmer vad han ska äta till middag."], correct: "Den sätter reglerna för hur han efterträds av sitt äldsta barn.", hint: "Tronföljd genom arv." },
            // Laghierarki
            { q: "Vad händer om en vanlig lag säger något som går emot en grundlag?", a: ["Grundlagen vinner alltid över den vanliga lagen.", "Den vanliga lagen gäller om den är nyare.", "Man lottar om vilken lag som ska följas.", "Kungen får bestämma vilken lag som är bäst."], correct: "Grundlagen vinner alltid över den vanliga lagen.", hint: "Grundlagar står högst i rangordningen." },
            { q: "Varför kan inte riksdagen stifta en lag som förbjuder alla demonstrationer?", a: ["Det skulle krocka med grundlagsskyddade friheter.", "Det skulle bli för dyrt att genomföra.", "Polisen har inte tillräckligt med personal.", "Kungen gillar att titta på demonstrationer."], correct: "Det skulle krocka med grundlagsskyddade friheter.", hint: "Demonstrationsfriheten är skyddad av grundlagen." },
            // Motion/Proposition
            { q: "Vad kallas ett lagförslag som kommer från regeringen?", a: ["Proposition", "Motion", "Remiss", "Betänkande"], correct: "Proposition", hint: "Regeringen föreslår." },
            { q: "Vad är en 'motion' i riksdagen?", a: ["Ett lagförslag från en enskild riksdagsledamot.", "En kaffepaus under ett långt sammanträde.", "Ett beslut som kungen fattar i hemlighet.", "Ett krav från EU på högre skatter."], correct: "Ett lagförslag från en enskild riksdagsledamot.", hint: "Ledamöternas egna idéer." },
            { q: "Varför kommer de flesta lagförslag från regeringen (propositioner)?", a: ["Regeringen har experter som kan utreda frågorna noga.", "Ledamöterna i riksdagen får inte skriva egna förslag.", "Kungen litar bara på regeringens ministrar.", "Det är enklare att skriva ut dem på regeringskansliet."], correct: "Regeringen har tillgång till experter och myndigheter som kan utreda frågorna noga.", hint: "De har resurserna för stora utredningar." },
            { q: "Kan flera riksdagsledamöter gå ihop och skriva en motion?", a: ["Ja, det är vanligt att flera ledamöter samarbetar.", "Nej, varje motion måste ha exakt en författare.", "Bara om de tillhör samma familj.", "Endast om talmannen ger dem lov först."], correct: "Ja, det är vanligt att flera ledamöter samarbetar.", hint: "Samarbete ger förslaget mer tyngd." },
            // Utredning/Remiss
            { q: "Varför görs en statlig utredning innan en ny lag skrivs?", a: ["För att samla in fakta och se vilka effekter lagen får.", "För att förvirra motståndarna till förslaget.", "För att kungen ska hinna godkänna idén.", "För att det står i bibeln att man ska utreda allt."], correct: "För att samla in fakta och se vilka effekter lagen får.", hint: "Välgrundade beslut är bäst." },
            { q: "Vad händer under ett 'remissförfarande'?", a: ["Myndigheter och organisationer får ge sina synpunkter på förslaget.", "Man skickar förslaget till EU för en sista kontroll.", "Riksdagens ledamöter åker på semester.", "Kungen läser upp förslaget i radio."], correct: "Myndigheter och organisationer får ge sina synpunkter på förslaget.", hint: "Experter och berörda får säga sitt." },
            // Utskott
            { q: "Vilken roll har utskotten i riksdagen?", a: ["De förbereder riksdagens beslut genom att fördjupa sig i frågorna.", "De ser till att ledamöterna får mat och dryck.", "De kontrollerar att kungen sköter sitt jobb.", "De fungerar som domstolar för riksdagsledamöter."], correct: "De förbereder riksdagens beslut genom att fördjupa sig i frågorna.", hint: "Riksdagens arbetsgrupper." },
            { q: "Vad är ett 'betänkande'?", a: ["Utskottets förslag till hur riksdagen ska rösta.", "Ett brev där en ledamot tackar för ordet.", "En lista på alla som röstade nej.", "Ett krav från kungen på nya kläder."], correct: "Utskottets förslag till hur riksdagen ska rösta.", hint: "Deras slutrapport om ett ärende." },
            // Kammaren/Omröstning
            { q: "Var sker den sista debatten och omröstningen om en ny lag?", a: ["I kammaren (plenisalen) i riksdagen.", "I en hemlig källare under slottet.", "I Högsta domstolen.", "I Globen under en direktsändning."], correct: "I kammaren (plenisalen) i riksdagen.", hint: "Där alla 349 ledamöter samlas." },
            { q: "Hur många ledamöter sitter i Sveriges riksdag?", a: ["349", "100", "450", "290"], correct: "349", hint: "Ett udda nummer för att undvika oavgjort." },
            // Genomförande
            { q: "Vem ska se till att lagen verkligen används när riksdagen röstat ja?", a: ["Regeringen och dess myndigheter.", "Kungen och hans livvakter.", "Polisen helt på egen hand.", "Lärarna i landets skolor."], correct: "Regeringen och dess myndigheter.", hint: "Den verkställande makten." },
            { q: "Vilken myndighet kan ansvara för att en ny trafiklag följs?", a: ["Transportstyrelsen", "Naturvårdsverket", "Skatteverket", "Försvarsmakten"], correct: "Transportstyrelsen", hint: "Myndigheter har ofta specialområden." },
            // Riksdagens uppgifter
            { q: "Vad är riksdagens två viktigaste uppgifter?", a: ["Att stifta lagar och besluta om statens pengar (budgeten).", "Att styra polisen och döma brottslingar.", "Att utse kungen och styra kyrkan.", "Att bygga vägar och skriva tidningar."], correct: "Att stifta lagar och besluta om statens budget.", hint: "Makt över regler och pengar." },
            { q: "Vem kontrollerar att ministrarna i regeringen följer lagarna?", a: ["Konstitutionsutskottet (KU) i riksdagen.", "Kungen vid de veckovisa mötena.", "En särskild grupp poliser.", "Ingen, ministrar behöver inte följa lagar."], correct: "Konstitutionsutskottet (KU) i riksdagen.", hint: "Riksdagen granskar regeringen." },
            // EU Definition
            { q: "Vad är Europeiska Unionen (EU)?", a: ["Ett samarbete mellan självständiga länder i Europa.", "Ett enda stort land där regeringen i Bryssel styr allt.", "En armé som ska försvara Europa mot rymden.", "En hjälporganisation för fattiga länder i Afrika."], correct: "Ett samarbete mellan självständiga länder i Europa.", hint: "Medlemsstater som jobbar ihop." },
            { q: "Vilket var det viktigaste skälet till att EU startades?", a: ["Att bevara freden genom ekonomiskt samarbete.", "Att tvinga alla att äta samma sorts mat.", "Att vinna krig mot USA och Kina.", "Att göra det lättare att åka på semester."], correct: "Att bevara freden genom ekonomiskt samarbete.", hint: "Länder som handlar ihop krigar inte ihop." },
            // Fri rörlighet
            { q: "Vad innebär principen om 'fri rörlighet' inom EU?", a: ["Att man fritt kan jobba, bo och studera i andra EU-länder.", "Att bilar får köra hur fort de vill i hela Europa.", "Att alla flygresor är gratis för EU-medborgare.", "Att man inte behöver visa pass vid gränsen till Kina."], correct: "Att man fritt kan jobba, bo och studera i andra EU-länder.", hint: "Gränserna ska inte stoppa människor." },
            { q: "Varför är den fria rörligheten bra för dig?", a: ["Du kan söka jobb i Frankrike lika lätt som i Sverige.", "Du får gratis busskort i hela Europa.", "Du behöver aldrig mer gå i skolan.", "Du får automatiskt medborgarskap i alla länder."], correct: "Du kan söka jobb i Frankrike lika lätt som i Sverige.", hint: "Möjligheter utanför landets gränser." },
            // Handel/Tull
            { q: "Hur påverkar EU handeln mellan länderna?", a: ["De har tagit bort tullavgifter så varor blir billigare att frakta.", "De har infört höga skatter på allt som säljs.", "De har förbjudit handel med länder utanför EU.", "De tvingar alla att sälja sina varor gratis."], correct: "De har tagit bort tullavgifter så varor blir billigare.", hint: "En gemensam inre marknad." },
            { q: "Vad är en tullavgift?", a: ["En extra skatt man betalar för att få in en vara i ett land.", "En avgift för att få gå på toa i Tyskland.", "En bensinresa som kungen bjuder på.", "En medlemsavgift till riksdagen."], correct: "En extra skatt man betalar för att få in en vara i ett land.", hint: "EU har tagit bort dessa mellan medlemsländer." },
            // Demokratiskt underskott
            { q: "Vad menas med att EU har ett 'demokratiskt underskott'?", a: ["Att besluten fattas långt ifrån folket och känns svåra att påverka.", "Att EU inte har tillräckligt med pengar för att ordna val.", "Att det bara är rika människor som får rösta i EU.", "Att kungen i Belgien bestämmer över Sverige."], correct: "Att besluten fattas långt ifrån folket och känns svåra att påverka.", hint: "Avstånd till makten i Bryssel." },
            { q: "Varför kritiseras EU ibland för att vara krångligt?", a: ["Beslutsprocesserna är ofta komplicerade och svårbegripliga.", "EU har förbjudit datorer och använder bara papper.", "Alla lagar måste skrivas på latin.", "Man får bara fatta beslut på måndagar."], correct: "Beslutsprocesserna är ofta komplicerade och svårbegripliga.", hint: "Många länder ska komma överens." },
            // EU-rätt vs Svensk rätt
            { q: "Vad händer om en svensk lag krockar med en EU-lag där EU får bestämma?", a: ["EU-lagen står över den svenska lagen.", "Den svenska lagen gäller alltid först i Sverige.", "Sverige måste lämna EU omedelbart.", "Kungen får välja vilken lag han gillar bäst."], correct: "EU-lagen står över den svenska lagen.", hint: "EU-rättens företräde." },
            { q: "Varför har EU-rätten företräde i vissa frågor?", a: ["För att reglerna ska vara lika för alla länder i samarbetet.", "För att politikerna i Bryssel är smartare.", "För att kungen har lovat att lyda EU.", "För att svenska lagar är för gamla."], correct: "För att reglerna ska vara lika för alla länder i samarbetet.", hint: "Samarbetet kräver gemensamma regler." },
            // Repetitionsfrågor
            { q: "Vem utser Sveriges statsminister?", a: ["Riksdagen efter förslag från talmannen.", "Kungen efter att ha lottat.", "Folket i ett direktval.", "EU-kommissionen i Bryssel."], correct: "Riksdagen efter förslag från talmannen.", hint: "Parlamentarism innebär att regeringen måste ha riksdagens stöd." },
            { q: "Vilken är statschefens (kungens) roll i svensk lagstiftning?", a: ["Han har ingen politisk makt och skriver inte under lagar.", "Han måste godkänna alla lagar för att de ska gälla.", "Han får ändra i lagförslagen om han vill.", "Han röstar alltid först i riksdagen."], correct: "Han har ingen politisk makt och skriver inte under lagar.", hint: "Sverige är en konstitutionell monarki." }
        ];

        function App() {
            const [gameState, setGameState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [selected, setSelected] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const [timer, setTimer] = useState(0);

            const initGame = useCallback(() => {
                const shuffled = [...QUESTION_BANK]
                    .sort(() => Math.random() - 0.5)
                    .map(q => ({
                        ...q,
                        options: [...q.a].sort(() => Math.random() - 0.5)
                    }));
                
                setQuestions(shuffled);
                setCurrentIdx(0);
                setScore(0);
                setTimer(0);
                setIsLocked(false);
                setSelected(null);
                setShowHint(false);
                setGameState('playing');
            }, []);

            useEffect(() => {
                let interval;
                if (gameState === 'playing') {
                    interval = setInterval(() => setTimer(t => t + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [gameState]);

            const formatTime = (t) => {
                const m = Math.floor(t / 60);
                const s = t % 60;
                return `${m}:${s.toString().padStart(2, '0')}`;
            };

            const handleSelect = (opt) => {
                if (isLocked) return;
                setSelected(opt);
                setIsLocked(true);
                if (opt === questions[currentIdx].correct) {
                    setScore(s => s + 1);
                }
            };

            const nextQuestion = () => {
                const nextIdx = currentIdx + 1;
                if (nextIdx < questions.length) {
                    setCurrentIdx(nextIdx);
                    setSelected(null);
                    setIsLocked(false);
                    setShowHint(false);
                } else {
                    setGameState('end');
                }
            };

            if (gameState === 'start') {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-slate-200 animate-fade-in">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg rotate-3">
                                <Icon name="graduation" className="text-white w-10 h-10" />
                            </div>
                            <h1 className="text-3xl font-black text-slate-900 mb-4 tracking-tight">Statsskicket Master 40</h1>
                            <p className="text-slate-600 mb-8 leading-relaxed">
                                Förbered dig inför provet! 40 frågor som täcker grundlagar, lagstiftning och EU. Varje gång du startar slumpas frågorna och svaren.
                            </p>
                            <button onClick={initGame} className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 transition-all flex items-center justify-center gap-2">
                                Starta provet <Icon name="arrowRight" />
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'end') {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center border border-slate-200 animate-fade-in">
                            <div className="text-5xl mb-4">🏆</div>
                            <h1 className="text-3xl font-black text-slate-900 mb-2">Snyggt jobbat!</h1>
                            <p className="text-slate-500 mb-8 font-medium">Du har gått igenom alla 40 frågor.</p>
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-indigo-50 p-4 rounded-2xl text-center">
                                    <span className="block text-indigo-400 text-xs font-bold uppercase tracking-widest mb-1">Poäng</span>
                                    <span className="text-2xl font-black text-indigo-700">{score} / {questions.length}</span>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-2xl text-center">
                                    <span className="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Tid</span>
                                    <span className="text-2xl font-black text-slate-700">{formatTime(timer)}</span>
                                </div>
                            </div>
                            <button onClick={initGame} className="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white rounded-2xl font-bold text-lg shadow-xl transition-all flex items-center justify-center gap-2">
                                Kör igen (ny slumpning) <Icon name="refresh" />
                            </button>
                        </div>
                    </div>
                );
            }

            const q = questions[currentIdx];
            if (!q) return null;

            return (
                <div className="min-h-screen bg-slate-50 p-4 flex flex-col items-center justify-center">
                    <div className="max-w-2xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200 animate-fade-in">
                        <div className="h-2 bg-slate-100 w-full">
                            <div className="h-full bg-indigo-600 transition-all duration-500" style={{ width: `${((currentIdx + 1) / questions.length) * 100}%` }} />
                        </div>
                        <div className="p-6 md:p-10">
                            <div className="flex justify-between items-center mb-8">
                                <span className="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-xs font-black uppercase tracking-widest">
                                    Fråga {currentIdx + 1} av {questions.length}
                                </span>
                                <div className="flex items-center gap-2 text-slate-400 font-mono font-bold">
                                    <Icon name="clock" className="w-4 h-4" />
                                    {formatTime(timer)}
                                </div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-8 leading-tight">
                                {q.q}
                            </h2>
                            <div className="space-y-3">
                                {q.options.map((opt, i) => {
                                    const isCorrect = opt === q.correct;
                                    const isSelected = selected === opt;
                                    let btnClass = "w-full p-4 rounded-2xl border-2 text-left font-semibold transition-all flex items-center justify-between ";
                                    if (!isLocked) btnClass += "border-slate-100 bg-slate-50 hover:border-indigo-200 hover:bg-white text-slate-700";
                                    else if (isCorrect) btnClass += "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm";
                                    else if (isSelected) btnClass += "border-rose-500 bg-rose-50 text-rose-800";
                                    else btnClass += "border-slate-50 bg-slate-50 opacity-40 text-slate-400";
                                    return (
                                        <button key={`${currentIdx}-${i}`} onClick={() => handleSelect(opt)} disabled={isLocked} className={btnClass}>
                                            <span className="pr-2">{opt}</span>
                                            {isLocked && isCorrect && <Icon name="check" className="text-emerald-500 shrink-0" />}
                                            {isLocked && isSelected && !isCorrect && <Icon name="x" className="text-rose-500 shrink-0" />}
                                        </button>
                                    );
                                })}
                            </div>
                            <div className="mt-8 pt-6 border-t border-slate-100 flex items-center justify-between">
                                <button onClick={() => setShowHint(!showHint)} className="text-slate-400 hover:text-indigo-600 font-bold text-sm flex items-center gap-2 transition-colors">
                                    <Icon name="lightbulb" className="w-4 h-4" />
                                    {showHint ? "Dölj ledtråd" : "Ledtråd"}
                                </button>
                                {isLocked && (
                                    <button onClick={nextQuestion} className="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-all flex items-center gap-2">
                                        {currentIdx + 1 === questions.length ? "Visa resultat" : "Nästa fråga"}
                                        <Icon name="arrowRight" />
                                    </button>
                                )}
                            </div>
                            {showHint && (
                                <div className="mt-4 p-4 bg-amber-50 rounded-2xl border border-amber-100 text-amber-900 text-sm leading-relaxed animate-fade-in">
                                    <span className="font-bold block mb-1 uppercase text-[10px] tracking-widest text-amber-500">Tänk på detta:</span>
                                    {q.hint}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
