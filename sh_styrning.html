<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Så styrs Sverige - Repetitionsspel</title>
  
  <!-- Laddar in React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Laddar in Babel (för att läsa koden i webbläsaren) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Laddar in Tailwind CSS för designen -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- IKONER ---
    const BookOpen = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    );
    const Trophy = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    );
    const RefreshCw = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );
    const CheckCircle2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    );
    const XCircle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
    );
    const ChevronRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>
    );
    const ArrowLeft = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    );

    // --- FRÅGOR I ORDNING ---
    const lawMakingQuestions = [
      {
        step: "Steg 1: Utredning",
        question: "Vad händer i det allra första steget när man vill skapa en ny lag?",
        correct: "Utredning: En grupp experter undersöker frågan noga.",
        incorrect: ["Votering: Alla röstar direkt i riksdagen.", "Genomförande: Polisen börjar använda lagen.", "Remiss: Man frågar bara kungen."]
      },
      {
        step: "Steg 2: Remiss",
        question: "När utredningen är klar skickas den till myndigheter och organisationer för att de ska få tycka till. Vad kallas detta?",
        correct: "Remiss",
        incorrect: ["Motion", "Lagråd", "Votering"]
      },
      {
        step: "Steg 3: Proposition",
        question: "När regeringen skrivit klart sitt förslag till riksdagen kallas det för...?",
        correct: "Proposition",
        incorrect: ["Motion", "Betänkande", "Grundlag"]
      },
      {
        step: "Steg 4: Utskottsbetänkande",
        question: "Innan hela riksdagen röstar förbereds ärendet i en mindre grupp ledamöter. Vad kallas deras rapport med förslag till beslut?",
        correct: "Utskottsbetänkande",
        incorrect: ["Budget", "Regeringsförklaring", "Partiprogram"]
      },
      {
        step: "Steg 5: Votering",
        question: "När alla 349 ledamöter i riksdagen röstar ja eller nej till förslaget kallas det för...?",
        correct: "Votering",
        incorrect: ["Debatt", "Remiss", "Utredning"]
      },
      {
        step: "Steg 6: Genomförande",
        question: "Riksdagen har sagt ja. Vem ansvarar nu för det sista steget: att se till att lagen faktiskt börjar gälla?",
        correct: "Regeringen (Genomförande och utfärdande)",
        incorrect: ["EU-parlamentet", "Kungen", "Oppositionen"]
      },
      {
        step: "Grundlagar",
        question: "Vilken av dessa är INTE en av Sveriges fyra grundlagar?",
        correct: "Skollagen",
        incorrect: ["Regeringsformen", "Successionsordningen", "Tryckfrihetsförordningen"]
      },
      {
        step: "Parlamentarism",
        question: "Vad innebär parlamentarism i Sverige?",
        correct: "Att regeringen måste ha riksdagens förtroende för att få styra.",
        incorrect: ["Att kungen har all makt.", "Att alla svenskar måste sitta i parlamentet.", "Att kommunerna bestämmer över lagarna."]
      },
      {
        step: "Riksdagen",
        question: "Hur många personer sitter i Sveriges riksdag?",
        correct: "349",
        incorrect: ["340", "394", "299"]
      },
      {
        step: "Regionen",
        question: "Vilken nivå i samhället ansvarar oftast för sjukvård och bussar?",
        correct: "Regionen",
        incorrect: ["Kommunen", "Regeringen", "EU"]
      }
    ];

    const shuffleArray = (array) => {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    };

    function App() {
      const [gameState, setGameState] = useState('start');
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [currentOptions, setCurrentOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [score, setScore] = useState(0);

      const startGame = () => {
        setScore(0);
        setCurrentQuestionIndex(0);
        setGameState('playing');
        loadQuestion(0);
      };

      const loadQuestion = (index) => {
        setSelectedOption(null);
        setIsAnswered(false);
        const questionData = lawMakingQuestions[index];
        const options = [questionData.correct, ...questionData.incorrect];
        setCurrentOptions(shuffleArray(options));
      };

      const handleOptionClick = (option) => {
        if (isAnswered) return;
        setSelectedOption(option);
        setIsAnswered(true);
        if (option === lawMakingQuestions[currentQuestionIndex].correct) {
          setScore(score + 1);
        }
      };

      const handleNext = () => {
        if (currentQuestionIndex + 1 < lawMakingQuestions.length) {
          const nextIndex = currentQuestionIndex + 1;
          setCurrentQuestionIndex(nextIndex);
          loadQuestion(nextIndex);
        } else {
          setGameState('result');
        }
      };

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden border-t-8 border-yellow-500">
              <div className="p-8 text-center">
                <div className="w-20 h-20 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-6">
                  <BookOpen className="w-10 h-10 text-yellow-600" />
                </div>
                <h1 className="text-3xl font-black text-slate-900 mb-2">Så styrs Sverige</h1>
                <p className="text-slate-500 mb-8">Lär dig stegen från förslag till lag och hur Sverige styrs.</p>
                <div className="space-y-3">
                  <button onClick={startGame} className="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                    Starta spelet
                  </button>
                  <a href="index.html" className="flex items-center justify-center gap-2 text-slate-400 hover:text-slate-600 font-medium py-2">
                    <ArrowLeft className="w-4 h-4" /> Tillbaka till portalen
                  </a>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white max-w-md w-full rounded-2xl shadow-xl p-8 text-center border-t-8 border-yellow-400 text-slate-800">
              <Trophy className="w-20 h-20 mx-auto mb-4 text-yellow-500" />
              <h2 className="text-3xl font-black mb-2">Ditt resultat</h2>
              <p className="text-6xl font-black text-yellow-500 mb-6">{score} / {lawMakingQuestions.length}</p>
              <div className="space-y-4">
                <button onClick={startGame} className="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all">
                  <RefreshCw className="w-5 h-5" /> Försök igen
                </button>
                <a href="index.html" className="block w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 rounded-xl transition-all">
                  Tillbaka till portalen
                </a>
              </div>
            </div>
          </div>
        );
      }

      const currentQ = lawMakingQuestions[currentQuestionIndex];

      return (
        <div className="min-h-screen flex flex-col items-center py-8 p-4">
          <div className="w-full max-w-md">
            <div className="mb-6">
              <div className="flex justify-between text-xs font-black uppercase tracking-widest text-slate-400 mb-2 px-1">
                <span>Fråga {currentQuestionIndex + 1} / {lawMakingQuestions.length}</span>
                <span>Poäng: {score}</span>
              </div>
              <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-yellow-500 transition-all duration-300" 
                  style={{ width: `${((currentQuestionIndex + 1) / lawMakingQuestions.length) * 100}%` }}
                ></div>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-lg p-8 mb-6 border-b-4 border-slate-100">
              <div className="text-yellow-600 text-xs font-black uppercase mb-2 tracking-widest">{currentQ.step}</div>
              <h2 className="text-xl font-bold text-slate-800 leading-snug">{currentQ.question}</h2>
            </div>

            <div className="space-y-3">
              {currentOptions.map((option, index) => {
                let btnClasses = "w-full text-left p-5 rounded-xl border-2 transition-all font-bold flex items-center justify-between gap-3 shadow-sm ";
                if (!isAnswered) {
                  btnClasses += "border-slate-100 bg-white text-slate-600 hover:border-yellow-400 hover:shadow-md active:scale-95";
                } else {
                  if (option === currentQ.correct) {
                    btnClasses += "border-green-500 bg-green-50 text-green-800";
                  } else if (option === selectedOption) {
                    btnClasses += "border-red-500 bg-red-50 text-red-800";
                  } else {
                    btnClasses += "border-slate-50 bg-slate-50 text-slate-300 opacity-60";
                  }
                }
                return (
                  <button key={index} onClick={() => handleOptionClick(option)} disabled={isAnswered} className={btnClasses}>
                    <span>{option}</span>
                    {isAnswered && option === currentQ.correct && <CheckCircle2 className="w-6 h-6 text-green-500 shrink-0" />}
                    {isAnswered && option === selectedOption && option !== currentQ.correct && <XCircle className="w-6 h-6 text-red-500 shrink-0" />}
                  </button>
                );
              })}
            </div>

            {isAnswered && (
              <div className="mt-8">
                <button onClick={handleNext} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                  {currentQuestionIndex + 1 === lawMakingQuestions.length ? 'Se resultat' : 'Nästa steg'}
                  <ChevronRight className="w-5 h-5" />
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
