            },
            {
                question: "Vad innebär begreppet 'överstatlighet' i praktiken?",
                options: [
                    "Att medlemsländerna är bundna av beslut som fattas av EU, även om de röstade nej.",
                    "Att kungen i Sverige har blivit chef över alla andra kungar i Europa.",
                    "Att det finns en regering som sitter ovanpå molnen och styr jorden.",
                    "Att alla lagar i Sverige numera skrivs på engelska eller franska."
                ],
                correctAnswer: "Att medlemsländerna är bundna av beslut som fattas av EU, även om de röstade nej.",
                hint: "Man lämnar ifrån sig rätten att alltid få sista ordet själv."
            },
            {
                question: "Vad är EU-kommissionens viktigaste uppgift?",
                options: [
                    "Att föreslå nya lagar och se till att de beslutade lagarna följs.",
                    "Att bestämma vilka artister som får vara med i Eurovision Song Contest.",
                    "Att vakta gränsen mellan Sverige och Norge.",
                    "Att trycka pengar till alla länder som har tråkigt."
                ],
                correctAnswer: "Att föreslå nya lagar och se till att de beslutade lagarna följs.",
                hint: "De fungerar ungefär som EU:s motsvarighet till en regering."
            },
            {
                question: "Varför är det viktigt att veta skillnaden mellan riksdag och regering när man studerar EU?",
                options: [
                    "För att de representerar Sverige på olika sätt i EU:s beslutsfattande.",
                    "För att man inte får åka till Bryssel om man jobbar i riksdagen.",
                    "För att regeringen bestämmer över EU medan riksdagen bara tittar på.",
                    "Det är inte viktigt, de gör exakt samma saker i EU-frågor."
                ],
                correctAnswer: "För att de representerar Sverige på olika sätt i EU:s beslutsfattande.",
                hint: "Ministrarna sitter i ministerrådet, medan riksdagen kontrollerar regeringens EU-politik."
            }
        ];

        const App = () => {
            const [gameState, setGameState] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [totalSeconds, setTotalSeconds] = useState(0);
            const [showHint, setShowHint] = useState(false);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            
            const shuffleQuestions = useCallback(() => {
                const shuffled = [...QUESTION_BANK]
                    .sort(() => Math.random() - 0.5)
                    .map(q => ({
                        ...q,
                        shuffledOptions: [...q.options].sort(() => Math.random() - 0.5)
                    }));
                setQuestions(shuffled);
            }, []);

            useEffect(() => {
                let interval;
                if (gameState === 'playing') {
                    interval = setInterval(() => {
                        setTotalSeconds(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [gameState]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [gameState, currentQuestionIndex, showHint, isLocked]);

            const formatTime = (totalSecs) => {
                const minutes = Math.floor(totalSecs / 60);
                const seconds = totalSecs % 60;
                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
            };

            const startQuiz = () => {
                shuffleQuestions();
                setGameState('playing');
                setCurrentQuestionIndex(0);
                setScore(0);
                setTotalSeconds(0);
                setIsLocked(false);
                setSelectedOption(null);
                setShowHint(false);
            };

            const handleOptionClick = (option) => {
                if (isLocked) return;
                setSelectedOption(option);
                setIsLocked(true);
                if (option === questions[currentQuestionIndex].correctAnswer) {
                    setScore(prev => prev + 1);
                }
            };

            const handleNextQuestion = () => {
                const nextIndex = currentQuestionIndex + 1;
                if (nextIndex < questions.length) {
                    setCurrentQuestionIndex(nextIndex);
                    setIsLocked(false);
                    setSelectedOption(null);
                    setShowHint(false);
                } else {
                    setGameState('finished');
                }
            };

            const currentQuestion = questions[currentQuestionIndex];

            return (
                <div className="min-h-screen flex items-center justify-center p-4 md:p-8">
                    <div className="w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
                        
                        {/* Header */}
                        <div className="bg-slate-900 p-6 text-white flex justify-between items-center relative overflow-hidden">
                            <div className="relative z-10">
                                <h1 className="text-xl font-bold tracking-tight">Statsskicket Master</h1>
                                <p className="text-slate-400 text-sm font-medium">40 frågor för högsta betyg</p>
                            </div>
                            {gameState === 'playing' && (
                                <div className="relative z-10 flex items-center gap-3 bg-white/10 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10">
                                    <Icon name="clock" size={18} className="text-slate-400" />
                                    <span className="font-mono font-bold text-lg">{formatTime(totalSeconds)}</span>
                                </div>
                            )}
                        </div>

                        <div className="p-8 md:p-10">
                            {gameState === 'start' && (
                                <div className="text-center space-y-8 py-6 animate-fade-in">
                                    <div className="mx-auto w-24 h-24 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white rotate-3 shadow-xl">
                                        <Icon name="graduation-cap" size={48} />
                                    </div>
                                    <div className="space-y-4">
                                        <h2 className="text-3xl font-extrabold text-slate-800">Är du redo för utmaningen?</h2>
                                        <p className="text-slate-500 max-w-sm mx-auto leading-relaxed">
                                            Vi har förberett 40 varierade frågor för att se till att du verkligen kan grunderna inför provet.
                                        </p>
                                    </div>
                                    <button 
                                        onClick={startQuiz}
                                        className="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-5 rounded-3xl font-bold transition-all shadow-xl shadow-indigo-100 flex items-center justify-center gap-3 text-lg"
                                    >
                                        Starta 40-frågorsquizen <Icon name="play" size={20} />
                                    </button>
                                </div>
                            )}

                            {gameState === 'playing' && currentQuestion && (
                                <div className="space-y-8 animate-fade-in">
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-end">
                                            <span className="text-xs font-bold uppercase tracking-widest text-indigo-600">
                                                Fråga {currentQuestionIndex + 1} av {questions.length}
                                            </span>
                                            <span className="text-xs font-bold text-slate-400">
                                                {score} rätt hittills
                                            </span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                                            <div 
                                                className="bg-indigo-600 h-full transition-all duration-700 ease-out"
                                                style={{ width: `${((currentQuestionIndex + 1) / questions.length) * 100}%` }}
                                            ></div>
                                        </div>
                                        {/* Uppdaterad fråga: Nu vanlig sans-serif text utan kursiv stil */}
                                        <h2 className="text-xl md:text-2xl font-bold leading-tight text-slate-800">
                                            {currentQuestion.question}
                                        </h2>
                                    </div>

                                    <div className="grid grid-cols-1 gap-3.5">
                                        {currentQuestion.shuffledOptions.map((option, idx) => {
                                            const isCorrect = option === currentQuestion.correctAnswer;
                                            const isSelected = selectedOption === option;
                                            
                                            let style = "option-button w-full p-5 text-left rounded-2xl border-2 flex justify-between items-center font-medium leading-tight ";
                                            
                                            if (!isLocked) {
                                                style += "border-slate-100 bg-slate-50 hover:border-indigo-400 hover:bg-white hover:shadow-md text-slate-700";
                                            } else {
                                                if (isCorrect) style += "border-emerald-500 bg-emerald-50 text-emerald-800 font-bold shadow-sm";
                                                else if (isSelected) style += "border-rose-500 bg-rose-50 text-rose-800";
                                                else style += "border-slate-50 bg-slate-50 opacity-40 text-slate-400";
                                            }

                                            return (
                                                <button key={idx} onClick={() => handleOptionClick(option)} disabled={isLocked} className={style}>
                                                    <span className="flex-1 pr-4">{option}</span>
                                                    {isLocked && isCorrect && <Icon name="check" size={20} className="text-emerald-500 shrink-0" />}
                                                    {isLocked && isSelected && !isCorrect && <Icon name="alert-circle" size={20} className="text-rose-500 shrink-0" />}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    <div className="pt-6 border-t border-slate-100 flex flex-col gap-4">
                                        <div className="flex justify-between items-center">
                                            <button 
                                                onClick={() => setShowHint(!showHint)} 
                                                className="text-slate-400 hover:text-indigo-600 text-sm font-semibold flex items-center gap-2 transition-colors"
                                            >
                                                <Icon name="help-circle" size={18} />
                                                {showHint ? 'Dölj ledtråd' : 'Få en ledtråd'}
                                            </button>
                                            
                                            {isLocked && (
                                                <button 
                                                    onClick={handleNextQuestion} 
                                                    className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg active:scale-95"
                                                >
                                                    {currentQuestionIndex === questions.length - 1 ? 'Visa resultat' : 'Nästa fråga'}
                                                    <Icon name="arrow-right" size={18} />
                                                </button>
                                            )}
                                        </div>

                                        {showHint && (
                                            <div className="bg-amber-50 border border-amber-100 p-5 rounded-[1.5rem] text-sm text-amber-900 flex gap-4 items-start animate-fade-in shadow-sm">
                                                <div className="p-2 bg-amber-100 rounded-lg text-amber-600">
                                                    <Icon name="brain" size={16} />
                                                </div>
                                                <p className="leading-relaxed"><strong>Tänk på detta:</strong> {currentQuestion.hint}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {gameState === 'finished' && (
                                <div className="text-center space-y-10 py-4 animate-fade-in">
                                    <div className="space-y-4">
                                        <div className="inline-flex items-center justify-center w-24 h-24 bg-emerald-100 text-emerald-600 rounded-[2rem] shadow-sm mb-2">
                                            <Icon name="award" size={48} />
                                        </div>
                                        <h2 className="text-4xl font-black text-slate-800">Provredo!</h2>
                                        <p className="text-slate-500 font-medium max-w-xs mx-auto">Du har tagit dig igenom alla 40 frågor. Ett fantastiskt sätt att förbereda sig!</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-md mx-auto">
                                        <div className="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100 flex flex-col items-center">
                                            <div className="text-indigo-400 text-[10px] uppercase font-black tracking-widest mb-1">Resultat</div>
                                            <div className="text-3xl font-black text-indigo-700">{score} / {questions.length}</div>
                                            <div className="text-xs text-indigo-400 mt-1">{Math.round((score / questions.length) * 100)}% rätt</div>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-[2.5rem] border border-slate-100 flex flex-col items-center">
                                            <div className="text-slate-400 text-[10px] uppercase font-black tracking-widest mb-1">Total Tid</div>
                                            <div className="text-3xl font-black text-slate-700">{formatTime(totalSeconds)}</div>
                                            <div className="text-xs text-slate-400 mt-1">Snyggt tempo!</div>
                                        </div>
                                    </div>

                                    <div className="pt-4 flex flex-col gap-3">
                                        <button 
                                            onClick={startQuiz}
                                            className="w-full bg-slate-900 hover:bg-slate-800 text-white px-10 py-5 rounded-3xl font-bold transition-all shadow-xl flex items-center justify-center gap-3"
                                        >
                                            <Icon name="refresh-ccw" size={20} />
                                            Kör igen (ny ordning!)
                                        </button>
                                        <p className="text-xs text-slate-400 font-medium">Repetition är kunskapens moder.</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
