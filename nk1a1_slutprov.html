                    "Bias är enbart relevant i samhällsvetenskapliga studier, inte i naturvetenskapliga."
                ],
                explanation: "Bias är systematisk, inte slumpmässig. Bekräftelsebias gör att man tolkar bevis som stöder hypotesen. Selektionsbias uppstår om urvalet inte är representativt. Finansieringsbias uppstår när parter med egenintressen finansierar studier."
            },
            {
                id: 28, area: "Vetenskap",
                question: "Hur skiljer sig evidensbaserad kunskap från anekdotisk kunskap?",
                correct: "Evidensbaserad kunskap bygger på systematiska studier med replikerbara, kontrollerade resultat; anekdoter är enskilda upplevelser utan kontroll.",
                others: [
                    "Anekdotisk kunskap är mer tillförlitlig eftersom den baseras på faktiska verkliga upplevelser.",
                    "De är lika tillförlitliga beroende på sammanhang och vem som berättar anekdoten.",
                    "Evidensbaserad kunskap kräver alltid kontrollerade laboratorieexperiment för att vara giltig."
                ],
                explanation: "Anekdoter är värdefulla som inspiration till hypoteser, men de kontrollerar inte för bakomliggande faktorer. 'Min mormor rökte och blev 100 år' kontrollerar inte för genetik, miljö eller överlevnadsbias."
            },
            {
                id: 29, area: "Vetenskap",
                question: "En vetenskaplig hypotes ska vara:",
                correct: "Testbar och falsifierbar — den ska kunna motbevisas av ett experiment eller en observation.",
                others: [
                    "Sann redan innan testet genomförs, annars är undersökningen meningslös.",
                    "Baserad på minst tio tidigare publicerade studier för att anses vetenskapligt giltig.",
                    "Skriven och godkänd av en certifierad forskare med akademisk examen."
                ],
                explanation: "Falsifierbarhet (Popper) är centralt: en hypotes måste kunna motbevisas. 'Gud styr allt' är inte vetenskaplig eftersom inget kan motbevisa den. 'Koffein förbättrar reaktionstid' är testbar och falsifierbar."
            },
            {
                id: 30, area: "Vetenskap",
                question: "Vad menas med att naturvetenskapen är självkorrigerande?",
                correct: "Nya bevis och metodförbättringar kan leda till att gamla teorier revideras eller förkastas — ingen teori är permanent sann.",
                others: [
                    "Naturvetenskapliga teorier är eviga sanningar som aldrig kan eller bör ändras.",
                    "Vetenskapsmän rättar systematiskt varandras stavfel och formateringsfel i publikationer.",
                    "Det innebär att vetenskapen automatiskt alltid når det korrekta svaret om man väntar länge nog."
                ],
                explanation: "Vetenskapens styrka ligger i att den kan ha fel och korrigera sig. Newtons mekanik fungerade i 200 år tills relativitetsteorin gav en bättre modell. Teorier förkastas när bevis talar emot dem."
            }
        ];

        const writtenQuestions = [
            {
                id: 1,
                title: "Naturvetenskap och samhälle",
                prompt: "Diskutera frågor med naturvetenskapligt innehåll som har betydelse för individ och samhälle — t.ex. klimatförändringar, vaccinationer eller genteknik.",
                criteria: {
                    E: "Ger enkla förklaringar av det naturvetenskapliga innehållet och använder enkla argument för en ståndpunkt.",
                    C: "Ställer utforskande frågor, ger utförligare förklaringar och använder välgrundade argument med tydliga kopplingar mellan naturvetenskap och samhälle.",
                    A: "Ger komplexa och nyanserade förklaringar, väger olika perspektiv mot varandra och använder välgrundade och nyanserade argument med hög precision."
                }
            },
            {
                id: 2,
                title: "Sexualitet, hälsa och kroppen",
                prompt: "Redogör för hur människokroppen fungerar i växelverkan med omgivningen kopplat till sexualitet och relationer, och diskutera konsekvenser för individens sexuella hälsa och folkhälsan.",
                criteria: {
                    E: "Redogör översiktligt för kroppens funktioner och ger enkla exempel på konsekvenser för sexuell hälsa.",
                    C: "Redogör utförligt och kopplar biologiska processer till sexuell hälsa. Diskuterar konsekvenser med välgrundade argument.",
                    A: "Redogör utförligt och nyanserat, väger in individ-, grupp- och samhällsperspektiv och argumenterar nyanserat om komplexa konsekvenser."
                }
            },
            {
                id: 3,
                title: "Naturvetenskap och hållbar utveckling",
                prompt: "Ge exempel på hur naturvetenskap kopplas till hållbar utveckling och föreslå konkreta handlingsalternativ för individer, företag eller samhälle.",
                criteria: {
                    E: "Ger enkla exempel och drar enkla slutsatser med enkla argument för handlingsalternativen.",
                    C: "Ger tydliga exempel med välgrundade slutsatser och välgrundade argument för föreslagna handlingsalternativ.",
                    A: "Ger komplexa exempel, drar välgrundade och nyanserade slutsatser och argumenterar nyanserat med hänsyn till motstridiga intressen."
                }
            },
            {
                id: 4,
                title: "Naturvetenskapens historia och samhällspåverkan",
                prompt: "Diskutera hur naturvetenskapliga teorier kan granskas kritiskt och vilken betydelse de haft för samhällets framväxt.",
                criteria: {
                    E: "Diskuterar översiktligt utifrån något enstaka exempel på en naturvetenskaplig teoris samhällsbetydelse.",
                    C: "Diskuterar utförligt utifrån flera exempel och kopplar vetenskapens historia till samhällsförändringar.",
                    A: "Diskuterar utförligt och nyanserat utifrån flera exempel, problematiserar vetenskapens roll och belyser spänningar mellan vetenskap och samhälle."
                }
            },
            {
                id: 5,
                title: "Vetenskaplig metod och källkritik",
                prompt: "Beskriv hur naturvetenskap organiseras och används för kritisk granskning, och redogör för hur en naturvetenskaplig undersökning genomförs.",
                criteria: {
                    E: "Beskriver översiktligt den vetenskapliga metoden och redogör för en undersökning med enkla förklaringar.",
                    C: "Beskriver utförligt metoden med korrekta begrepp och redogör nyanserat för en undersökning inklusive felkällor och begränsningar.",
                    A: "Beskriver utförligt och nyanserat, kopplar metod till validitet och reliabilitet och för ett välgrundat resonemang om vetenskapens gränser."
                }
            }
        ];

        function useTimer(running) {
            const [seconds, setSeconds] = useState(0);
            const ref = useRef(null);
            useEffect(() => {
                if (running) { ref.current = setInterval(() => setSeconds(s => s + 1), 1000); }
                else { clearInterval(ref.current); }
                return () => clearInterval(ref.current);
            }, [running]);
            const reset = () => setSeconds(0);
            const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
            return { seconds, fmt: fmt(seconds), reset };
        }

        function App() {
            const [screen, setScreen] = useState('start');
            const [questions, setQuestions] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [selected, setSelected] = useState(null);
            const [showModal, setShowModal] = useState(false);
            const [missed, setMissed] = useState([]);
            const [shuffledOpts, setShuffledOpts] = useState([]);
            const [quizTime, setQuizTime] = useState(0);
            const timer = useTimer(screen === 'quiz');

            const startQuiz = () => {
                const shuffled = shuffle(allQuestions);
                setQuestions(shuffled);
                setCurrentIdx(0);
                setScore(0);
                setSelected(null);
                setShowModal(false);
                setMissed([]);
                timer.reset();
                setScreen('quiz');
            };

            useEffect(() => {
                if (questions.length > 0 && screen === 'quiz') {
                    const q = questions[currentIdx];
                    setShuffledOpts(shuffle([q.correct, ...q.others]));
                }
            }, [currentIdx, questions, screen]);

            const handleAnswer = (opt) => {
                if (selected !== null) return;
                setSelected(opt);
                const q = questions[currentIdx];
                if (opt === q.correct) { setScore(s => s + 1); }
                else { setMissed(m => [...m, q]); }
                setTimeout(() => setShowModal(true), 600);
            };

            const nextQuestion = () => {
                setShowModal(false);
                setSelected(null);
                if (currentIdx + 1 < questions.length) { setCurrentIdx(i => i + 1); }
                else { setQuizTime(timer.seconds); setScreen('quizResult'); }
            };

            if (screen === 'start') return <StartScreen onStart={startQuiz} />;
            if (screen === 'quiz') {
                const q = questions[currentIdx];
                return <QuizScreen q={q} idx={currentIdx} total={questions.length} score={score} timerFmt={timer.fmt} opts={shuffledOpts} selected={selected} showModal={showModal} onAnswer={handleAnswer} onNext={nextQuestion} />;
            }
            if (screen === 'quizResult') return <QuizResult score={score} total={questions.length} time={quizTime} missed={missed} onRetry={startQuiz} onContinue={() => setScreen('writing')} />;
            if (screen === 'writing') return <WritingSection />;
            return null;
        }

        function StartScreen({ onStart }) {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen px-4 text-center">
                    <div className="bg-green-100 p-6 rounded-full mb-6">
                        <svg className="w-16 h-16 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
                        </svg>
                    </div>
                    <h1 className="text-4xl font-bold text-slate-800 mb-2">Slutprov</h1>
                    <p className="text-xl text-green-700 font-bold mb-4 italic">Naturkunskap 1a1</p>
                    <p className="text-slate-600 mb-6 max-w-lg leading-relaxed">
                        <strong>Del 1:</strong> 30 flervalsfrågor som täcker hållbar utveckling, sex & relationer och vetenskaplig metod på fördjupad nivå.<br/>
                        <strong>Del 2:</strong> 5 skrivfrågor med tydliga E/C/A-kriterier och AI-driven feedback.
                    </p>
                    <div className="bg-green-50 border border-green-200 rounded-2xl p-5 mb-8 max-w-md text-left space-y-2">
                        <div className="flex items-start gap-3">
                            <span className="bg-green-500 text-white text-xs font-black px-2 py-0.5 rounded-full mt-0.5">1</span>
                            <p className="text-green-800 text-sm">30 flervalsfrågor — timer, poängräknare, förklaring efter varje svar</p>
                        </div>
                        <div className="flex items-start gap-3">
                            <span className="bg-green-500 text-white text-xs font-black px-2 py-0.5 rounded-full mt-0.5">2</span>
                            <p className="text-green-800 text-sm">5 skrivfrågor — betygskriterier E/C/A + feedback via Gemini</p>
                        </div>
                    </div>
                    <button onClick={onStart} className="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-12 rounded-2xl shadow-lg transition-all active:scale-95 text-xl">
                        Starta Del 1 →
                    </button>
                </div>
            );
        }

        function QuizScreen({ q, idx, total, score, timerFmt, opts, selected, showModal, onAnswer, onNext }) {
            const progress = ((idx + 1) / total) * 100;
            return (
                <div className="max-w-2xl mx-auto px-4 py-8 pt-16">
                    <header className="mb-6">
                        <div className="flex justify-between items-center mb-3">
                            <span className="text-green-600 font-bold uppercase tracking-widest text-sm">Fråga {idx + 1} av {total}</span>
                            <div className="flex gap-3 items-center">
                                <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-sm font-mono">{timerFmt}</span>
                                <span className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-bold">Poäng: {score}</span>
                            </div>
                        </div>
                        <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                            <div className="bg-green-500 h-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                        <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider mt-2 inline-block">{q.area}</span>
                    </header>

                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mb-6 animate-pop">
                        <h2 className="text-xl font-bold text-slate-800 leading-tight mb-8">{q.question}</h2>
                        <div className="grid gap-3">
                            {opts.map((opt, i) => {
                                let cls = "w-full p-5 text-left rounded-2xl border-2 transition-all font-medium text-base ";
                                if (selected === null) {
                                    cls += "border-slate-100 hover:border-green-300 hover:bg-green-50 text-slate-700 cursor-pointer";
                                } else if (opt === q.correct) {
                                    cls += "border-green-500 bg-green-50 text-green-800 font-bold";
                                } else if (opt === selected) {
                                    cls += "border-red-400 bg-red-50 text-red-700";
                                } else {
                                    cls += "border-slate-100 text-slate-300";
                                }
                                return (
                                    <button key={i} disabled={selected !== null} onClick={() => onAnswer(opt)} className={cls}>
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-end md:items-center justify-center z-40 p-4 animate-pop">
                            <div className="bg-white rounded-3xl p-8 max-w-lg w-full shadow-2xl">
                                <div className={`text-2xl font-black mb-3 ${selected === q.correct ? 'text-green-600' : 'text-red-600'}`}>
                                    {selected === q.correct ? '✓ Rätt svar!' : '✗ Fel svar'}
                                </div>
                                <p className="text-slate-700 text-lg leading-relaxed mb-6">{q.explanation}</p>
                                <button onClick={onNext} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all">
                                    {idx + 1 < total ? 'Nästa fråga →' : 'Visa resultat →'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function QuizResult({ score, total, time, missed, onRetry, onContinue }) {
            const pct = Math.round((score / total) * 100);
            const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
            let grade, gradeColor;
            if (pct >= 80) { grade = "Utmärkt — redo för provet!"; gradeColor = "text-green-600"; }
            else if (pct >= 60) { grade = "Bra jobbat, öva lite mer!"; gradeColor = "text-yellow-600"; }
            else { grade = "Repetera och försök igen."; gradeColor = "text-red-600"; }

            return (
                <div className="max-w-2xl mx-auto px-4 py-12 pt-20 animate-pop">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Del 1 klar!</h2>
                        <div className="text-7xl font-black text-green-500 my-6">{score}<span className="text-3xl text-slate-400">/{total}</span></div>
                        <p className={`text-xl font-bold mb-2 ${gradeColor}`}>{grade}</p>
                        <p className="text-slate-500 text-sm">Tid: {fmt(time)}</p>
                    </div>

                    {missed.length > 0 && (
                        <div className="bg-red-50 border border-red-200 rounded-2xl p-6 mb-8">
                            <h3 className="font-bold text-red-800 mb-4">Frågor att repetera ({missed.length} st):</h3>
                            <div className="space-y-4">
                                {missed.map(q => (
                                    <div key={q.id} className="border-l-4 border-red-400 pl-4">
                                        <p className="text-slate-700 font-medium text-sm">{q.question}</p>
                                        <p className="text-green-700 text-sm mt-1">✓ {q.correct}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col gap-4">
                        <button onClick={onContinue} className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-2xl text-lg shadow-lg transition-all">
                            Fortsätt till Del 2 – Skrivfrågor →
                        </button>
                        <button onClick={onRetry} className="w-full bg-white border-2 border-slate-200 text-slate-600 font-bold py-3 rounded-2xl hover:bg-slate-50 transition-all">
                            Gör om Del 1
                        </button>
                    </div>
                </div>
            );
        }

        function WritingSection() {
            const [answers, setAnswers] = useState(writtenQuestions.map(() => ''));

            const updateAnswer = (i, val) => {
                const a = [...answers]; a[i] = val; setAnswers(a);
            };

            return (
                <div className="max-w-3xl mx-auto px-4 py-12 pt-20">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-slate-800 mb-2">Del 2 – Skrivfrågor</h2>
                        <p className="text-slate-600 max-w-xl mx-auto">Svara på frågorna nedan. Varje fråga visar vad som krävs för betyg E, C och A. Klicka <em>Få feedback från Gemini</em> för att öppna Gemini med din prompt förifylld.</p>
                    </div>

                    {writtenQuestions.map((q, i) => (
                        <WritingQuestion
                            key={q.id}
                            q={q}
                            idx={i}
                            answer={answers[i]}
                            onAnswer={val => updateAnswer(i, val)}
                        />
                    ))}

                    <div className="mt-12 text-center no-print">
                        <button onClick={() => window.print()} className="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transition-all text-lg">
                            Skriv ut svar
                        </button>
                    </div>

                    <footer className="mt-16 text-center border-t border-slate-200 pt-8">
                        <p className="text-slate-400 text-xs italic">Källa: Naturkunskap 1a1 begreppslista</p>
                    </footer>
                </div>
            );
        }

        function WritingQuestion({ q, idx, answer, onAnswer }) {
            const openGemini = () => {
                const prompt = `Fråga: ${q.prompt}

Betygskriterier:
E: ${q.criteria.E}
C: ${q.criteria.C}
A: ${q.criteria.A}

Elevens svar:
"${answer}"

Du är en konstruktiv och uppmuntrande lärare. Ge feedback på elevens svar utifrån betygskriterierna ovan. Fokusera på: vad som är bra i svaret, vad som är otydligt eller behöver utvecklas, konkreta tips på hur eleven kan förbättra svaret för att nå nästa betygsnivå. Ställ följdfrågor som hjälper eleven att tänka vidare. Var specifik och konstruktiv.`;
                window.open('https://gemini.google.com/app?q=' + encodeURIComponent(prompt), '_blank');
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 mb-8">
                    <div className="flex items-center gap-3 mb-4">
                        <div className="w-10 h-10 rounded-full bg-green-500 text-white flex items-center justify-center font-black text-lg flex-shrink-0">{idx + 1}</div>
                        <h3 className="text-xl font-bold text-slate-800">{q.title}</h3>
                    </div>
                    <p className="text-slate-700 text-lg leading-relaxed mb-6">{q.prompt}</p>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                        {[
                            { level: 'E', bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-600', badge: 'bg-slate-200 text-slate-700' },
                            { level: 'C', bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', badge: 'bg-blue-200 text-blue-800' },
                            { level: 'A', bg: 'bg-green-50', border: 'border-green-200', text: 'text-green-700', badge: 'bg-green-200 text-green-800' }
                        ].map(({ level, bg, border, text, badge }) => (
                            <div key={level} className={`rounded-xl border p-3 ${bg} ${border}`}>
                                <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-black mb-2 ${badge}`}>Betyg {level}</span>
                                <p className={`text-xs leading-relaxed ${text}`}>{q.criteria[level]}</p>
                            </div>
                        ))}
                    </div>

                    <textarea
                        value={answer}
                        onChange={e => onAnswer(e.target.value)}
                        placeholder="Skriv ditt svar här..."
                        rows={8}
                        className="w-full border-2 border-slate-200 rounded-2xl p-4 text-base font-serif leading-relaxed focus:outline-none focus:border-green-400 transition-colors resize-y"
                    />

                    <button
                        onClick={openGemini}
                        className="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-all no-print flex items-center gap-2"
                    >
                        <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="none"/>
                            <path d="M12 1C5.93 1 1 5.93 1 12s4.93 11 11 11 11-4.93 11-11S18.07 1 12 1zm0 2c4.96 0 9 4.04 9 9s-4.04 9-9 9-9-4.04-9-9 4.04-9 9-9zm-.5 4v5.25L8.5 15l1.06 1.06L13 12.62V7h-1.5z" fill="none"/>
                            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="1.5"/>
                            <path d="M12 6.5c-3.04 0-5.5 2.46-5.5 5.5s2.46 5.5 5.5 5.5 5.5-2.46 5.5-5.5-2.46-5.5-5.5-5.5zm2.5 8l-3-1.75V8h1.25v4.1l2.5 1.45L14.5 14.5z" fill="none"/>
                        </svg>
                        Få feedback från Gemini
                    </button>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
