        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function getFeedback(score, total) {
            const p = score / total;
            if (p >= 0.9) return { text: "Redo för provet! Imponerande!", color: "text-green-600" };
            if (p >= 0.7) return { text: "Bra jobbat! Öva lite till.", color: "text-green-600" };
            if (p >= 0.5) return { text: "Halvvägs! Fortsätt träna.", color: "text-yellow-600" };
            return { text: "Öva lite till – du klarar det!", color: "text-red-500" };
        }

            const startQuiz = () => {
                const shuffled = shuffleArray(allQuestions).map(q => ({
                    ...q,
                    options: shuffleArray([q.correct, ...q.others])
                }));
                setQuestions(shuffled);
                setQIndex(0);
                setSelected(null);
                setScore(0);
                setSeconds(0);
                setMissed([]);
                setShowModal(false);
                setModalReady(false);
                setPhase('quiz');
            };

            const handleAnswer = (option) => {
                if (selected !== null) return;
                setSelected(option);
                const current = questions[qIndex];
                const isCorrect = option === current.correct;
                if (isCorrect) {
                    setScore(s => s + 1);
                } else {
                    setMissed(m => [...m, current]);
                }
                setTimeout(() => {
                    setShowModal(true);
                    setTimeout(() => setModalReady(true), 50);
                }, 600);
            };

            const nextQuestion = () => {
                setShowModal(false);
                setModalReady(false);
                setSelected(null);
                if (qIndex + 1 >= questions.length) {
                    setPhase('result');
                } else {
                    setQIndex(i => i + 1);
                }
            };

            if (phase === 'start') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen px-4 text-center">
                        <div className="bg-white rounded-3xl shadow-xl p-10 max-w-md w-full border border-slate-100 anim-pop">
                            <div className="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl" style={{ backgroundColor: '#dcfce7' }}>🌿</div>
                            <h1 className="text-4xl font-bold text-slate-800 mb-3">Folkhälsa</h1>
                            <p className="text-slate-500 mb-2">Naturkunskap 1a2</p>
                            <p className="text-slate-600 mb-8 leading-relaxed">Testa dina kunskaper om folkhälsa, epidemiologi och centrala begrepp. Quizet har {allQuestions.length} frågor.</p>
                            <button onClick={startQuiz} className="w-full py-4 rounded-2xl font-bold text-lg text-green-900 shadow-lg transition-all active:scale-95 hover:brightness-105" style={{ backgroundColor: PRIMARY }}>
                                Starta Quiz
                            </button>
                            <a href="index.html" className="block mt-4 text-slate-400 hover:text-slate-600 text-sm transition-colors">← Tillbaka till startsidan</a>
                        </div>
                    </div>
                );
            }

            if (phase === 'result') {
                const fb = getFeedback(score, questions.length);
                return (
                    <div className="max-w-2xl mx-auto px-4 py-10 anim-pop">
                        <div className="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center mb-6">
                            <div className="text-5xl mb-4">{score >= questions.length * 0.9 ? '🏆' : score >= questions.length * 0.7 ? '🎉' : '💪'}</div>
                            <h2 className="text-3xl font-bold text-slate-800 mb-2">Quiz klart!</h2>
                            <div className="text-6xl font-bold my-4" style={{ color: PRIMARY_DARK }}>{score} / {questions.length}</div>
                            <p className={`text-xl font-bold mb-6 ${fb.color}`}>{fb.text}</p>
                            <div className="flex gap-4 justify-center mb-4">
                                <div className="bg-slate-50 rounded-2xl px-6 py-4 border border-slate-100">
                                    <div className="text-xs uppercase tracking-wider text-slate-400 mb-1">Tid</div>
                                    <div className="text-2xl font-bold text-slate-700">{formatTime(seconds)}</div>
                                </div>
                                <div className="rounded-2xl px-6 py-4 border" style={{ backgroundColor: '#dcfce7', borderColor: '#bbf7d0' }}>
                                    <div className="text-xs uppercase tracking-wider mb-1" style={{ color: '#16a34a' }}>Rätt</div>
                                    <div className="text-2xl font-bold" style={{ color: '#15803d' }}>{score} / {questions.length}</div>
                                </div>
                            </div>
                            <button onClick={startQuiz} className="w-full py-4 rounded-2xl font-bold text-green-900 text-lg transition-all active:scale-95 hover:brightness-105" style={{ backgroundColor: PRIMARY }}>
                                Gör om – blanda om!
                            </button>
                            <a href="index.html" className="block mt-3 text-slate-400 hover:text-slate-600 text-sm transition-colors">← Tillbaka till startsidan</a>
                        </div>

                        {missed.length > 0 && (
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
                                <h3 className="text-lg font-bold text-slate-700 mb-4">Frågor du missade ({missed.length} st)</h3>
                                <div className="grid gap-3">
                                    {missed.map((q, i) => (
                                        <div key={i} className="p-4 rounded-2xl border-l-4 bg-red-50 border-red-400">
                                            <p className="font-medium text-slate-700 mb-1">{q.question}</p>
                                            <p className="text-sm font-bold" style={{ color: PRIMARY_DARK }}>✓ {q.correct}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            const current = questions[qIndex];
            const progress = ((qIndex + 1) / questions.length) * 100;

            return (
                <div className="max-w-2xl mx-auto px-4 py-8">
                    <div className="flex justify-between items-center mb-3">
                        <span className="text-sm font-bold uppercase tracking-wider" style={{ color: PRIMARY_DARK }}>
                            Fråga {qIndex + 1} av {questions.length}
                        </span>
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-bold text-slate-600">Poäng: {score}</span>
                            <span className="font-mono font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-xl text-sm">{formatTime(seconds)}</span>
                        </div>
                    </div>

                    <div className="w-full bg-slate-200 h-2 rounded-full mb-6 overflow-hidden">
                        <div className="h-full rounded-full transition-all duration-500" style={{ width: `${progress}%`, backgroundColor: PRIMARY }}></div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-7 mb-4 anim-fade">
                        <h2 className="text-xl font-bold text-slate-800 leading-snug mb-6">{current.question}</h2>
                        <div className="grid gap-3">
                            {current.options.map((option, i) => {
                                let cls = "w-full p-4 text-left rounded-2xl border-2 transition-all font-medium text-base ";
                                if (selected === null) {
                                    cls += "border-slate-200 hover:border-green-400 hover:bg-green-50 text-slate-700 cursor-pointer";
                                } else if (option === current.correct) {
                                    cls += "border-green-500 bg-green-50 text-green-800";
                                } else if (option === selected) {
                                    cls += "border-red-400 bg-red-50 text-red-700";
                                } else {
                                    cls += "border-slate-100 text-slate-300 cursor-default";
                                }
                                return (
                                    <button key={i} onClick={() => handleAnswer(option)} disabled={selected !== null} className={cls}>
                                        {option}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black/40 flex items-end md:items-center justify-center z-50 px-4 pb-4 md:pb-0">
                            <div className={`bg-white rounded-3xl shadow-2xl p-7 w-full max-w-lg transition-all ${modalReady ? 'anim-pop' : 'opacity-0'}`}>
                                <div className={`text-center mb-4 text-3xl`}>
                                    {selected === current.correct ? '✅' : '❌'}
                                </div>
                                <h3 className={`text-lg font-bold mb-3 text-center ${selected === current.correct ? 'text-green-700' : 'text-red-600'}`}>
                                    {selected === current.correct ? 'Rätt svar!' : 'Fel svar'}
                                </h3>
                                {selected !== current.correct && (
                                    <p className="text-sm font-bold text-green-700 mb-3 bg-green-50 p-3 rounded-xl">
                                        Rätt svar: {current.correct}
                                    </p>
                                )}
                                <p className="text-slate-600 leading-relaxed text-sm mb-6">{current.explanation}</p>
                                <button onClick={nextQuestion} className="w-full py-4 rounded-2xl font-bold text-green-900 text-lg transition-all active:scale-95 hover:brightness-105" style={{ backgroundColor: PRIMARY }}>
                                    {qIndex + 1 >= questions.length ? 'Visa resultat' : 'Nästa fråga →'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
