<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Demokrati & Diktatur</title>
    <!-- Tailwind CSS för styling -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <!-- React och Babel för att köra JSX i webbläsaren -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide ikoner -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Ikon-komponent för Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // Frågor baserade på Demokrati begreppslista.pdf
        const QUESTIONS = [
            {
                question: "Vad kallas det styrelseskick där folket får vara med och bestämma?",
                options: ["Demokrati", "Diktatur", "Monarki", "Anarki"],
                correctAnswer: "Demokrati",
                hint: "Det betyder bokstavligen 'folkstyre'."
            },
            {
                question: "Vilken grundlag säger att du får skriva vad du vill i tidningar och böcker?",
                options: ["Tryckfrihetsförordningen", "Yttrandefrihetsgrundlagen", "Regeringsformen", "Successionsordningen"],
                correctAnswer: "Tryckfrihetsförordningen",
                hint: "Tänk på ordet för att producera en tidning i en tryckpress."
            },
            {
                question: "Om en person eller en liten grupp har all makt i ett land, kallas det för:",
                options: ["Diktatur", "Republik", "Demokrati", "Parlamentarism"],
                correctAnswer: "Diktatur",
                hint: "Det är motsatsen till demokrati."
            },
            {
                question: "Vad innebär 'Offentlighetsprincipen'?",
                options: ["Att alla har rätt att läsa dokument från myndigheter", "Att alla möten måste hållas utomhus", "Att staten får se allt du gör på internet", "Att politiker måste berätta vad de äter"],
                correctAnswer: "Att alla har rätt att läsa dokument från myndigheter",
                hint: "Det handlar om insyn i hur staten sköts."
            },
            {
                question: "Vilken princip innebär att det förslag som får flest röster vinner?",
                options: ["Majoritetsprincipen", "Proportionalitetsprincipen", "Offentlighetsprincipen", "Rättssäkerhet"],
                correctAnswer: "Majoritetsprincipen",
                hint: "Ordet kommer från 'majoritet'."
            },
            {
                question: "I Sverige väljer vi personer som fattar beslut åt oss. Vad kallas detta system?",
                options: ["Representativ demokrati", "Direkt demokrati", "Monarki", "Diktatur"],
                correctAnswer: "Representativ demokrati",
                hint: "Politikerna 'representerar' våra åsikter."
            },
            {
                question: "Om folket får rösta direkt om en specifik fråga (t.ex. högertrafik), kallas det för:",
                options: ["Folkomröstning", "Allmänt val", "Opinionsbildning", "Censur"],
                correctAnswer: "Folkomröstning",
                hint: "Det är en form av direkt demokrati."
            },
            {
                question: "Vad innebär 'Censur'?",
                options: ["Att staten stoppar information från att spridas", "Att alla får säga vad de vill", "Att man måste rösta på ett visst parti", "Att kungen bestämmer lagarna"],
                correctAnswer: "Att staten stoppar information från att spridas",
                hint: "Detta sker ofta i diktaturer för att kontrollera media."
            },
            {
                question: "Vad kallas ett land som har en president som statschef?",
                options: ["Republik", "Monarki", "Diktatur", "Kejsardöme"],
                correctAnswer: "Republik",
                hint: "USA och Frankrike är exempel på detta."
            },
            {
                question: "Vad innebär 'Parlamentarism' i Sverige?",
                options: ["Regeringen måste ha riksdagens stöd", "Kungen bestämmer över regeringen", "Folket röstar varje månad", "Sverige styrs av EU"],
                correctAnswer: "Regeringen måste ha riksdagens stöd",
                hint: "Riksdagen är folkets främsta företrädare."
            },
            {
                question: "Vad innebär 'Proportionellt valsystem'?",
                options: ["Partier får platser i riksdagen i förhållande till antal röster", "Det största partiet får alla platser", "Kungen väljer vilka som får sitta i riksdagen", "Man måste vara rik för att få rösta"],
                correctAnswer: "Partier får platser i riksdagen i förhållande till antal röster",
                hint: "10% av rösterna ger ungefär 10% av platserna."
            },
            {
                question: "Vilken rättighet innebär att du får lämna information till media utan att chefen får straffa dig?",
                options: ["Meddelarfrihet", "Tryckfrihet", "Rösträtt", "Tystnadsplikt"],
                correctAnswer: "Meddelarfrihet",
                hint: "Det skyddar 'visselblåsare'."
            },
            {
                question: "Vad kallas den person som är den högsta företrädaren för ett land?",
                options: ["Statschef", "Statsminister", "Talman", "Ordförande"],
                correctAnswer: "Statschef",
                hint: "I Sverige är det kungen, men han har ingen politisk makt."
            },
            {
                question: "Vilken grundlag skyddar din rätt att säga vad du tycker i radio, TV och på nätet?",
                options: ["Yttrandefrihetsgrundlagen", "Tryckfrihetsförordningen", "Regeringsformen", "Successionsordningen"],
                correctAnswer: "Yttrandefrihetsgrundlagen",
                hint: "Fokus ligger på det talade ordet och digital media."
            },
            {
                question: "Vad kallas det när det finns många olika partier att välja mellan i ett val?",
                options: ["Flerpartisystem", "Enpartistat", "Monarki", "Byråkrati"],
                correctAnswer: "Flerpartisystem",
                hint: "Det är en viktig del av en fungerande demokrati."
            }
        ];

        const App = () => {
            const [gameState, setGameState] = useState('start');
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [totalSeconds, setTotalSeconds] = useState(0);
            const [showHint, setShowHint] = useState(false);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [shuffledOptions, setShuffledOptions] = useState([]);

            const formatTime = (totalSecs) => {
                const minutes = Math.floor(totalSecs / 60);
                const seconds = totalSecs % 60;
                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
            };

            const shuffleArray = (array) => {
                return [...array].sort(() => Math.random() - 0.5);
            };

            const startQuiz = () => {
                setGameState('playing');
                setCurrentQuestionIndex(0);
                setScore(0);
                setTotalSeconds(0);
                setIsLocked(false);
                setSelectedOption(null);
                setShowHint(false);
                setShuffledOptions(shuffleArray(QUESTIONS[0].options));
            };

            useEffect(() => {
                let interval;
                if (gameState === 'playing') {
                    interval = setInterval(() => {
                        setTotalSeconds(prev => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [gameState]);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [gameState, currentQuestionIndex, showHint]);

            const handleNextQuestion = useCallback(() => {
                const nextIndex = currentQuestionIndex + 1;
                if (nextIndex < QUESTIONS.length) {
                    setCurrentQuestionIndex(nextIndex);
                    setIsLocked(false);
                    setSelectedOption(null);
                    setShowHint(false);
                    setShuffledOptions(shuffleArray(QUESTIONS[nextIndex].options));
                } else {
                    setGameState('finished');
                }
            }, [currentQuestionIndex]);

            const handleOptionClick = (option) => {
                if (isLocked) return;
                setSelectedOption(option);
                setIsLocked(true);
                if (option === QUESTIONS[currentQuestionIndex].correctAnswer) {
                    setScore(score + 1);
                }
            };

            const currentQuestion = QUESTIONS[currentQuestionIndex];

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                        
                        {/* Header */}
                        <div className="bg-indigo-700 p-6 text-white flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">Demokrati & Diktatur</h1>
                                <p className="text-indigo-200 text-sm">Begrepp och Grundlagar</p>
                            </div>
                            {gameState === 'playing' && (
                                <div className="flex items-center gap-3 bg-indigo-800 px-4 py-1.5 rounded-full border border-indigo-500/50">
                                    <Icon name="clock" size={16} className="text-indigo-300" />
                                    <span className="font-mono font-bold text-lg">
                                        {formatTime(totalSeconds)}
                                    </span>
                                </div>
                            )}
                        </div>

                        <div className="p-8">
                            {gameState === 'start' && (
                                <div className="text-center space-y-8 py-6">
                                    <div className="mx-auto w-24 h-24 bg-yellow-400 rounded-full flex items-center justify-center text-slate-900 shadow-lg">
                                        <Icon name="vote" size={40} />
                                    </div>
                                    <div className="space-y-3">
                                        <h2 className="text-3xl font-black text-slate-800">Dags för prov!</h2>
                                        <p className="text-slate-600 max-w-sm mx-auto">
                                            Testa dina kunskaper om demokrati. Quizzet har {QUESTIONS.length} frågor. Lycka till!
                                        </p>
                                    </div>
                                    <button 
                                        onClick={startQuiz}
                                        className="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-4 rounded-2xl font-bold transition-all shadow-xl shadow-indigo-200 active:scale-95"
                                    >
                                        Starta Quizzet
                                    </button>
                                    <p className="text-xs text-slate-400 uppercase tracking-widest font-bold pt-4">← <a href="index.html" className="underline">Tillbaka till Portalen</a></p>
                                </div>
                            )}

                            {gameState === 'playing' && (
                                <div className="space-y-8">
                                    <div className="space-y-5">
                                        <div className="flex justify-between items-end">
                                            <span className="text-xs font-bold uppercase tracking-wider text-indigo-600">
                                                Fråga {currentQuestionIndex + 1} av {QUESTIONS.length}
                                            </span>
                                        </div>
                                        <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                            <div 
                                                className="bg-indigo-600 h-full transition-all duration-500"
                                                style={{ width: `${((currentQuestionIndex + 1) / QUESTIONS.length) * 100}%` }}
                                            ></div>
                                        </div>
                                        <h2 className="text-xl font-bold leading-snug text-slate-800 min-h-[3.5rem]">
                                            {currentQuestion.question}
                                        </h2>
                                    </div>

                                    <div className="grid grid-cols-1 gap-3.5">
                                        {shuffledOptions.map((option, idx) => {
                                            const isCorrect = option === currentQuestion.correctAnswer;
                                            const isSelected = selectedOption === option;
                                            let style = "w-full p-4 px-6 text-left rounded-2xl border-2 transition-all flex justify-between items-center ";
                                            
                                            if (!isLocked) {
                                                style += "border-slate-200 hover:border-indigo-400 hover:bg-indigo-50/50";
                                            } else {
                                                if (isCorrect) style += "border-emerald-500 bg-emerald-50 text-emerald-700 font-bold";
                                                else if (isSelected) style += "border-rose-500 bg-rose-50 text-rose-700";
                                                else style += "border-slate-100 opacity-40";
                                            }

                                            return (
                                                <button key={idx} onClick={() => handleOptionClick(option)} disabled={isLocked} className={style}>
                                                    <span>{option}</span>
                                                    {isLocked && isCorrect && <Icon name="check-circle" size={18} className="text-emerald-500" />}
                                                    {isLocked && isSelected && !isCorrect && <Icon name="x-circle" size={18} className="text-rose-500" />}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    <div className="pt-6 flex justify-between items-center border-t border-slate-100 mt-2">
                                        <button onClick={() => setShowHint(!showHint)} className="text-indigo-600 text-sm font-bold flex items-center gap-2 hover:bg-indigo-50 px-3 py-1 rounded-lg transition-colors">
                                            <Icon name="lightbulb" size={18} />
                                            {showHint ? 'Dölj tips' : 'Visa tips'}
                                        </button>
                                        {isLocked && (
                                            <button onClick={handleNextQuestion} className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg hover:bg-indigo-700 transition-all">
                                                {currentQuestionIndex === QUESTIONS.length - 1 ? 'Visa Resultat' : 'Nästa'}
                                                <Icon name="chevron-right" size={20} />
                                            </button>
                                        )}
                                    </div>

                                    {showHint && (
                                        <div className="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-xl text-sm text-amber-900">
                                            <strong>Ledtråd:</strong> {currentQuestion.hint}
                                        </div>
                                    )}
                                </div>
                            )}

                            {gameState === 'finished' && (
                                <div className="text-center space-y-10 py-6">
                                    <div className="space-y-4">
                                        <div className={`w-28 h-28 rounded-full flex items-center justify-center mx-auto shadow-inner ${score > QUESTIONS.length / 2 ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}`}>
                                            <Icon name={score === QUESTIONS.length ? "party-popper" : "award"} size={56} />
                                        </div>
                                        <h2 className="text-4xl font-black text-slate-800">
                                            {score === QUESTIONS.length ? "Full pott!" : score > 10 ? "Bra jobbat!" : "Kämpa på!"}
                                        </h2>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 max-w-md mx-auto">
                                        <div className="bg-indigo-50 p-6 rounded-3xl border border-indigo-100">
                                            <div className="text-indigo-400 text-xs uppercase font-black tracking-widest mb-1">Poäng</div>
                                            <div className="text-3xl font-black text-indigo-700">{score} / {QUESTIONS.length}</div>
                                        </div>
                                        <div className="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                                            <div className="text-emerald-400 text-xs uppercase font-black tracking-widest mb-1">Total Tid</div>
                                            <div className="text-3xl font-black text-emerald-700">{formatTime(totalSeconds)}</div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-3">
                                        <button 
                                            onClick={startQuiz}
                                            className="flex items-center gap-3 bg-slate-900 hover:bg-slate-800 text-white px-10 py-4 rounded-2xl font-bold transition-all mx-auto shadow-2xl active:scale-95"
                                        >
                                            <Icon name="rotate-ccw" size={20} />
                                            Gör om quizen
                                        </button>
                                        <a href="index.html" className="text-slate-500 font-bold hover:text-indigo-600 transition-colors pt-4 flex items-center justify-center gap-2">
                                            <Icon name="arrow-left" size={16} /> Tillbaka till portalen
                                        </a>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
