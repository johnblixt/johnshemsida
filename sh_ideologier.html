<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideologier Quiz - Repetitionsspel</title>
  
  <!-- Laddar in React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Laddar in Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Laddar in Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
  <a href="index.html" class="fixed top-4 left-4 z-50 text-sm font-medium text-slate-500 hover:text-slate-800 bg-white/90 px-3 py-2 rounded-xl shadow-sm transition-colors">← Tillbaka till startsidan</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- IKONER ---
    const Landmark = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="2" y1="22" x2="22" y2="22"/><polyline points="9 22 9 12 15 12 15 22"/><polyline points="12 2 2 7 2 12 22 12 22 7 12 2"/><path d="M2 17h20"/><path d="M6 12v5"/><path d="M10 12v5"/><path d="M14 12v5"/><path d="M18 12v5"/></svg>
    );
    const Trophy = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    );
    const Clock = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    );
    const RefreshCw = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );
    const CheckCircle2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    );
    const XCircle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
    );
    const ChevronRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>
    );

    // --- DATA ---
    // Distraktorer har uppdaterats för att matcha längd och ton med det rätta svaret.
    const allQuestionsData = [
      {
        question: "Vad är en politisk ideologi?",
        correct: "En samling idéer om hur samhället ska styras och fungera.",
        incorrect: [
          "Ett juridiskt system för att reglera landets lagar och ordning.",
          "En vetenskaplig metod för att analysera historiska händelser.",
          "En ekonomisk plan för hur statens budget ska fördelas årligen."
        ]
      },
      {
        question: "Vilken historisk händelse lade grunden för liberalismen?",
        correct: "Franska revolutionen.",
        incorrect: ["Industriella revolutionen.", "Ryska revolutionen.", "Amerikanska inbördeskriget."]
      },
      {
        question: "Vilken händelse låg bakom att socialismen växte fram?",
        correct: "Industriella revolutionen.",
        incorrect: ["Amerikanska revolutionen.", "Franska revolutionen.", "Den vetenskapliga revolutionen."]
      },
      {
        question: "Varför växte konservatismen fram?",
        correct: "Som en reaktion mot de snabba förändringarna i franska revolutionen.",
        incorrect: [
          "För att skapa ett modernt försvar mot yttre hot från grannländer.",
          "Som ett krav på att införa allmän rösträtt för alla vuxna medborgare.",
          "För att skydda de nya industrier som växte fram under 1800-talet."
        ]
      },
      {
        question: "Vad är ett centralt mål inom socialismen?",
        correct: "Att minska ekonomiska skillnader mellan rika och fattiga.",
        incorrect: [
          "Att bevara kyrkans och kungamaktens roll i det dagliga livet.",
          "Att öka det privata ägandet av skogar, mark och råvaror.",
          "Att ta bort statliga regleringar för att främja fri konkurrens."
        ]
      },
      {
        question: "Vad är det viktigaste för liberalismen?",
        correct: "Individens frihet och rätten att fatta egna beslut.",
        incorrect: [
          "Gemensamt ägande av produktion och tunga industrier.",
          "Starka religiösa värderingar och bevarande av traditioner.",
          "Staten absoluta makt över medborgarnas vardagliga val."
        ]
      },
      {
        question: "Vad vill konservatismen uppnå?",
        correct: "Bevara traditioner och skapa stabilitet genom långsam förändring.",
        incorrect: [
          "Genomföra snabba revolutioner för att störta den sittande makten.",
          "Avskaffa alla former av klasskillnader och hierarkier i samhället.",
          "Minimera statens roll så att individen blir helt oberoende."
        ]
      },
      {
        question: "Vilken politisk fråga förknippas ofta med socialismen?",
        correct: "Att begränsa vinster i välfärden för att säkra jämlik vård.",
        incorrect: [
          "Att sänka skatterna kraftigt för att locka till sig företag.",
          "Att minska den offentliga sektorns inflytande över ekonomin.",
          "Att privatisera järnvägar och energi för att öka effektiviteten."
        ]
      },
      {
        question: "Vilken politisk fråga är typisk för liberalismen?",
        correct: "Valfrihet i skola och vård genom olika privata alternativ.",
        incorrect: [
          "Ett totalt förbud mot vinstdrivande företag inom utbildning.",
          "Styrning av ekonomin genom statliga femårsplaner och kontroll.",
          "Kraftigt höjda bidrag som finansieras genom förmögenhetsskatt."
        ]
      },
      {
        question: "Vilken politisk fråga förknippas ofta med konservatismen?",
        correct: "Betoning på lag och ordning samt ett starkt nationellt försvar.",
        incorrect: [
          "Ett krav på att avskaffa polismyndigheten i dess nuvarande form.",
          "En önskan om att helt öppna gränserna för fri rörlighet globalt.",
          "En kamp för att omedelbart upplösa alla traditionella kärnfamiljer."
        ]
      },
      {
        question: "Vad har socialism och liberalism gemensamt?",
        correct: "En grundläggande tro på de demokratiska värderingarna.",
        incorrect: [
          "Ett gemensamt motstånd mot individens rätt till yttrandefrihet.",
          "En önskan att återinföra monarkin som den främsta statsmakten.",
          "En fientlig inställning till alla typer av sociala förändringar."
        ]
      },
      {
        question: "Vad skiljer liberalismen från socialismen?",
        correct: "Liberalismen prioriterar frihet, socialismen prioriterar jämlikhet.",
        incorrect: [
          "Socialismen vill ha lägre skatter medan liberalismen vill ha högre.",
          "Liberalismen är motståndare till demokrati och folkstyre.",
          "Det finns inga ideologiska skillnader mellan dessa två ismer."
        ]
      },
      {
        question: "Vad skiljer konservatismen från liberalismen?",
        correct: "Konservatismen värnar tradition, liberalismen välkomnar förnyelse.",
        incorrect: [
          "Konservatismen kräver mer personlig frihet än vad liberalismen gör.",
          "Konservatismen bygger på idén om att staten ska äga alla fabriker.",
          "Liberalismen strävar efter att bevara religionens makt i politiken."
        ]
      },
      {
        question: "Vad har konservatismen och liberalismen gemensamt?",
        correct: "Tron på individens eget ansvar för sitt liv och sina val.",
        incorrect: [
          "Ett krav på väpnad revolution för att förändra samhällsklasserna.",
          "Ett starkt motstånd mot rätten att äga privat egendom och mark.",
          "En gemensam plan för att förstatliga alla banker och storföretag."
        ]
      },
      {
        question: "Hur ser konservatismen på ekonomisk ojämlikhet?",
        correct: "Man ser det som naturligt och en del av samhällets struktur.",
        incorrect: [
          "Man vill avskaffa pengar helt för att skapa ett klasslöst samhälle.",
          "Man kräver att staten konfiskerar alla arv för att nå rättvisa.",
          "Man anser att staten ska garantera exakt samma lön till alla."
        ]
      }
    ];

    // --- HJÄLPFUNKTIONER ---
    const shuffleArray = (array) => {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    };

    const formatTime = (seconds) => {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    };

    // --- HUVUDKOMPONENT ---
    function App() {
      const [gameState, setGameState] = useState('start');
      const [questions, setQuestions] = useState([]);
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [currentOptions, setCurrentOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [timer, setTimer] = useState(0);
      
      const timerRef = useRef(null);

      useEffect(() => {
        if (gameState === 'playing') {
          timerRef.current = setInterval(() => {
            setTimer(prev => prev + 1);
          }, 1000);
        } else {
          clearInterval(timerRef.current);
        }
        return () => clearInterval(timerRef.current);
      }, [gameState]);

      const startGame = () => {
        const shuffledQuestions = shuffleArray(allQuestionsData).slice(0, 15);
        setQuestions(shuffledQuestions);
        setScore(0);
        setTimer(0);
        setCurrentQuestionIndex(0);
        setGameState('playing');
        loadQuestion(shuffledQuestions[0]);
      };

      const loadQuestion = (questionData) => {
        setSelectedOption(null);
        setIsAnswered(false);
        const options = [questionData.correct, ...questionData.incorrect];
        setCurrentOptions(shuffleArray(options));
      };

      const handleOptionClick = (option) => {
        if (isAnswered) return;
        setSelectedOption(option);
        setIsAnswered(true);
        if (option === questions[currentQuestionIndex].correct) {
          setScore(score + 1);
        }
      };

      const handleNext = () => {
        if (currentQuestionIndex + 1 < questions.length) {
          const nextIndex = currentQuestionIndex + 1;
          setCurrentQuestionIndex(nextIndex);
          loadQuestion(questions[nextIndex]);
        } else {
          setGameState('result');
        }
      };

      if (gameState === 'start') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white max-w-md w-full rounded-2xl shadow-xl overflow-hidden border-t-8 border-yellow-400">
              <div className="p-8 text-center">
                <div className="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                  <Landmark className="w-10 h-10 text-yellow-600" />
                </div>
                <h1 className="text-3xl font-black text-slate-900 mb-2">Ideologier Quiz</h1>
                <p className="text-slate-500 mb-8">Träna på ismerna inför provet. Svaren är nu svårare att gissa och tiden räknas!</p>
                <button onClick={startGame} className="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                  Starta quizet
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white max-w-md w-full rounded-2xl shadow-xl p-8 text-center border-t-8 border-green-400">
              <Trophy className="w-20 h-20 mx-auto mb-4 text-yellow-500" />
              <h2 className="text-3xl font-black text-slate-800 mb-2">Bra jobbat!</h2>
              <div className="mb-6">
                <p className="text-5xl font-black text-slate-900">{score} / {questions.length}</p>
                <p className="text-slate-500 font-medium mt-1">Din tid: {formatTime(timer)}</p>
              </div>
              <button onClick={startGame} className="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                <RefreshCw className="w-5 h-5" /> Försök igen
              </button>
            </div>
          </div>
        );
      }

      const currentQ = questions[currentQuestionIndex];

      return (
        <div className="min-h-screen flex flex-col items-center py-8 p-4">
          <div className="w-full max-w-md">
            <div className="mb-6">
              <div className="flex justify-between items-end text-xs font-black uppercase tracking-widest text-slate-400 mb-2 px-1">
                <div className="flex flex-col gap-1">
                  <span>Fråga {currentQuestionIndex + 1} / {questions.length}</span>
                  <div className="flex items-center gap-1 text-slate-600">
                    <Clock className="w-3 h-3" />
                    <span>{formatTime(timer)}</span>
                  </div>
                </div>
                <span>Poäng: {score}</span>
              </div>
              <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-yellow-400 transition-all duration-300" 
                  style={{ width: `${((currentQuestionIndex + 1) / questions.length) * 100}%` }}
                ></div>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-lg p-8 mb-6 border-b-4 border-slate-100">
              <h2 className="text-xl font-bold text-slate-800 leading-snug">{currentQ.question}</h2>
            </div>

            <div className="space-y-3">
              {currentOptions.map((option, index) => {
                let btnClasses = "w-full text-left p-5 rounded-xl border-2 transition-all font-bold flex items-center justify-between gap-3 shadow-sm ";
                if (!isAnswered) {
                  btnClasses += "border-slate-100 bg-white text-slate-600 hover:border-yellow-400 hover:shadow-md active:scale-95";
                } else {
                  if (option === currentQ.correct) {
                    btnClasses += "border-green-500 bg-green-50 text-green-800";
                  } else if (option === selectedOption) {
                    btnClasses += "border-red-500 bg-red-50 text-red-800";
                  } else {
                    btnClasses += "border-slate-50 bg-slate-50 text-slate-300 opacity-60";
                  }
                }
                return (
                  <button key={index} onClick={() => handleOptionClick(option)} disabled={isAnswered} className={btnClasses}>
                    <span className="text-sm md:text-base">{option}</span>
                    {isAnswered && option === currentQ.correct && <CheckCircle2 className="w-6 h-6 text-green-500 shrink-0" />}
                    {isAnswered && option === selectedOption && option !== currentQ.correct && <XCircle className="w-6 h-6 text-red-500 shrink-0" />}
                  </button>
                );
              })}
            </div>

            {isAnswered && (
              <div className="mt-8">
                <button onClick={handleNext} className="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95">
                  {currentQuestionIndex + 1 === questions.length ? 'Se resultat' : 'Nästa fråga'}
                  <ChevronRight className="w-5 h-5" />
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
