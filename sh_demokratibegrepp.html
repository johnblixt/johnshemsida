<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demokrati & Diktatur - Begreppslista</title>
    
    <!-- Typsnitt och Tailwind CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React och Babel (för att köra JSX direkt i webbläsaren) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Fredoka', sans-serif;
        }

        /* Flip-animation Logik */
        .flip-card {
            perspective: 1000px;
            height: 350px;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flipped-classes {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .flip-card-front {
            background-color: #fbbf24; /* bg-yellow-400 */
            border: 6px solid white;
        }
        .flip-card-back {
            background-color: white;
            border: 6px solid #fbbf24;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const concepts = [
            { term: "Demokrati", definition: "Folkstyre - när folket bestämmer." },
            { term: "Diktatur", definition: "Motsatsen till demokrati - när en person eller en grupp har all makt i landet." },
            { term: "Yttrandefrihetsgrundlagen", definition: "Grundlagen som säger att du får säga vad du tycker." },
            { term: "Tryckfrihetsförordningen", definition: "Grundlagen som säger att du får skriva vad du vill i tidningar och böcker." },
            { term: "Meddelarfrihet", definition: "Du får lämna information till media utan att chefen får straffa dig." },
            { term: "Censur", definition: "När staten stoppar information från att spridas." },
            { term: "Offentlighetsprincipen", definition: "Alla har rätt att läsa dokument från myndigheter." },
            { term: "Fri opinionsbildning", definition: "Alla får bilda och sprida sina åsikter." },
            { term: "Flerpartisystem", definition: "Det finns flera partier att välja mellan i val." },
            { term: "Majoritetsprincipen", definition: "Det förslag som flest röstar på vinner." },
            { term: "Allmän rösträtt", definition: "Alla vuxna får rösta." },
            { term: "Förtroendevalda", definition: "Personer som valts av folket för att fatta beslut." },
            { term: "Representativ demokrati", definition: "Vi väljer personer som bestämmer åt oss." },
            { term: "Direkt demokrati", definition: "Folket röstar själva i en fråga." },
            { term: "Folkomröstning", definition: "När folket får rösta direkt om en specifik fråga." },
            { term: "Parlamentarism", definition: "Regeringen måste ha riksdagens stöd för att få styra." },
            { term: "Monarki", definition: "Landet har en kung eller drottning som statschef." },
            { term: "Republik", definition: "Landet har en president som statschef." },
            { term: "Statschef", definition: "Den som är högst upp i landet (t.ex. kung eller president)." },
            { term: "Proportionellt valsystem", definition: "Partier får lika många platser som röster i valet." }
        ];

        function App() {
            const [view, setView] = useState('list');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    let newIndex;
                    do {
                        newIndex = Math.floor(Math.random() * concepts.length);
                    } while (newIndex === currentIndex && concepts.length > 1);
                    setCurrentIndex(newIndex);
                }, 150);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-2xl mx-auto mb-8 flex items-center justify-between">
                        <a href="index.html" className="text-slate-500 hover:text-yellow-600 transition-colors flex items-center gap-2 font-medium">
                            <span className="text-xl">←</span> Portal
                        </a>
                        <h1 className="text-2xl md:text-3xl font-bold text-center">Demokrati & Diktatur</h1>
                        <div className="w-16"></div>
                    </header>

                    {/* Toggle Switch */}
                    <div className="max-w-xs mx-auto mb-10 flex bg-white p-1 rounded-full shadow-md border border-slate-200">
                        <button 
                            onClick={() => setView('list')}
                            className={`flex-1 py-2 rounded-full transition-all duration-300 ${view === 'list' ? 'bg-yellow-400 font-bold shadow-sm' : 'text-slate-500'}`}
                        >
                            Lista
                        </button>
                        <button 
                            onClick={() => setView('flashcards')}
                            className={`flex-1 py-2 rounded-full transition-all duration-300 ${view === 'flashcards' ? 'bg-yellow-400 font-bold shadow-sm' : 'text-slate-500'}`}
                        >
                            Flashcards
                        </button>
                    </div>

                    <main className="max-w-2xl mx-auto">
                        {view === 'list' ? (
                            <div className="grid gap-4">
                                {concepts.map((item, index) => (
                                    <div key={index} className="bg-white p-5 rounded-2xl border-l-8 border-yellow-400 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-1 rounded-lg">{index + 1}</span>
                                            <h3 className="text-lg font-bold">{item.term}</h3>
                                        </div>
                                        <p className="text-slate-600 leading-relaxed ml-10">{item.definition}</p>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center">
                                <div className="flip-card mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`flip-card-inner ${isFlipped ? 'flipped-classes' : ''}`}>
                                        <div className="flip-card-front">
                                            <h2 className="text-3xl font-bold text-slate-900 text-center px-4">{concepts[currentIndex].term}</h2>
                                            <div className="absolute bottom-6 flex flex-col items-center animate-pulse">
                                                <span className="text-[10px] uppercase tracking-[0.2em] text-yellow-900 font-bold opacity-70">Klicka för svar</span>
                                            </div>
                                        </div>
                                        <div className="flip-card-back">
                                            <p className="text-xl leading-relaxed text-slate-800 font-medium px-4">{concepts[currentIndex].definition}</p>
                                            <div className="absolute bottom-6">
                                                <span className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Klicka för att vända</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex flex-col items-center gap-4">
                                    <button 
                                        onClick={nextCard}
                                        className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-3 text-lg"
                                    >
                                        Nästa begrepp <span>→</span>
                                    </button>
                                    <p className="text-slate-500 font-medium bg-slate-200 px-4 py-1 rounded-full text-xs">
                                        {currentIndex + 1} av {concepts.length}
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-12 text-center text-slate-400 text-sm italic pb-8">
                        Källa: Samhällskunskap - Demokrati begreppslista
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
