    // Helper för att blanda en array (Fisher-Yates)
    const shuffleArray = (array) => {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    };

    function QuizApp() {
      const [gameState, setGameState] = useState('start'); // 'start', 'playing', 'result'
      const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
      const [score, setScore] = useState(0);
      
      const [shuffledOptions, setShuffledOptions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);

      // Blanda svarsalternativen varje gång en ny fråga laddas
      useEffect(() => {
        if (gameState === 'playing') {
          const options = allQuestions[currentQuestionIndex].options;
          setShuffledOptions(shuffleArray(options));
          setSelectedOption(null);
          setIsAnswered(false);
        }
      }, [currentQuestionIndex, gameState]);

      const handleStart = () => {
        setGameState('playing');
        setCurrentQuestionIndex(0);
        setScore(0);
      };

      const handleAnswer = (option) => {
        if (isAnswered) return; // Förhindra flera klick
        setSelectedOption(option);
        setIsAnswered(true);
        if (option.isCorrect) {
          setScore(prev => prev + 1);
        }
      };

      const handleNext = () => {
        if (currentQuestionIndex + 1 < allQuestions.length) {
          setCurrentQuestionIndex(prev => prev + 1);
        } else {
          setGameState('result');
        }
      };

      // Rendering: Startskärm
      if (gameState === 'start') {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans text-slate-800">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
              <div className="text-5xl mb-4">📈</div>
              <h1 className="text-3xl font-extrabold mb-4 text-slate-900">Samhällsekonomi Quiz</h1>
              <p className="text-slate-600 mb-8 leading-relaxed">
                Testa dina kunskaper i samhällsekonomi! Totalt 30 frågor om konjunkturer, räntor och ekonomiska system. 
                Svarsalternativen blandas varje gång så du kan spela om tills det sitter.
              </p>
              <button 
                onClick={handleStart}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-200"
              >
                Starta provet
              </button>
            </div>
          </div>
        );
      }

      // Rendering: Resultatskärm
      if (gameState === 'result') {
        const percentage = Math.round((score / allQuestions.length) * 100);
        let message = "Bra kämpat!";
        let emoji = "👍";
        
        if (percentage >= 90) { message = "Strålande resultat!"; emoji = "🏆"; }
        else if (percentage >= 60) { message = "Snyggt jobbat!"; emoji = "⭐"; }
        else { message = "Övning ger färdighet!"; emoji = "💪"; }

        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans text-slate-800">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
              <div className="text-6xl mb-4">{emoji}</div>
              <h2 className="text-3xl font-extrabold mb-2 text-slate-900">{message}</h2>
              <p className="text-lg text-slate-600 mb-6">
                Du fick <span className="font-bold text-blue-600">{score}</span> rätt av {allQuestions.length} möjliga. ({percentage}%)
              </p>
              <button 
                onClick={handleStart}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-200"
              >
                Spela igen
              </button>
            </div>
          </div>
        );
      }

      // Rendering: Spelskärm (playing)
      const currentQuestion = allQuestions[currentQuestionIndex];
      const progressPercentage = ((currentQuestionIndex) / allQuestions.length) * 100;

      return (
        <div className="min-h-screen bg-slate-100 py-8 px-4 font-sans text-slate-800 flex flex-col items-center">
          <div className="max-w-md w-full">
            
            {/* Progress bar och Frågeräknare */}
            <div className="mb-6">
              <div className="flex justify-between items-center mb-2 text-sm font-semibold text-slate-500 uppercase tracking-wider">
                <span>Fråga {currentQuestionIndex + 1} av {allQuestions.length}</span>
                <span>Poäng: {score}</span>
              </div>
              <div className="w-full bg-slate-200 h-3 rounded-full overflow-hidden">
                <div 
                  className="bg-blue-500 h-full transition-all duration-300 ease-out rounded-full"
                  style={{ width: `${progressPercentage}%` }}
                ></div>
              </div>
            </div>

            {/* Frågan */}
            <div className="bg-white p-6 rounded-2xl shadow-sm mb-6 border border-slate-100">
              <h2 className="text-xl md:text-2xl font-bold leading-snug text-slate-900">
                {currentQuestion.question}
              </h2>
            </div>

            {/* Svarsalternativ */}
            <div className="flex flex-col gap-3">
              {shuffledOptions.map((option, index) => {
                // Logik för dynamiska färger efter att användaren svarat
                let btnClass = "bg-white border-slate-200 hover:bg-slate-50 hover:border-blue-300 text-slate-700";
                let indicator = "";

                if (isAnswered) {
                  if (option.isCorrect) {
                    btnClass = "bg-green-100 border-green-500 text-green-900 font-medium shadow-sm ring-1 ring-green-500";
                    indicator = "✓";
                  } else if (option === selectedOption && !option.isCorrect) {
                    btnClass = "bg-red-50 border-red-400 text-red-900 opacity-90";
                    indicator = "✗";
                  } else {
                    btnClass = "bg-slate-50 border-slate-200 text-slate-400 opacity-60";
                  }
                }

                return (
                  <button
                    key={index}
                    onClick={() => handleAnswer(option)}
                    disabled={isAnswered}
                    className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 ease-in-out flex items-center justify-between ${btnClass} ${!isAnswered ? 'active:scale-[0.98]' : 'cursor-default'}`}
                  >
                    <span className="pr-4 leading-relaxed">{option.text}</span>
                    {indicator && <span className="font-bold text-lg">{indicator}</span>}
                  </button>
                );
              })}
            </div>

            {/* Förklaring (Rationale) och Nästa-knapp */}
            {isAnswered && (
              <div className="mt-6 animate-fade-in-up">
                <div className={`p-5 rounded-xl mb-6 flex flex-col gap-2 ${selectedOption.isCorrect ? 'bg-green-50 border border-green-100 text-green-800' : 'bg-red-50 border border-red-100 text-red-800'}`}>
                  <div className="font-bold flex items-center gap-2">
                    {selectedOption.isCorrect ? "Rätt svar!" : "Tyvärr, det var fel."}
                  </div>
                  <p className="text-sm leading-relaxed opacity-90">
                    <span className="font-semibold block mb-1">Förklaring:</span>
                    {currentQuestion.rationale}
                  </p>
                </div>

                <button 
                  onClick={handleNext}
                  className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-8 rounded-xl transition-all active:scale-95 shadow-md flex justify-center items-center gap-2"
                >
                  {currentQuestionIndex + 1 === allQuestions.length ? "Se resultat" : "Nästa fråga"}
                  <span>→</span>
                </button>
              </div>
            )}
          </div>
          
          {/* Enkel Tailwind-animation (läggs i en style-tagg) */}
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes fadeInUp {
              from { opacity: 0; transform: translateY(10px); }
              to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in-up {
              animation: fadeInUp 0.4s ease-out forwards;
            }
          `}} />
        </div>
      );
    }

    // Montera appen
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<QuizApp />);
  </script>
</body>
</html>
