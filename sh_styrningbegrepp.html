                definition: "En del av regeringen där ministrar och tjänstemän tar fram lagförslag och planerar politiken.",
                sentence: "Utbildningsdepartementet är det _____ som arbetar med frågor om skola och högre utbildning.",
                scenario: "Utbildningsministern och hennes medarbetare håller på att skriva ett lagförslag om gymnasiereformen. De samlar in underlag, remissar och expertutlåtanden för att ta fram ett färdigt förslag till riksdagen.",
                ickeExempel: { korrekt: "Justitiedepartementet tar fram ett förslag till ny brottsbalk och skickar det som proposition till riksdagen för beslut.", icke: "Polismyndigheten tar fram en ny nationell strategi för hur det brottsförebyggande arbetet ska bedrivas i hela landet.", forklaring: "Polismyndigheten är en myndighet som genomför politiken i praktiken – departementet bereder och planerar politiska beslut, medan myndigheten utför dem." }
            },
            {
                term: "KU-anmälan",
                definition: "När någon anmäler regeringen till Konstitutionsutskottet som granskar om reglerna följts.",
                sentence: "Oppositionen lämnade in en _____ mot ministern för att undersöka om hon brutit mot regeringsformen.",
                scenario: "En minister har delat ut ett statligt kontrakt utan att följa de regler som gäller för offentlig upphandling. Oppositionen anmäler formellt detta till den riksdagskommitté som har i uppgift att granska om spelreglerna för regeringsmakten följts.",
                ickeExempel: { korrekt: "Oppositionen anmäler till KU att en minister fattat ett beslut utan att informera riksdagen på det sätt konstitutionen kräver.", icke: "En journalist anmäler en minister till JO för att hon nekat pressen tillgång till allmänna handlingar.", forklaring: "JO (Justitieombudsmannen) granskar myndigheters agerande mot enskilda medborgare, medan KU (Konstitutionsutskottet) granskar om regeringens ministrar följt grundlagen – viktiga men olika granskningsorgan." }
            }
        ];

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function getFeedback(score, total) {
            const p = score / total;
            if (p >= 0.9) return "Redo för provet! Fantastiskt bra!";
            if (p >= 0.7) return "Bra jobbat! Öva lite till på de du missade.";
            if (p >= 0.5) return "Halvvägs! Fortsätt träna.";
            return "Öva lite till – du är på rätt väg!";
        }

        function LucktextView() {
            const [inputs, setInputs] = useState(concepts.map(() => ''));
            const [attempts, setAttempts] = useState(concepts.map(() => 0));
            const [statuses, setStatuses] = useState(concepts.map(() => null));
            const [done, setDone] = useState(false);

            const normalize = s => s.trim().toLowerCase();

            const submit = (i) => {
                if (statuses[i] === 'correct' || statuses[i] === 'wrong-final') return;
                if (normalize(inputs[i]) === normalize(concepts[i].term)) {
                    const s = [...statuses]; s[i] = 'correct'; setStatuses(s);
                } else {
                    const a = [...attempts]; a[i]++; setAttempts(a);
                    const s = [...statuses]; s[i] = a[i] >= 2 ? 'wrong-final' : 'wrong-once'; setStatuses(s);
                }
            };

            const rättaAlla = () => { setStatuses(statuses.map(s => s === 'correct' ? 'correct' : 'wrong-final')); setDone(true); };
            const börjaOm = () => { setInputs(concepts.map(() => '')); setAttempts(concepts.map(() => 0)); setStatuses(concepts.map(() => null)); setDone(false); };

            const correctCount = statuses.filter(s => s === 'correct').length;
            const allDone = done || statuses.every(s => s === 'correct' || s === 'wrong-final');

            return (
                <div>
                    <div className="mb-6 p-4 bg-white rounded-2xl shadow-sm border border-slate-200">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Begreppsbank</p>
                        <div className="flex flex-wrap gap-2">
                            {concepts.map((c, i) => (
                                <span key={i} className={`px-3 py-1 rounded-full text-sm font-medium border transition-all ${statuses[i] === 'correct' ? 'line-through text-slate-400 bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-300 text-yellow-800'}`}>{c.term}</span>
                            ))}
                        </div>
                    </div>
                    <div className="grid gap-4">
                        {concepts.map((c, i) => {
                            const parts = c.sentence.split('_____');
                            const st = statuses[i];
                            return (
                                <div key={i} className={`bg-white p-5 rounded-2xl shadow-sm border-l-8 transition-all ${st === 'correct' ? 'border-green-500' : st === 'wrong-final' ? 'border-red-400' : 'border-yellow-400'}`}>
                                    <p className="text-slate-700 mb-3 leading-relaxed">{parts[0]}<span className="font-bold text-yellow-600">[_____]</span>{parts[1]}</p>
                                    {st === 'correct' ? (
                                        <div className="flex flex-wrap items-center gap-2 text-green-600"><span className="font-bold">✓ {c.term}</span><span className="text-sm font-normal text-slate-500">– {c.definition}</span></div>
                                    ) : st === 'wrong-final' ? (
                                        <div><p className="text-red-500 text-sm">Rätt svar: <span className="font-bold">{c.term}</span></p><p className="text-slate-500 text-sm mt-1">{c.definition}</p></div>
                                    ) : (
                                        <div>
                                            <div className="flex gap-2">
                                                <input type="text" value={inputs[i]} onChange={e => { const v = [...inputs]; v[i] = e.target.value; setInputs(v); }} onKeyDown={e => e.key === 'Enter' && submit(i)} placeholder="Skriv begreppet och tryck Enter..." className="flex-1 border-2 border-slate-200 rounded-xl px-4 py-2 focus:outline-none focus:border-yellow-400 text-sm" />
                                                <button onClick={() => submit(i)} className="bg-yellow-400 text-yellow-900 px-4 py-2 rounded-xl font-bold hover:bg-yellow-500 transition-colors">→</button>
                                            </div>
                                            {st === 'wrong-once' && <p className="text-orange-500 text-sm mt-2 font-medium">Är du säker att du stavat rätt?</p>}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    <div className="mt-8 flex justify-between items-center">
                        <button onClick={börjaOm} className="text-slate-500 hover:text-slate-700 font-medium transition-colors">↺ Börja om</button>
                        {!allDone && <button onClick={rättaAlla} className="bg-slate-800 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-700 transition-colors">Rätta alla</button>}
                    </div>
                    {allDone && (
                        <div className="mt-8 bg-yellow-50 border-2 border-yellow-400 rounded-3xl p-8 text-center">
                            <p className="text-5xl font-bold text-yellow-500 mb-2">{correctCount}/{concepts.length}</p>
                            <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(correctCount, concepts.length)}</p>
                            <button onClick={börjaOm} className="bg-yellow-400 text-yellow-900 px-8 py-3 rounded-2xl font-bold hover:bg-yellow-500 transition-colors">Börja om</button>
                        </div>
                    )}
                </div>
            );
        }

        function ScenarioView() {
            const [shuffledIdxs] = useState(() => shuffleArray(concepts.map((_, i) => i)));
            const [current, setCurrent] = useState(0);
            const [answered, setAnswered] = useState(null);
            const [selected, setSelected] = useState(null);
            const [score, setScore] = useState(0);
            const [done, setDone] = useState(false);
            const [termOptions] = useState(() => shuffleArray(concepts.map(c => c.term)));

            if (done) {
                return (
                    <div className="bg-yellow-50 border-2 border-yellow-400 rounded-3xl p-8 text-center">
                        <p className="text-5xl font-bold text-yellow-500 mb-2">{score}/{concepts.length}</p>
                        <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(score, concepts.length)}</p>
                        <button onClick={() => { setCurrent(0); setAnswered(null); setSelected(null); setScore(0); setDone(false); }} className="bg-yellow-400 text-yellow-900 px-8 py-3 rounded-2xl font-bold hover:bg-yellow-500 transition-colors">Gör om</button>
                    </div>
                );
            }

            const idx = shuffledIdxs[current];
            const concept = concepts[idx];

            const handleSelect = (term) => {
                if (answered !== null) return;
                setSelected(term);
                setAnswered(term === concept.term ? 'correct' : 'wrong');
                if (term === concept.term) setScore(s => s + 1);
            };

            const next = () => {
                if (current + 1 >= concepts.length) { setDone(true); return; }
                setCurrent(c => c + 1);
                setAnswered(null);
                setSelected(null);
            };

            return (
                <div>
                    <div className="mb-4 flex items-center justify-between">
                        <span className="text-sm text-slate-500">{current + 1} av {concepts.length}</span>
                        <span className="text-sm font-bold text-yellow-700 bg-yellow-50 px-3 py-1 rounded-full border border-yellow-200">Poäng: {score}</span>
                    </div>
                    <div className="w-full bg-slate-200 rounded-full h-2 mb-6">
                        <div className="bg-yellow-400 h-2 rounded-full transition-all duration-500" style={{width: `${((current) / concepts.length) * 100}%`}}></div>
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Vilket begrepp beskrivs?</p>
                        <p className="text-lg leading-relaxed text-slate-800">{concept.scenario}</p>
                    </div>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        {termOptions.map((term, i) => {
                            let cls = "p-3 rounded-xl border-2 text-sm font-medium text-center cursor-pointer transition-all border-slate-200 hover:border-yellow-400 hover:bg-yellow-50";
                            if (answered !== null && term === concept.term) cls = "p-3 rounded-xl border-2 text-sm font-medium text-center bg-green-50 border-green-500 text-green-700";
                            else if (answered !== null && term === selected && selected !== concept.term) cls = "p-3 rounded-xl border-2 text-sm font-medium text-center bg-red-50 border-red-400 text-red-600";
                            return <button key={i} onClick={() => handleSelect(term)} className={cls}>{term}</button>;
                        })}
                    </div>
                    {answered && (
                        <div className={`p-4 rounded-2xl mb-4 ${answered === 'correct' ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
                            <p className={`font-bold mb-1 ${answered === 'correct' ? 'text-green-700' : 'text-red-600'}`}>{answered === 'correct' ? '✓ Rätt!' : '✗ Fel'}</p>
                            <p className="text-sm text-slate-600">Rätt svar: <span className="font-bold">{concept.term}</span> – {concept.definition}</p>
                        </div>
                    )}
                    {answered && <button onClick={next} className="w-full bg-slate-900 text-white py-3 rounded-2xl font-bold hover:bg-slate-800 transition-colors">{current + 1 >= concepts.length ? 'Se resultat' : 'Nästa →'}</button>}
                </div>
            );
        }

        function IckeExempelView() {
            const makeOpts = (c) => {
                const flip = Math.random() > 0.5;
                return flip
                    ? [{ text: c.ickeExempel.korrekt, isCorrect: true }, { text: c.ickeExempel.icke, isCorrect: false }]
                    : [{ text: c.ickeExempel.icke, isCorrect: false }, { text: c.ickeExempel.korrekt, isCorrect: true }];
            };
            const freshState = () => {
                const ord = shuffleArray(concepts.map((_, i) => i));
                return { ord, cur: 0, opts: makeOpts(concepts[ord[0]]), answered: null, selIdx: null, score: 0, done: false };
            };
            const [s, setS] = useState(freshState);
            const concept = concepts[s.ord[s.cur]];

            const handleSelect = (idx) => {
                if (s.answered !== null) return;
                const isCorrect = s.opts[idx].isCorrect;
                setS(prev => ({ ...prev, answered: isCorrect ? 'correct' : 'wrong', selIdx: idx, score: prev.score + (isCorrect ? 1 : 0) }));
            };

            const next = () => {
                const nextCur = s.cur + 1;
                if (nextCur >= concepts.length) { setS(prev => ({ ...prev, done: true })); return; }
                setS(prev => ({ ...prev, cur: nextCur, opts: makeOpts(concepts[prev.ord[nextCur]]), answered: null, selIdx: null }));
            };

            const reset = () => setS(freshState);

            if (s.done) return (
                <div className="text-center">
                    <div className="bg-yellow-50 border-2 border-yellow-400 rounded-3xl p-8 mb-6">
                        <p className="text-5xl font-bold text-yellow-500 mb-2">{s.score}/{concepts.length}</p>
                        <p className="text-xl font-bold text-slate-800 mb-4">{getFeedback(s.score, concepts.length)}</p>
                        <button onClick={reset} className="bg-yellow-400 text-yellow-900 px-8 py-3 rounded-2xl font-bold hover:bg-yellow-500 transition-colors">Börja om</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-2xl mx-auto">
                    <div className="flex justify-between items-center mb-3">
                        <span className="font-bold text-yellow-700">Poäng: {s.score}</span>
                        <span className="text-slate-400 text-sm">{s.cur + 1} / {concepts.length}</span>
                    </div>
                    <div className="w-full bg-slate-200 rounded-full h-2 mb-6">
                        <div className="bg-yellow-400 h-2 rounded-full transition-all" style={{width: `${((s.cur + 1) / concepts.length) * 100}%`}}></div>
                    </div>
                    <div className="bg-white p-6 rounded-3xl shadow-lg mb-6">
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Vilket är rätt tillämpning?</p>
                        <h2 className="text-2xl font-bold text-yellow-700">{concept.term}</h2>
                        <p className="text-sm text-slate-500 mt-1 leading-relaxed">{concept.definition}</p>
                    </div>
                    <div className="grid gap-3 mb-6">
                        {s.opts.map((opt, i) => (
                            <button key={i} onClick={() => handleSelect(i)} disabled={s.answered !== null}
                                className={`p-4 rounded-2xl border-2 text-left transition-all ${
                                    s.answered === null ? 'bg-white border-slate-200 hover:border-yellow-400 hover:bg-yellow-50' :
                                    opt.isCorrect ? 'bg-green-50 border-green-500 text-green-700' :
                                    i === s.selIdx ? 'bg-red-50 border-red-500 text-red-700' :
                                    'bg-white border-slate-100 text-slate-300'
                                }`}>
                                <span className="font-bold mr-2">{i === 0 ? 'A' : 'B'}.</span>{opt.text}
                            </button>
                        ))}
                    </div>
                    {s.answered !== null && (
                        <div>
                            <div className={`p-4 rounded-2xl text-sm mb-4 ${s.answered === 'correct' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`}>
                                <p className="font-bold mb-1">{s.answered === 'correct' ? '✓ Rätt!' : '✗ Fel!'}</p>
                                <p>{concept.ickeExempel.forklaring}</p>
                            </div>
                            <button onClick={next} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all">
                                {s.cur + 1 >= concepts.length ? 'Se resultat' : 'Nästa begrepp →'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('list');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    let n; do { n = Math.floor(Math.random() * concepts.length); } while (n === currentIndex && concepts.length > 1);
                    setCurrentIndex(n);
                }, 150);
            };

            const activeTab = 'bg-yellow-400 text-yellow-900 font-bold shadow-sm';
            const inactiveTab = 'text-slate-500';

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-2xl mx-auto mb-8 flex items-center justify-between">
                        <a href="index.html" className="text-slate-500 hover:text-yellow-600 transition-colors flex items-center gap-2 font-medium text-sm">← Tillbaka till startsidan</a>
                        <h1 className="text-2xl md:text-3xl font-bold text-center">Så styrs Sverige</h1>
                        <div className="w-36"></div>
                    </header>

                    <div className="max-w-2xl mx-auto mb-10 flex bg-white p-1 rounded-full shadow-md border border-slate-200">
                        <button onClick={() => setView('list')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'list' ? activeTab : inactiveTab}`}>Lista</button>
                        <button onClick={() => setView('flashcards')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'flashcards' ? activeTab : inactiveTab}`}>Flashcards</button>
                        <button onClick={() => setView('lucktext')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'lucktext' ? activeTab : inactiveTab}`}>Lucktext</button>
                        <button onClick={() => setView('scenario')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'scenario' ? activeTab : inactiveTab}`}>Scenario</button>
                        <button onClick={() => setView('icke')} className={`flex-1 py-2 rounded-full transition-all duration-300 text-sm ${view === 'icke' ? activeTab : inactiveTab}`}>Icke-ex.</button>
                    </div>

                    <main className="max-w-2xl mx-auto">
                        {view === 'list' && (
                            <div className="grid gap-4">
                                {concepts.map((item, index) => (
                                    <div key={index} className="bg-white p-5 rounded-2xl border-l-8 border-yellow-400 shadow-sm hover:shadow-md transition-shadow">
                                        <div className="flex items-center gap-3 mb-1">
                                            <span className="bg-yellow-100 text-yellow-700 text-xs font-bold px-2 py-1 rounded-lg">{index + 1}</span>
                                            <h3 className="text-lg font-bold">{item.term}</h3>
                                        </div>
                                        <p className="text-slate-600 leading-relaxed ml-10">{item.definition}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {view === 'flashcards' && (
                            <div className="flex flex-col items-center">
                                <div className="flip-card mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`flip-card-inner ${isFlipped ? 'flipped-classes' : ''}`}>
                                        <div className="flip-card-front">
                                            <h2 className="text-3xl font-bold text-slate-900 text-center px-4">{concepts[currentIndex].term}</h2>
                                            <div className="absolute bottom-6 animate-pulse"><span className="text-[10px] uppercase tracking-[0.2em] text-yellow-900 font-bold opacity-70">Klicka för svar</span></div>
                                        </div>
                                        <div className="flip-card-back">
                                            <p className="text-xl leading-relaxed text-slate-800 font-medium px-4">{concepts[currentIndex].definition}</p>
                                            <div className="absolute bottom-6"><span className="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Klicka för att vända</span></div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center gap-4">
                                    <button onClick={nextCard} className="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-3 text-lg">Nästa begrepp <span>→</span></button>
                                    <p className="text-slate-500 font-medium bg-slate-200 px-4 py-1 rounded-full text-xs">{currentIndex + 1} av {concepts.length}</p>
                                </div>
                            </div>
                        )}
                        {view === 'lucktext' && <LucktextView />}
                        {view === 'scenario' && <ScenarioView />}
                        {view === 'icke' && <IckeExempelView />}
                    </main>

                    <footer className="mt-12 text-center text-slate-400 text-sm italic pb-8">Källa: Samhällskunskap – Så styrs Sverige begreppslista</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
