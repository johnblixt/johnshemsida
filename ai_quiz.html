<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Mästaren: Tid & Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .correct { background-color: #10b981 !important; color: white; border-color: #059669 !important; }
        .incorrect { background-color: #ef4444 !important; color: white; border-color: #dc2626 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Rank Colors for Live Header */
        .text-noob { color: #94a3b8; }
        .text-rookie { color: #10b981; }
        .text-junior { color: #3b82f6; }
        .text-bronze { color: #b45309; }
        .text-silver { color: #64748b; }
        .text-allstar { color: #8b5cf6; }
        .text-elite { color: #f59e0b; font-weight: 900; }

        /* Final Rank Badge Styles */
        .rank-elite { background: linear-gradient(45deg, #f59e0b, #d946ef); color: white; }
        .rank-allstar { background-color: #8b5cf6; color: white; }
        .rank-silver { background-color: #64748b; color: white; }
        .rank-bronze { background-color: #b45309; color: white; }
        .rank-junior { background-color: #3b82f6; color: white; }
        .rank-rookie { background-color: #10b981; color: white; }
        .rank-noob { background-color: #94a3b8; color: white; }
        .rank-none { background-color: #e2e8f0; color: #64748b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div id="app" class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Progress Bar -->
        <div class="h-2 bg-slate-100 w-full">
            <div id="progress" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <!-- Header -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div>
                    <h1 class="text-xl font-bold text-slate-900">AI-Mästaren</h1>
                    <div id="timer-display" class="text-xs font-mono text-slate-400 mt-1 uppercase tracking-widest">Tid: 00:00</div>
                </div>
                <div class="flex flex-wrap gap-2">
                    <span id="live-rank" class="text-xs font-black uppercase tracking-tighter bg-slate-100 px-3 py-1 rounded-full border border-slate-200 self-center">NEWBIE</span>
                    <span id="score-counter" class="text-sm font-bold text-green-700 bg-green-50 px-3 py-1 rounded-full border border-green-100">Poäng: 0</span>
                    <span id="counter" class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">1 / 15</span>
                </div>
            </div>

            <!-- Question Area -->
            <div id="quiz-content" class="fade-in">
                <p id="question-text" class="text-lg font-semibold mb-6 leading-tight"></p>
                <div id="options-container" class="space-y-3">
                    <!-- Options injected here -->
                </div>
            </div>

            <!-- Feedback Area -->
            <div id="feedback" class="mt-6 p-4 rounded-xl hidden fade-in bg-slate-50 border border-slate-200 text-center">
                <p id="feedback-text" class="text-sm italic mb-4 text-slate-600"></p>
                <button id="next-btn" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold hover:bg-slate-800 transition-colors">
                    Nästa fråga
                </button>
            </div>

            <!-- Results Screen -->
            <div id="results" class="hidden text-center fade-in">
                <div class="mb-6">
                    <div id="final-rank-badge" class="inline-block px-8 py-3 rounded-full text-xl font-black uppercase tracking-widest mb-4 shadow-lg">
                        RANK: <span id="final-rank-text">-</span>
                    </div>
                    <h2 class="text-3xl font-extrabold text-slate-900">Bra jobbat!</h2>
                    <p class="text-slate-500 mt-2">Du har slutfört AI-testet.</p>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <p class="text-slate-500 uppercase tracking-wider text-xs font-bold mb-1">Poäng</p>
                        <p class="text-4xl font-black text-slate-900"><span id="final-score">0</span><span class="text-slate-300 text-xl">/15</span></p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <p class="text-slate-500 uppercase tracking-wider text-xs font-bold mb-1">Total Tid</p>
                        <p id="final-time" class="text-4xl font-black text-slate-900">00:00</p>
                    </div>
                </div>
                
                <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200 active:scale-95">
                    Starta om och förbättra tiden
                </button>
            </div>
        </div>
    </div>

    <script>
        const baseQuestions = [
            { 
                q: "Vad är den primära betydelsen av begreppet AI (Artificiell Intelligens)?", 
                a: [
                    {t: "Datorsystem som kan utföra uppgifter som normalt kräver mänsklig intelligens.", c: true}, 
                    {t: "En samling databaser som lagrar och strukturerar all information på internet.", c: false}, 
                    {t: "Mjukvara som automatiskt optimerar hårdvarans prestanda i moderna datorer.", c: false}, 
                    {t: "Mekaniska robotar som är konstruerade för att likna mänsklig fysik och rörelse.", c: false}
                ], 
                r: "AI handlar om kognitiva förmågor i mjukvara, inte nödvändigtvis fysiska robotar." 
            },
            { 
                q: "Hur skulle du beskriva vad Artificiell Intelligens faktiskt gör?", 
                a: [
                    {t: "Programkod som analyserar data för att fatta beslut och lösa komplexa problem.", c: true}, 
                    {t: "Hårdvara som förutspår framtida händelser med hundraprocentig vetenskaplig exakthet.", c: false}, 
                    {t: "Operativsystem som snabbar upp den globala överföringen av data mellan servrar.", c: false}, 
                    {t: "Statisk källkod som är låst för att förhindra oväntade förändringar i programmets logik.", c: false}
                ], 
                r: "AI efterliknar mänskligt beslutsfattande genom att bearbeta information logiskt." 
            },
            { 
                q: "Vad står akronymen AI för i tekniska sammanhang?", 
                a: [
                    {t: "Artificiell Intelligens", c: true}, 
                    {t: "Automatiserad Information", c: false}, 
                    {t: "Avancerad Interaktion", c: false}, 
                    {t: "Artificiell Infrastruktur", c: false}
                ], 
                r: "Detta är den vedertagna svenska termen för Artificial Intelligence." 
            },
            { 
                q: "Ge ett exempel på var vi ofta möter AI i vår digitala vardag.", 
                a: [
                    {t: "System som föreslår filmer baserat på vad du tidigare har valt att titta på.", c: true}, 
                    {t: "Analoga klockor som använder mekaniska fjädrar för att hålla reda på tiden.", c: false}, 
                    {t: "Elektriska verktyg som kräver manuell styrning för att utföra specifika moment.", c: false}, 
                    {t: "Tryckta uppslagsverk som organiserar kunskap i strikt alfabetisk ordning efter ämne.", c: false}
                ], 
                r: "Rekommendationssystem är ett av de vanligaste exemplen på vardaglig AI." 
            },
            { 
                q: "Vilken typ av tjänst använder mest sannolikt AI för att hjälpa användaren?", 
                a: [
                    {t: "Webbsökmotorer som försöker förstå innebörden bakom de sökord du skriver in.", c: true}, 
                    {t: "Digitala miniräknare som utför enkla aritmetiska beräkningar enligt fasta regler.", c: false}, 
                    {t: "FM-radioapparater som tar emot analoga signaler via en utfällbar antenn av metall.", c: false}, 
                    {t: "Traditionella brädspel där alla drag styrs av fysiska tärningar och fasta spelregler.", c: false}
                ], 
                r: "Moderna sökmotorer använder AI för att tolka kontext och intention." 
            },
            { 
                q: "Var i en smartphone hittar man oftast den mest aktiva AI-tekniken?", 
                a: [
                    {t: "I funktioner för röststyrning och biometrisk identifiering via ansiktsläsning.", c: true}, 
                    {t: "I telefonens fysiska batteri som lagrar kemisk energi för att driva kretskortet.", c: false}, 
                    {t: "I de skyddande glaslagren som täcker skärmen för att förhindra repor och skador.", c: false}, 
                    {t: "I den bakomliggande elektroniken som omvandlar ström till ljus i skärmens pixlar.", c: false}
                ], 
                r: "Biometri och naturligt språk (NLP) är kärnområden inom AI-utveckling." 
            },
            { 
                q: "Vad innebär det tekniska begreppet 'maskininlärning' (machine learning)?", 
                a: [
                    {t: "Att system identifierar mönster i data utan att vara förprogrammerade för varje steg.", c: true}, 
                    {t: "Att mjukvaran läser in hela ordböcker för att lära sig grammatikens fasta regler.", c: false}, 
                    {t: "Att en programmerare manuellt skriver in varje tänkbar instruktion för varje scenario.", c: false}, 
                    {t: "Att en fysisk maskin utför repetitiva rörelser för att kalibrera sina egna sensorer.", c: false}
                ], 
                r: "Kärnan är att algoritmen blir bättre genom att exponeras för mer data." 
            },
            { 
                q: "Hur tränas en modell inom maskininlärning vanligtvis?", 
                a: [
                    {t: "Genom att exponera en algoritm för stora mängder exempel för att hitta samband.", c: true}, 
                    {t: "Genom att låta datorn gissa helt slumpmässigt tills den råkar hitta en fungerande kod.", c: false}, 
                    {t: "Genom att koppla upp datorn mot en mänsklig operatör som styr varje enskilt beslut.", c: false}, 
                    {t: "Genom att kopiera en exakt kopia av en mänsklig hjärnas nervbanor till en hårddisk.", c: false}
                ], 
                r: "Datan fungerar som läromedel för att modellen ska kunna generalisera." 
            },
            { 
                q: "Varför beskrivs ofta 'data' som den viktigaste komponenten för AI?", 
                a: [
                    {t: "AI-modeller kräver stora datamängder för att lära sig känna igen specifika mönster.", c: true}, 
                    {t: "Data genererar den elektriska spänning som krävs för att hårdvaran ska kunna starta.", c: false}, 
                    {t: "Informationen i sig fungerar som ett fysiskt skydd mot virus och skadlig programkod.", c: false}, 
                    {t: "Data gör att de trådlösa signalerna mellan olika enheter färdas snabbare genom luften.", c: false}
                ], 
                r: "Utan data har algoritmen ingen bas att bygga sina slutsatser på." 
            },
            { 
                q: "Vad är risken om man tränar en AI-modell med vinklad eller felaktig data?", 
                a: [
                    {t: "Systemet kan lära sig felaktiga samband och producera djupt opålitliga resultat.", c: true}, 
                    {t: "Mjukvaran kommer per automatik att upptäcka och radera all information som är fel.", c: false}, 
                    {t: "Hårdvaran i datorn kommer att överhettas för att signalera att datan är av låg kvalitet.", c: false}, 
                    {t: "AI-system är konstruerade för att vara helt immuna mot mänskliga fördomar och fel.", c: false}
                ], 
                r: "Detta kallas bias och är en av de största utmaningarna inom AI-etik." 
            },
            { 
                q: "Hur definieras en 'algoritm' inom datavetenskap?", 
                a: [
                    {t: "En uppsättning steg-för-steg-instruktioner för att lösa en specifik uppgift.", c: true}, 
                    {t: "En fysisk komponent i bildskärmen som reglerar hur starkt de olika färgerna lyser.", c: false}, 
                    {t: "Ett mått på hur mycket energi en dator förbrukar när den står i viloläge (standby).", c: false}, 
                    {t: "En matematisk formel som enbart kan användas för att beräkna avancerad division.", c: false}
                ], 
                r: "En algoritm är helt enkelt receptet som datorn följer." 
            },
            { 
                q: "Vilken är en av de främsta fördelarna med att använda AI i samhället?", 
                a: [
                    {t: "Möjligheten att snabbt analysera enorma mängder data och effektivisera rutinuppgifter.", c: true}, 
                    {t: "Att alla tekniska enheter i framtiden kommer att bli helt kostnadsfria att producera.", c: false}, 
                    {t: "Att systemet kan styra väderleken och förhindra nederbörd i specifika geografiska områden.", c: false}, 
                    {t: "Att människor i framtiden inte längre kommer att behöva lära sig att läsa eller skriva.", c: false}
                ], 
                r: "AI är överlägsen människan på att hitta mönster i massiv data på kort tid." 
            },
            { 
                q: "Vad anses vara en betydande etisk risk med utbredd AI-teknik?", 
                a: [
                    {t: "Potentiella hot mot den personliga integriteten genom automatiserad övervakning.", c: true}, 
                    {t: "Att datorprogram börjar kräva ekonomisk ersättning för det arbete de utför digitalt.", c: false}, 
                    {t: "Risken att den globala mängden internet tar slut på grund av hög dataförbrukning.", c: false}, 
                    {t: "Att robotar kommer att börja konsumera mänsklig föda för att utvinna biologisk energi.", c: false}
                ], 
                r: "Övervakning och datainsamling är stora utmaningar för integriteten." 
            },
            { 
                q: "Vad innebär begreppet 'bias' när man pratar om AI-system?", 
                a: [
                    {t: "Att systemet uppvisar fördomar som speglar skevheter i den data det tränats på.", c: true}, 
                    {t: "Att hastigheten i processorn begränsas för att undvika att AI-svaren kommer för fort.", c: false}, 
                    {t: "Att bildskärmen byter färgskala för att indikera att ett fel har uppstått i källkoden.", c: false}, 
                    {t: "Att programmet kräver ett fysiskt säkerhetskort för att användaren ska kunna logga in.", c: false}
                ], 
                r: "Bias speglar ofta de mänskliga fördomar som finns gömda i träningsdatan." 
            },
            { 
                q: "Vad är en 'Deepfake' och varför utgör den en fara?", 
                a: [
                    {t: "En AI-skapad video som ser autentisk ut men visar händelser som aldrig har ägt rum.", c: true}, 
                    {t: "Ett avancerat sätt att reparera trasiga hårddiskar genom att använda fjärrstyrning.", c: false}, 
                    {t: "En typ av kryptering som gör det omöjligt att skicka data mellan olika världsdelar.", c: false}, 
                    {t: "En ny standard för trådlös uppkoppling som fungerar under vatten och i djupa grottor.", c: false}
                ], 
                r: "Deepfakes kan användas för desinformation och att manipulera opinionen." 
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let quizQuestions = [];
        let startTime;
        let timerInterval;

        // UI Elements
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedback = document.getElementById('feedback');
        const feedbackText = document.getElementById('feedback-text');
        const nextBtn = document.getElementById('next-btn');
        const counter = document.getElementById('counter');
        const scoreCounter = document.getElementById('score-counter');
        const liveRank = document.getElementById('live-rank');
        const progress = document.getElementById('progress');
        const results = document.getElementById('results');
        const quizContent = document.getElementById('quiz-content');
        const timerDisplay = document.getElementById('timer-display');
        
        const finalRankBadge = document.getElementById('final-rank-badge');
        const finalRankText = document.getElementById('final-rank-text');
        const finalScoreDisplay = document.getElementById('final-score');
        const finalTimeDisplay = document.getElementById('final-time');

        // Helper to shuffle any array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(updateTimerDisplay, 1000);
        }

        function updateTimerDisplay() {
            const elapsedTime = Date.now() - startTime;
            const minutes = Math.floor(elapsedTime / 60000);
            const seconds = Math.floor((elapsedTime % 60000) / 1000);
            const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            timerDisplay.innerText = `Tid: ${formattedTime}`;
            return formattedTime;
        }

        function stopTimer() {
            clearInterval(timerInterval);
            return updateTimerDisplay();
        }

        function updateRankUI(currentScore, targetElement, isFinalBadge) {
            let rank = "NEWBIE";
            let colorClass = "text-noob";
            let badgeClass = "rank-none";

            if (currentScore >= 14) { rank = "ELITE"; colorClass = "text-elite"; badgeClass = "rank-elite"; }
            else if (currentScore >= 12) { rank = "ALL-STAR"; colorClass = "text-allstar"; badgeClass = "rank-allstar"; }
            else if (currentScore >= 10) { rank = "SILVER"; colorClass = "text-silver"; badgeClass = "rank-silver"; }
            else if (currentScore >= 8) { rank = "BRONZE"; colorClass = "text-bronze"; badgeClass = "rank-bronze"; }
            else if (currentScore >= 5) { rank = "JUNIOR"; colorClass = "text-junior"; badgeClass = "rank-junior"; }
            else if (currentScore >= 3) { rank = "ROOKIE"; colorClass = "text-rookie"; badgeClass = "rank-rookie"; }
            else if (currentScore >= 1) { rank = "NOOB"; colorClass = "text-noob"; badgeClass = "rank-noob"; }

            if (isFinalBadge) {
                targetElement.innerText = rank;
                finalRankBadge.className = `inline-block px-8 py-3 rounded-full text-xl font-black uppercase tracking-widest mb-4 shadow-lg ${badgeClass}`;
            } else {
                targetElement.innerText = rank;
                targetElement.className = `text-xs font-black uppercase tracking-tighter bg-slate-100 px-3 py-1 rounded-full border border-slate-200 self-center ${colorClass}`;
            }
        }

        function loadQuestion() {
            const question = quizQuestions[currentQuestionIndex];
            
            feedback.classList.add('hidden');
            quizContent.classList.remove('fade-in');
            void quizContent.offsetWidth; 
            quizContent.classList.add('fade-in');
            
            questionText.innerText = question.q;
            counter.innerText = `${currentQuestionIndex + 1} / ${quizQuestions.length}`;
            scoreCounter.innerText = `Poäng: ${score}`;
            updateRankUI(score, liveRank, false);
            
            progress.style.width = `${(currentQuestionIndex / quizQuestions.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            // Shuffle options for this specific question
            const shuffledOptions = shuffleArray([...question.a]);
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 border-2 border-slate-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all font-medium text-slate-700 shadow-sm";
                btn.innerText = opt.t;
                btn.onclick = () => selectOption(btn, opt.c, question.r);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, isCorrect, rationale) {
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            
            if (isCorrect) {
                btn.classList.add('correct');
                score++;
                scoreCounter.innerText = `Poäng: ${score}`;
                updateRankUI(score, liveRank, false);
            } else {
                btn.classList.add('incorrect');
                buttons.forEach(b => {
                    const optText = b.innerText;
                    const originalOpt = quizQuestions[currentQuestionIndex].a.find(o => o.t === optText);
                    if(originalOpt.c) b.classList.add('correct');
                });
            }
            
            feedbackText.innerText = rationale;
            feedback.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            const finalTime = stopTimer();
            quizContent.classList.add('hidden');
            feedback.classList.add('hidden');
            results.classList.remove('hidden');
            progress.style.width = "100%";
            finalScoreDisplay.innerText = score;
            finalTimeDisplay.innerText = finalTime;
            updateRankUI(score, finalRankText, true);
        }

        function initQuiz() {
            // 1. Shuffle all questions at start
            quizQuestions = shuffleArray([...baseQuestions]);
            // 2. Reset state
            currentQuestionIndex = 0;
            score = 0;
            // 3. Start timer
            startTimer();
            // 4. Load first question
            loadQuestion();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
