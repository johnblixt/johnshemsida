<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samhällsekonomi - Begrepp & Flashcards</title>
    <!-- Google Fonts: Fredoka -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
        }
        /* 3D Flip Animation Logic */
        .perspective-1000 {
            perspective: 1000px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .flipped {
            transform: rotateY(180deg);
        }
        /* Custom transitions */
        .transition-transform-600 {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const concepts = [
            { id: 1, term: "Resurser", definition: "Det vi behöver för att producera saker, till exempel pengar, arbete och naturtillgångar." },
            { id: 2, term: "Utbud", definition: "Hur mycket det finns att sälja av en vara eller tjänst." },
            { id: 3, term: "Efterfrågan", definition: "Hur mycket människor vill köpa av något." },
            { id: 4, term: "Prisbildning", definition: "Priset bestäms av utbud och efterfrågan." },
            { id: 5, term: "Marknadsekonomi", definition: "Företag och människor bestämmer själva vad som ska säljas och till vilket pris." },
            { id: 6, term: "Planekonomi", definition: "Staten bestämmer vad som ska produceras, hur mycket och till vilket pris." },
            { id: 7, term: "Blandekonomi", definition: "En blandning av marknadsekonomi och planekonomi, som i Sverige." },
            { id: 8, term: "Ekonomiska kretsloppet", definition: "Visar hur pengar rör sig mellan staten, banker, företag och människor." },
            { id: 9, term: "Offentlig sektor", definition: "Staten, regioner och kommuner som driver skola, vård och andra tjänster." },
            { id: 10, term: "Banker", definition: "Lånar ut och tar emot pengar och påverkar ekonomin genom räntor." },
            { id: 11, term: "BNP (Bruttonationalprodukt)", definition: "Värdet av allt som produceras i ett land under ett år." },
            { id: 12, term: "Tillväxt", definition: "När BNP ökar och ekonomin växer." },
            { id: 13, term: "Högkonjunktur", definition: "En period med hög tillväxt, där företag producerar mycket, fler har jobb och efterfrågan är stark/hög." },
            { id: 14, term: "Lågkonjunktur", definition: "En period med låg tillväxt, där företag producerar mindre, arbetslösheten ökar och efterfrågan är svag/låg." },
            { id: 15, term: "Produktivitet", definition: "Hur effektivt man arbetar; att producera mer på samma tid." },
            { id: 16, term: "Inflation", definition: "När priserna stiger och pengarna blir mindre värda." },
            { id: 17, term: "Ränta", definition: "Priset på pengar. Du betalar ränta när du lånar pengar, och du får ränta när du sparar. Om du får ränta på både det du sparat och den tidigare räntan kallas det ränta-på-ränta-effekten - dina pengar växer snabbare över tid." },
            { id: 18, term: "Styrränta (Reporänta)", definition: "Den ränta som Riksbanken bestämmer och som påverkar alla andra räntor." },
            { id: 19, term: "Penningpolitik", definition: "När Riksbanken ändrar räntan för att påverka ekonomin. Expansiv penningpolitik: Sänka räntan för att få fart på ekonomin vid låg tillväxt. Åtstramande penningpolitik: Höja räntan för att bromsa inflationen vid hög tillväxt." },
            { id: 20, term: "Finanspolitik", definition: "När staten ändrar skatter eller offentliga utgifter för att påverka ekonomin. Expansiv finanspolitik: Sänka skatter eller öka statens utgifter för att skapa fler jobb vid låg tillväxt. Åtstramande finanspolitik: Höja skatter eller minska utgifter för att undvika överhettning vid hög tillväxt." }
        ];

        function App() {
            const [viewMode, setViewMode] = useState('list'); // 'list' or 'flashcards'
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const handleNextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    let nextIndex;
                    do {
                        nextIndex = Math.floor(Math.random() * concepts.length);
                    } while (nextIndex === currentCardIndex && concepts.length > 1);
                    setCurrentCardIndex(nextIndex);
                }, 150); // Small delay to allow flip back animation if needed
            };

            const toggleFlip = () => {
                setIsFlipped(!isFlipped);
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8">
                    {/* Navigation & Header */}
                    <header className="mb-8">
                        <a href="index.html" className="text-slate-500 hover:text-yellow-600 transition-colors inline-flex items-center mb-4">
                            <span className="mr-1">←</span> Portal
                        </a>
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <h1 className="text-3xl md:text-4xl font-bold text-slate-800">Samhällsekonomi</h1>
                            
                            {/* Toggle Switch */}
                            <div className="flex bg-slate-200 p-1 rounded-xl w-fit">
                                <button 
                                    onClick={() => setViewMode('list')}
                                    className={`px-6 py-2 rounded-lg transition-all ${viewMode === 'list' ? 'bg-yellow-400 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-300'}`}
                                >
                                    Lista
                                </button>
                                <button 
                                    onClick={() => setViewMode('flashcards')}
                                    className={`px-6 py-2 rounded-lg transition-all ${viewMode === 'flashcards' ? 'bg-yellow-400 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-300'}`}
                                >
                                    Flashcards
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main>
                        {viewMode === 'list' ? (
                            <div className="grid gap-4">
                                {concepts.map((item) => (
                                    <div key={item.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:border-yellow-200 transition-colors">
                                        <div className="flex gap-4">
                                            <span className="flex-shrink-0 w-10 h-10 bg-yellow-100 text-yellow-700 rounded-full flex items-center justify-center font-bold">
                                                {item.id}
                                            </span>
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-800 mb-2">{item.term}</h3>
                                                <p className="text-slate-600 leading-relaxed">{item.definition}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="flex flex-col items-center">
                                {/* Flashcard Container */}
                                <div 
                                    className="w-full max-w-lg h-80 perspective-1000 cursor-pointer mb-8"
                                    onClick={toggleFlip}
                                >
                                    <div className={`relative w-full h-full text-center transition-transform-600 preserve-3d ${isFlipped ? 'flipped' : ''}`}>
                                        
                                        {/* Front Side */}
                                        <div className="absolute w-full h-full backface-hidden bg-white border-4 border-yellow-400 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8">
                                            <p className="text-yellow-600 font-medium mb-4 uppercase tracking-widest text-sm">Begrepp</p>
                                            <h2 className="text-3xl md:text-4xl font-bold text-slate-800">{concepts[currentCardIndex].term}</h2>
                                            <p className="mt-8 text-slate-400 text-sm">Klicka för att se definitionen</p>
                                        </div>

                                        {/* Back Side */}
                                        <div className="absolute w-full h-full backface-hidden bg-yellow-50 border-4 border-yellow-400 rounded-3xl shadow-xl flex flex-col items-center justify-center p-8 rotate-y-180 overflow-y-auto">
                                            <p className="text-yellow-600 font-medium mb-4 uppercase tracking-widest text-sm">Definition</p>
                                            <p className="text-xl md:text-2xl text-slate-700 leading-relaxed">
                                                {concepts[currentCardIndex].definition}
                                            </p>
                                        </div>

                                    </div>
                                </div>

                                {/* Controls */}
                                <div className="flex items-center gap-6">
                                    <span className="text-slate-500">Kort {currentCardIndex + 1} av {concepts.length}</span>
                                    <button 
                                        onClick={handleNextCard}
                                        className="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-3 px-8 rounded-2xl shadow-lg transform active:scale-95 transition-all flex items-center"
                                    >
                                        Nästa kort
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 ml-2" viewBox="0 0 20 20" fill="currentColor">
                                            <path fillRule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clipRule="evenodd" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-16 py-8 border-t border-slate-200 text-center text-slate-400 text-sm">
                        Studieverktyg för Samhällsekonomi &copy; {new Date().getFullYear()}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
